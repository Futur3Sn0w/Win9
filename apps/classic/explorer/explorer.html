<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>File Explorer</title>
    <link rel="stylesheet" href="explorer.css">
    <link rel="stylesheet" href="../../../css/classic-windows.css">
    <link rel="stylesheet" href="../../../css/classic-controls.css">
    <link rel="stylesheet" href="../../../css/styles.css">
    <link rel="stylesheet" href="../../../css/fonts.css">

    <link href="https://cdn.metroui.org.ua/4.5.12/icons.css" rel="stylesheet">

</head>

<body>
    <div class="explorer">
        <!-- Command Bar -->
        <div class="explorer-command-bar">
            <div class="explorer-command-tabs">
                <button class="explorer-command-tab active" data-tab="file">File</button>
                <button class="explorer-command-tab" data-tab="computer">Computer</button>
                <button class="explorer-command-tab" data-tab="view">View</button>
            </div>
        </div>

        <!-- Navigation Bar (matching Control Panel exactly) -->
        <div class="explorer-nav-bar">
            <div class="explorer-nav-buttons">
                <button class="explorer-nav-btn" id="backBtn" disabled title="Back">
                    <span class="sui-back"></span>
                </button>
                <button class="explorer-nav-btn" id="forwardBtn" disabled title="Forward">
                    <span class="sui-forward"></span>
                </button>
                <button class="explorer-nav-btn" id="upBtn" disabled title="Up one level">
                    <span class="sui-up"></span>
                </button>
            </div>
            <div class="explorer-address-bar">
                <img src="../../../resources/images/icons/explorer/folder_home/16.png" class="explorer-address-icon"
                    id="addressIcon" alt="Home">
                <div class="explorer-breadcrumbs" id="breadcrumbs">
                    <span class="explorer-breadcrumb active">Home</span>
                </div>
            </div>
            <div class="explorer-search-box">
                <input type="text" id="searchInput" placeholder="Search Home" />
                <span class="sui-search"></span>
            </div>
        </div>

        <!-- Main Container -->
        <div class="explorer-main">
            <!-- Sidebar -->
            <div class="explorer-sidebar" id="explorerSidebar">
                <div class="explorer-sidebar-section explorer-sidebar-section--pinned">
                    <div class="explorer-sidebar-item active" data-location="home">
                        <img src="../../../resources/images/icons/explorer/folder_home/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Home</span>
                    </div>
                    <div class="explorer-sidebar-item" data-location="recycle-bin">
                        <img src="../../../resources/images/icons/explorer/recycle_bin/empty/16.png"
                            class="explorer-sidebar-icon" id="recycleBinSidebarIcon" />
                        <span>Recycle Bin</span>
                    </div>
                </div>

                <div class="explorer-sidebar-section">
                    <div class="explorer-sidebar-item explorer-sidebar-item--expandable explorer-sidebar-item--non-navigable"
                        data-location="favorites">
                        <span class="explorer-sidebar-disclosure" data-expanded="true">▼</span>
                        <img src="../../../resources/images/icons/explorer/folder_favorites/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Favorites</span>
                    </div>
                    <div class="explorer-sidebar-children" data-parent="favorites">
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="desktop">
                            <img src="../../../resources/images/icons/explorer/desktop/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Desktop</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="downloads">
                            <img src="../../../resources/images/icons/explorer/folder_downloads/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Downloads</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="videos">
                            <img src="../../../resources/images/icons/explorer/folder_videos/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Videos</span>
                        </div>
                    </div>
                </div>

                <div class="explorer-sidebar-section">
                    <div class="explorer-sidebar-item explorer-sidebar-item--expandable" data-location="this-pc">
                        <span class="explorer-sidebar-disclosure" data-expanded="true">▼</span>
                        <img src="../../../resources/images/icons/explorer/this_pc/16.png"
                            class="explorer-sidebar-icon" />
                        <span>This PC</span>
                    </div>
                    <div class="explorer-sidebar-children" data-parent="this-pc">
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="desktop-folder">
                            <img src="../../../resources/images/icons/explorer/desktop/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Desktop</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="documents">
                            <img src="../../../resources/images/icons/explorer/folder_documents/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Documents</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested"
                            data-location="downloads-folder">
                            <img src="../../../resources/images/icons/explorer/folder_downloads/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Downloads</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="music">
                            <img src="../../../resources/images/icons/explorer/folder_music/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Music</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="pictures">
                            <img src="../../../resources/images/icons/explorer/folder_pictures/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Pictures</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="videos">
                            <img src="../../../resources/images/icons/explorer/folder_videos/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Videos</span>
                        </div>
                    </div>
                </div>

                <div class="explorer-sidebar-section">
                    <div class="explorer-sidebar-item explorer-sidebar-item--non-navigable" data-location="network">
                        <img src="../../../resources/images/icons/explorer/network/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Network</span>
                    </div>
                    <div class="explorer-sidebar-item explorer-sidebar-item--non-navigable explorer-sidebar-item--spaced"
                        data-location="homegroup">
                        <img src="../../../resources/images/icons/explorer/homegroup/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Homegroup</span>
                    </div>
                </div>
            </div>

            <!-- Resize Handle -->
            <div class="explorer-sidebar-resize" id="sidebarResize"></div>

            <!-- Content Area -->
            <div class="explorer-content" id="content">
                <!-- Content will be dynamically populated -->
            </div>
        </div>

        <!-- Status Bar -->
        <div class="explorer-status-bar">
            <div class="explorer-status-info" id="statusInfo">8 items</div>
            <div class="explorer-status-selected" id="statusSelected" style="display: none;">0 items selected</div>
            <div class="explorer-status-view-controls">
                <button class="explorer-view-btn" title="Extra large icons" data-view="extra-large">
                    <span class="sui-view-all"></span>
                </button>
                <button class="explorer-view-btn active" title="Large icons" data-view="large">
                    <span class="sui-view-all"></span>
                </button>
                <button class="explorer-view-btn" title="Medium icons" data-view="medium">
                    <span class="sui-view-all"></span>
                </button>
                <button class="explorer-view-btn" title="List" data-view="list">
                    <span class="sui-list"></span>
                </button>
                <button class="explorer-view-btn" title="Details" data-view="details">
                    <span class="sui-list-bulleted"></span>
                </button>
            </div>
        </div>
    </div>

    <script src="../../../components/explorer/known-folders.js"></script>
    <script>
        const APP_ID = 'explorer';
        const os = require('os');
        const path = require('path');
        const fs = require('fs').promises;
        const HOME_LOCATION = 'home';
        const THIS_PC_LOCATION = 'this-pc';
        const RECYCLE_BIN_LOCATION = 'recycle-bin';
        const HOME_FAVORITE_LOCATIONS = ['desktop', 'downloads', 'videos'];
        const HOME_FREQUENT_LOCATIONS = ['desktop', 'documents', 'downloads', 'music', 'pictures', 'videos'];
        const HOME_RECENT_FILE_LIMIT = 8;
        const DEFAULT_ICON_SIZES = [16, 20, 24, 32, 40, 48, 64, 80, 96, 128, 256, 512, 768];
        const ICON_SIZE_AVAILABILITY = {
            'bat': [16, 32, 48, 256],
            'desktop': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'dll': [16, 32, 48, 256],
            'external_drive': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'folder_documents': [16, 32, 48, 96],
            'folder_downloads': [16, 32, 48, 96],
            'folder_favorites': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'folder_home': [16, 20, 24, 32, 40, 48, 64, 80, 96, 768],
            'folder_music': [16, 32, 48, 96],
            'folder_pictures': [16, 32, 48, 96],
            'folder_recent-places': [16, 20, 24, 32, 40, 48, 64, 80, 96],
            'folder_videos': [16, 32, 48, 96],
            'generic_file': [16, 20, 24, 32, 40, 48, 64, 256],
            'generic_folder': [16, 32, 48, 96],
            'folder_of_folders': [16, 32, 48, 96],
            'generic_program': [16, 20, 24, 32, 40, 48, 64, 256],
            'homegroup': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'image/jpg': [16, 32, 48],
            'image/png': [16, 32, 48],
            'ini': [16, 32, 48, 256],
            'iso': [16, 24, 32, 48, 256],
            'main_drive': [16, 24, 32, 48, 64, 96, 128],
            'music': [16, 32, 48],
            'recycle_bin/empty': [16, 20, 24, 32, 40, 48, 64, 80, 96, 128, 256],
            'recycle_bin/full': [16, 20, 24, 32, 40, 48, 64, 80, 96, 128, 256],
            'network': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'rich_text_document': [16, 24, 48],
            'text_document': [16, 20, 24, 32, 40, 48, 64, 256],
            'this_pc': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'video': [16, 32, 48],
            'zip': [16, 32, 48, 256]
        };
        const FALLBACK_SPECIAL_FOLDER_DEFINITIONS = [
            { id: 'desktop', name: 'Desktop', icon: 'desktop', relativePath: ['Desktop'], sidebarLocation: 'desktop', thisPcLocation: 'desktop-folder' },
            { id: 'documents', name: 'Documents', icon: 'folder_documents', relativePath: ['Documents'], sidebarLocation: 'documents', thisPcLocation: 'documents' },
            { id: 'downloads', name: 'Downloads', icon: 'folder_downloads', relativePath: ['Downloads'], sidebarLocation: 'downloads', thisPcLocation: 'downloads-folder' },
            { id: 'music', name: 'Music', icon: 'folder_music', relativePath: ['Music'], sidebarLocation: 'music', thisPcLocation: 'music' },
            { id: 'pictures', name: 'Pictures', icon: 'folder_pictures', relativePath: ['Pictures'], sidebarLocation: 'pictures', thisPcLocation: 'pictures' },
            { id: 'videos', name: 'Videos', icon: 'folder_videos', relativePath: ['Videos'], sidebarLocation: 'videos', thisPcLocation: 'videos' }
        ];
        const SPECIAL_FOLDER_DEFINITIONS = window.KnownFolders && typeof window.KnownFolders.getDefinitions === 'function'
            ? window.KnownFolders.getDefinitions()
            : FALLBACK_SPECIAL_FOLDER_DEFINITIONS;

        // Window ID for multi-window support
        let windowId = null;

        // Check if running in Electron webview (has ipcRenderer)
        const isWebview = typeof require !== 'undefined';
        let ipcRenderer = null;

        if (isWebview) {
            try {
                const { ipcRenderer: ipc } = require('electron');
                ipcRenderer = ipc;

                // Listen for windowId from parent
                ipcRenderer.on('setWindowId', (event, data) => {
                    windowId = data.windowId;
                    console.log('Explorer window ID set:', windowId);
                });

                ipcRenderer.on('setLaunchOptions', (event, data) => {
                    queueLaunchOptions(data?.launchOptions);
                });

                ipcRenderer.on('host-command', (event, data) => {
                    handleHostCommand(data);
                });

                ipcRenderer.on('trash:state-changed', (event, nextState) => {
                    void applyRecycleBinStateUpdate(nextState);
                });

                // Helper function to send messages to parent
                window.sendToParent = function (action, data) {
                    const messageData = {
                        action,
                        windowId,
                        appId: APP_ID,
                        ...data
                    };
                    ipcRenderer.sendToHost('window-message', messageData);
                };
            } catch (e) {
                console.warn('Failed to set up IPC:', e);
            }
        } else {
            // Fallback for iframe context
            window.sendToParent = function (action, data) {
                window.parent.postMessage({
                    action,
                    windowId,
                    appId: APP_ID,
                    ...data
                }, '*');
            };

            // Listen for postMessage
            window.addEventListener('message', function (e) {
                if (e.data.action === 'setWindowId') {
                    windowId = e.data.windowId;
                    console.log('Explorer window ID set:', windowId);
                } else if (e.data.action === 'setLaunchOptions') {
                    queueLaunchOptions(e.data.launchOptions);
                } else {
                    handleHostCommand(e.data);
                }
            });
        }

        let currentLocation = HOME_LOCATION;
        let currentPath = null;
        let navigationHistory = [];
        let historyIndex = -1;
        let currentView = 'large';
        let selectedItems = new Set();
        let isInitialized = false;
        let pendingLaunchOptions = window.launchOptions && typeof window.launchOptions === 'object'
            ? { ...window.launchOptions }
            : null;
        let launchOptionsDrainInFlight = false;
        let recycleBinState = {
            available: false,
            empty: true,
            itemCount: 0
        };
        let recycleBinItemsSignature = '';
        let recycleBinPollTimer = null;
        let explorerContextMenu = null;
        let explorerContextMenuDismissHandler = null;
        let dragSelectState = {
            active: false,
            originX: 0,
            originY: 0,
            overlay: null
        };
        let pendingSelectionPath = null;
        let explorerRenameState = null;
        let renderedEntryElementsByPath = new Map();
        let favoriteFolderPathsCache = [];
        const itemEntryMap = new WeakMap();
        let explorerHostRequestSequence = 0;
        const pendingExplorerHostRequests = new Map();

        function getSharedExplorerEngine() {
            const candidates = [window, window.parent, window.top];

            for (const candidate of candidates) {
                try {
                    if (candidate && candidate.ExplorerEngine) {
                        return candidate.ExplorerEngine;
                    }
                } catch (_error) {
                    // Ignore cross-context access failures.
                }
            }

            return null;
        }

        function getSystemDialogApi() {
            const candidates = [window, window.parent, window.top];

            for (const candidate of candidates) {
                try {
                    if (candidate && candidate.systemDialog) {
                        return candidate.systemDialog;
                    }
                } catch (_error) {
                    // Ignore cross-context access failures.
                }
            }

            return null;
        }

        function isHiddenShellEntry(name) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.isHiddenEntryName === 'function') {
                return sharedExplorerEngine.isHiddenEntryName(name);
            }

            if (typeof name !== 'string' || !name) {
                return false;
            }

            if (name.startsWith('.')) {
                return true;
            }

            const normalized = name.toLowerCase();
            return path.extname(normalized) === '.ini'
                || normalized === 'desktop.ini'
                || normalized === 'thumbs.db'
                || normalized === 'ehthumbs.db'
                || normalized === '.ds_store'
                || normalized === 'icon\r';
        }

        function setPendingSelectionPath(targetPath) {
            pendingSelectionPath = typeof targetPath === 'string' && targetPath ? targetPath : null;
        }

        function requestExplorerHost(action, payload = {}) {
            return new Promise((resolve, reject) => {
                if (!window.sendToParent) {
                    reject(new Error('Explorer host messaging is unavailable.'));
                    return;
                }

                explorerHostRequestSequence += 1;
                const requestId = `explorer-host-${Date.now()}-${explorerHostRequestSequence}`;

                pendingExplorerHostRequests.set(requestId, { resolve, reject });
                window.sendToParent('explorerHostRequest', {
                    requestId,
                    hostAction: action,
                    payload
                });
            });
        }

        async function canPasteToDirectory(targetPath) {
            if (!targetPath) {
                return false;
            }

            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.canPasteToDirectory === 'function') {
                return sharedExplorerEngine.canPasteToDirectory(targetPath);
            }

            try {
                return Boolean(await requestExplorerHost('canPasteToDirectory', { targetPath }));
            } catch (_error) {
                return false;
            }
        }

        async function getFavoriteFolderPaths() {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.getFavoriteFolderPaths === 'function') {
                return sharedExplorerEngine.getFavoriteFolderPaths();
            }

            try {
                const paths = await requestExplorerHost('getFavoriteFolderPaths');
                return Array.isArray(paths) ? paths : [];
            } catch (_error) {
                return [];
            }
        }

        async function isFavoriteFolderPath(folderPath) {
            if (!folderPath) {
                return false;
            }

            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.isFavoriteFolderPath === 'function') {
                return sharedExplorerEngine.isFavoriteFolderPath(folderPath);
            }

            try {
                return Boolean(await requestExplorerHost('isFavoriteFolderPath', { folderPath }));
            } catch (_error) {
                return false;
            }
        }

        async function addFavoriteFolderPath(folderPath) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.addFavoriteFolderPath === 'function') {
                return sharedExplorerEngine.addFavoriteFolderPath(folderPath);
            }

            return requestExplorerHost('addFavoriteFolderPath', { folderPath });
        }

        async function removeFavoriteFolderPath(folderPath) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.removeFavoriteFolderPath === 'function') {
                return sharedExplorerEngine.removeFavoriteFolderPath(folderPath);
            }

            return requestExplorerHost('removeFavoriteFolderPath', { folderPath });
        }

        async function copyPathsToClipboard(paths) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.copyPathsToClipboard === 'function') {
                sharedExplorerEngine.copyPathsToClipboard(paths);
                return;
            }

            await requestExplorerHost('copyPathsToClipboard', { paths });
        }

        async function cutPathsToClipboard(paths) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.cutPathsToClipboard === 'function') {
                sharedExplorerEngine.cutPathsToClipboard(paths);
                return;
            }

            await requestExplorerHost('cutPathsToClipboard', { paths });
        }

        async function pasteClipboardToDirectoryViaHost(targetPath) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.pasteClipboardToDirectory === 'function') {
                return sharedExplorerEngine.pasteClipboardToDirectory(targetPath);
            }

            return requestExplorerHost('pasteClipboardToDirectory', { targetPath });
        }

        async function renameEntryPathViaHost(entryPath, nextName) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.renameEntryPath === 'function') {
                return sharedExplorerEngine.renameEntryPath(entryPath, nextName);
            }

            return requestExplorerHost('renameEntryPath', { entryPath, nextName });
        }

        async function movePathsToRecycleBinViaHost(paths) {
            const sharedExplorerEngine = getSharedExplorerEngine();
            if (sharedExplorerEngine && typeof sharedExplorerEngine.movePathsToRecycleBin === 'function') {
                return sharedExplorerEngine.movePathsToRecycleBin(paths);
            }

            return requestExplorerHost('movePathsToRecycleBin', { paths });
        }

        // Initialize on load (use 'load' instead of 'DOMContentLoaded' to ensure launchOptions are set)
        window.addEventListener('load', initialize);

        async function initialize() {
            const launchOptions = pendingLaunchOptions ? { ...pendingLaunchOptions } : {};
            pendingLaunchOptions = null;
            console.log('[File Explorer] Initialize with launchOptions:', launchOptions);

            const launchTarget = resolveLaunchTarget(launchOptions);
            if (launchTarget?.type === 'this-pc') {
                console.log('[File Explorer] Opening location: This PC');
                currentLocation = THIS_PC_LOCATION;
                currentPath = null;
                pushHistoryEntry({ type: 'this-pc' });
            } else if (launchTarget?.type === RECYCLE_BIN_LOCATION) {
                console.log('[File Explorer] Opening location: Recycle Bin');
                currentLocation = RECYCLE_BIN_LOCATION;
                currentPath = null;
                pushHistoryEntry({ type: RECYCLE_BIN_LOCATION });
            } else if (launchTarget?.type === 'path') {
                console.log('[File Explorer] Opening folder:', launchTarget.path);
                currentLocation = 'path';
                currentPath = launchTarget.path;
                pushHistoryEntry({ type: 'path', path: launchTarget.path });
            } else {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                pushHistoryEntry({ type: 'home' });
            }

            await updateView();
            bindEventListeners();
            initializeSidebarResize();
            isInitialized = true;
            notifyParentWhenReady();
            drainPendingLaunchOptions();
        }

        async function handleHostCommand(command) {
            if (!command || typeof command.action !== 'string') {
                return;
            }

            if (command.action === 'resetForPreload') {
                await resetForPreload();
                return;
            }

            if (command.action === 'explorer-host-response' && command.requestId) {
                const pendingRequest = pendingExplorerHostRequests.get(command.requestId);
                if (!pendingRequest) {
                    return;
                }

                pendingExplorerHostRequests.delete(command.requestId);

                if (command.error) {
                    pendingRequest.reject(new Error(command.error));
                    return;
                }

                pendingRequest.resolve(command.result);
            }
        }

        async function resetForPreload() {
            currentLocation = HOME_LOCATION;
            currentPath = null;
            navigationHistory = [];
            historyIndex = -1;
            selectedItems = new Set();
            pushHistoryEntry({ type: 'home' });

            await updateView();
        }

        function queueLaunchOptions(launchOptions) {
            if (!launchOptions || typeof launchOptions !== 'object') {
                return;
            }

            pendingLaunchOptions = {
                ...(pendingLaunchOptions || {}),
                ...launchOptions
            };

            if (isInitialized) {
                drainPendingLaunchOptions();
            }
        }

        function resolveSpecialFolderPath(folderId) {
            if (typeof folderId !== 'string' || !folderId) {
                return null;
            }

            if (window.KnownFolders && typeof window.KnownFolders.resolvePath === 'function') {
                const resolvedPath = window.KnownFolders.resolvePath(folderId);
                if (resolvedPath) {
                    return resolvedPath;
                }
            }

            const folder = SPECIAL_FOLDER_DEFINITIONS.find(entry => entry.id === folderId);
            if (!folder) {
                return null;
            }

            return path.join(os.homedir(), ...folder.relativePath);
        }

        function normalizeRecycleBinState(state) {
            return {
                available: Boolean(state?.available),
                empty: Boolean(state?.empty ?? true),
                itemCount: Number.isFinite(Number(state?.itemCount)) ? Number(state.itemCount) : 0
            };
        }

        async function loadRecycleBinState() {
            if (!ipcRenderer || typeof ipcRenderer.invoke !== 'function') {
                return recycleBinState;
            }

            try {
                const nextState = await ipcRenderer.invoke('trash:get-info');
                recycleBinState = normalizeRecycleBinState(nextState);
            } catch (error) {
                console.warn('[File Explorer] Failed to load recycle bin state:', error);
            }

            return recycleBinState;
        }

        async function loadRecycleBinItems() {
            if (!ipcRenderer || typeof ipcRenderer.invoke !== 'function') {
                return [];
            }

            try {
                const result = await ipcRenderer.invoke('trash:list-items');
                const items = Array.isArray(result?.items)
                    ? result.items
                    : (result?.items ? [result.items] : []);

                return items
                    .map(item => ({
                        id: item?.id || `${item?.name || 'recycle-item'}-${item?.deletedAt || ''}-${item?.originalPath || ''}`,
                        name: item?.name || 'Unnamed item',
                        path: typeof item?.path === 'string' ? item.path : null,
                        originalPath: typeof item?.originalPath === 'string' ? item.originalPath : null,
                        deletedAt: typeof item?.deletedAt === 'string' ? item.deletedAt : null,
                        isDirectory: Boolean(item?.isDirectory),
                        extension: typeof item?.extension === 'string' ? item.extension.toLowerCase() : ''
                    }))
                    .sort((left, right) => {
                        const leftDeletedAt = left.deletedAt ? Date.parse(left.deletedAt) : 0;
                        const rightDeletedAt = right.deletedAt ? Date.parse(right.deletedAt) : 0;

                        if (leftDeletedAt !== rightDeletedAt) {
                            return rightDeletedAt - leftDeletedAt;
                        }

                        return left.name.toLowerCase().localeCompare(right.name.toLowerCase());
                    });
            } catch (error) {
                console.warn('[File Explorer] Failed to load recycle bin items:', error);
                return [];
            }
        }

        function getRecycleBinItemsSignature(items) {
            return items.map(item => [
                item.name,
                item.originalPath || '',
                item.deletedAt || '',
                item.isDirectory ? 'dir' : 'file',
                item.extension || ''
            ].join('|')).join('||');
        }

        function resolveLaunchTarget(launchOptions) {
            if (!launchOptions || typeof launchOptions !== 'object') {
                return null;
            }

            if (launchOptions.openFolderPath) {
                return {
                    type: 'path',
                    path: launchOptions.openFolderPath
                };
            }

            if (launchOptions.openSpecialFolderId === THIS_PC_LOCATION) {
                return { type: 'this-pc' };
            }

            if (launchOptions.openSpecialFolderId === RECYCLE_BIN_LOCATION) {
                return { type: RECYCLE_BIN_LOCATION };
            }

            const specialFolderPath = resolveSpecialFolderPath(launchOptions.openSpecialFolderId);
            if (specialFolderPath) {
                return {
                    type: 'path',
                    path: specialFolderPath
                };
            }

            return null;
        }

        async function drainPendingLaunchOptions() {
            if (!isInitialized || launchOptionsDrainInFlight || !pendingLaunchOptions) {
                return;
            }

            launchOptionsDrainInFlight = true;
            const launchOptions = pendingLaunchOptions;
            pendingLaunchOptions = null;

            try {
                await handleLaunchOptions(launchOptions);
            } finally {
                launchOptionsDrainInFlight = false;
                if (pendingLaunchOptions) {
                    drainPendingLaunchOptions();
                }
            }
        }

        async function handleLaunchOptions(launchOptions) {
            const launchTarget = resolveLaunchTarget(launchOptions);
            if (!launchTarget) {
                return;
            }

            if (launchTarget.type === 'this-pc') {
                if (currentLocation === THIS_PC_LOCATION) {
                    return;
                }

                console.log('[File Explorer] Applying launch target: This PC');
                pushHistoryEntry({ type: 'this-pc' });
                currentLocation = THIS_PC_LOCATION;
                currentPath = null;
                await updateView();
                return;
            }

            if (launchTarget.type === RECYCLE_BIN_LOCATION) {
                if (currentLocation === RECYCLE_BIN_LOCATION) {
                    return;
                }

                console.log('[File Explorer] Applying launch target: Recycle Bin');
                pushHistoryEntry({ type: RECYCLE_BIN_LOCATION });
                currentLocation = RECYCLE_BIN_LOCATION;
                currentPath = null;
                await updateView();
                return;
            }

            if (currentLocation === 'path' && currentPath && pathsMatch(currentPath, launchTarget.path)) {
                return;
            }

            console.log('[File Explorer] Applying launch folder:', launchTarget.path);
            pushHistoryEntry({ type: 'path', path: launchTarget.path });
            currentLocation = 'path';
            currentPath = launchTarget.path;
            await updateView();
        }

        function notifyParentWhenReady(attempt = 0) {
            if (!window.sendToParent) {

            if (!windowId && attempt < 20) {

                return;

        function initializeSidebarResize() {
            const resizeHandle = document.getElementById('sidebarResize');
            const sidebar = document.getElementById('explorerSidebar');
            let isResizing = false;
            let startX = 0;
            let startWidth = 0;

            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                document.body.style.cursor = 'ew-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const delta = e.clientX - startX;
                const newWidth = Math.max(150, Math.min(400, startWidth + delta));
                sidebar.style.width = `${newWidth}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        function handleSidebarClick(event) {
            const item = event.currentTarget;
            const location = item.dataset.location;

            // Don't navigate if clicking on disclosure triangle
            if (event.target.classList.contains('explorer-sidebar-disclosure')) {
                return;
            }

            // Don't navigate if item is non-navigable
            if (item.classList.contains('explorer-sidebar-item--non-navigable')) {
                return;
            }

            // Navigate based on location
            if (location === HOME_LOCATION) {
                navigateToHome();
                return;
            }

            if (location === THIS_PC_LOCATION) {
                navigateToThisPC();
                return;
            }

            if (location === RECYCLE_BIN_LOCATION) {
                navigateToRecycleBin();
                return;
            }

            if (location && location.startsWith('favorite:')) {
                const favoritePath = item.dataset.favoritePath || '';
                if (favoritePath) {
                    navigateToPath(favoritePath);
                }
                return;
            }

            const specialFolder = getSpecialFolderByLocation(location);
            if (specialFolder) {
                navigateToPath(specialFolder.path);
                return;
            }

            if (location === 'network') {
                // TODO: Implement network
                console.log('Network not yet implemented');
            }

        function handleDisclosureClick(event) {
            event.stopPropagation();

            const disclosure = event.currentTarget;
            const isExpanded = disclosure.dataset.expanded === 'true';

            // Update disclosure triangle

        async function renderFavoritesSidebar() {
            const container = document.querySelector('.explorer-sidebar-children[data-parent="favorites"]');
            if (!container) {

        function getKnownFolderEntries() {
            return SPECIAL_FOLDER_DEFINITIONS.map(definition => ({
                ...definition,
                path: path.join(os.homedir(), ...definition.relativePath)
            }));
        }

        function getSpecialFolderByLocation(location) {
            return getKnownFolderEntries().find(entry =>
                entry.id === location ||
                entry.sidebarLocation === location ||
                entry.thisPcLocation === location
            ) || null;
        }

        function normalizePathValue(targetPath) {
            if (!targetPath || typeof targetPath !== 'string') {
                return '';
            }

            const normalized = path.normalize(targetPath);
            return process.platform === 'win32' ? normalized.toLowerCase() : normalized;
        }

        function pathsMatch(leftPath, rightPath) {
            return normalizePathValue(leftPath) === normalizePathValue(rightPath);
        }

        function isPathInside(parentPath, candidatePath) {
            if (!parentPath || !candidatePath) {
                return false;
            }

            const relativePath = path.relative(parentPath, candidatePath);
            return Boolean(relativePath) && relativePath !== '.' && !relativePath.startsWith('..') && !path.isAbsolute(relativePath);
        }

        function findSpecialFolderByPath(targetPath) {
            return getKnownFolderEntries().find(entry => pathsMatch(entry.path, targetPath)) || null;
        }

        function findContainingSpecialFolder(targetPath) {
            return getKnownFolderEntries().find(entry => pathsMatch(entry.path, targetPath) || isPathInside(entry.path, targetPath)) || null;
        }

        function getFavoriteLocationKey(folderPath) {
            return `favorite:${normalizePathValue(folderPath)}`;
        }

        function getFavoriteDisplayMetadata(folderPath) {
            const exactKnownFolder = findSpecialFolderByPath(folderPath);
            if (exactKnownFolder) {
                return {
                    name: exactKnownFolder.name,
                    icon: exactKnownFolder.icon,
                    location: getFavoriteLocationKey(folderPath)
                };
            }

            return {
                name: path.basename(folderPath) || folderPath,
                icon: 'generic_folder',
                location: getFavoriteLocationKey(folderPath)
            };
        }

        async function getFavoriteFolderEntries() {
            const favoritePaths = await getFavoriteFolderPaths();
            favoriteFolderPathsCache = Array.isArray(favoritePaths) ? favoritePaths.slice() : [];
            const results = [];

            for (const favoritePath of favoritePaths) {
                try {
                    const stats = await fs.stat(favoritePath);
                    if (!stats.isDirectory()) {
                        continue;
                    }

                    const metadata = getFavoriteDisplayMetadata(favoritePath);
                    results.push({
                        id: metadata.location,
                        name: metadata.name,
                        icon: metadata.icon,
                        path: favoritePath,
                        sidebarLocation: metadata.location
                    });
                } catch (_error) {
                    // Skip inaccessible favorites.
                }
            }

            return results;
        }

        async function getAccessibleSpecialFolders(folderIds) {
            const candidates = folderIds
                .map(folderId => getKnownFolderEntries().find(entry => entry.id === folderId))
                .filter(Boolean);

            const checks = await Promise.all(candidates.map(async entry => {
                try {
                    const stats = await fs.stat(entry.path);
                    return stats.isDirectory() ? entry : null;
                } catch (error) {
                    return null;
                }
            }));

            return checks.filter(Boolean);
        }

        function getAvailableIconSizes(iconKey) {
            const configuredSizes = ICON_SIZE_AVAILABILITY[iconKey];
            if (Array.isArray(configuredSizes) && configuredSizes.length > 0) {
                return [...new Set(configuredSizes)].sort((left, right) => left - right);
            }

            return DEFAULT_ICON_SIZES;
        }

        function resolveIconPath(iconKey, desiredSize, fallbackIconKey = null) {
            const resolvedKey = iconKey || fallbackIconKey || 'generic_file';
            const sizes = getAvailableIconSizes(resolvedKey);
            const exactSizes = sizes.filter(size => size === desiredSize);
            const largerSizes = sizes.filter(size => size > desiredSize);
            const smallerSizes = sizes.filter(size => size < desiredSize).sort((left, right) => right - left);
            const candidateSize = [...exactSizes, ...largerSizes, ...smallerSizes][0];

            if (candidateSize) {
                return `../../../resources/images/icons/explorer/${resolvedKey}/${candidateSize}.png`;
            }

            if (fallbackIconKey && fallbackIconKey !== resolvedKey) {
                return resolveIconPath(fallbackIconKey, desiredSize);
            }

            return `../../../resources/images/icons/explorer/generic_file/48.png`;
        }

        function resolveHostIconPath(iconKey, desiredSize, fallbackIconKey = null) {
            return resolveIconPath(iconKey, desiredSize, fallbackIconKey).replace('../../../', '');
        }

        function getDisplayNameForRoot(rootPath) {
            if (process.platform === 'win32') {
                const driveLetter = path.parse(rootPath).root.charAt(0).toUpperCase();
                return driveLetter ? `Local Disk (${driveLetter}:)` : rootPath;
            }

            return rootPath === path.sep ? path.sep : rootPath.replace(/[\\/]+$/, '');
        }

        function appendBreadcrumbSegment(container, segment, isLast) {
            const crumb = document.createElement('span');
            crumb.className = `explorer-breadcrumb${segment.active ? ' active' : ''}`;
            crumb.textContent = segment.label;

            if (!segment.active && typeof segment.onClick === 'function') {
                crumb.addEventListener('click', segment.onClick);
            }

            container.appendChild(crumb);

            if (!isLast) {
                const separator = document.createElement('span');
                separator.className = 'explorer-breadcrumb-separator';
                separator.textContent = ' > ';
                container.appendChild(separator);
            }
        }

        function buildPathBreadcrumbs(targetPath) {
            const containingFolder = findContainingSpecialFolder(targetPath);

            if (containingFolder) {
                const segments = [
                    { label: 'Home', active: false, onClick: navigateToHome }
                ];
                const relativePath = path.relative(containingFolder.path, targetPath);
                const trailingSegments = relativePath && relativePath !== '.'
                    ? relativePath.split(path.sep).filter(Boolean)
                    : [];

                segments.push({
                    label: containingFolder.name,
                    active: trailingSegments.length === 0,
                    onClick: trailingSegments.length === 0 ? null : () => navigateToPath(containingFolder.path)
                });

                let partialPath = containingFolder.path;
                trailingSegments.forEach((segment, index) => {
                    partialPath = path.join(partialPath, segment);
                    const segmentPath = partialPath;
                    segments.push({
                        label: segment,
                        active: index === trailingSegments.length - 1,
                        onClick: index === trailingSegments.length - 1 ? null : () => navigateToPath(segmentPath)
                    });
                });

                return segments;
            }

            const segments = [
                { label: 'This PC', active: false, onClick: navigateToThisPC }
            ];
            const parsedPath = path.parse(targetPath);
            const rootPath = parsedPath.root || targetPath;
            const relativePath = rootPath ? path.relative(rootPath, targetPath) : '';
            const trailingSegments = relativePath && relativePath !== '.'
                ? relativePath.split(path.sep).filter(Boolean)
                : [];

            segments.push({
                label: getDisplayNameForRoot(rootPath),
                active: trailingSegments.length === 0,
                onClick: trailingSegments.length === 0 ? null : () => navigateToPath(rootPath)
            });

            let partialPath = rootPath;
            trailingSegments.forEach((segment, index) => {
                partialPath = path.join(partialPath, segment);
                const segmentPath = partialPath;
                segments.push({
                    label: segment,
                    active: index === trailingSegments.length - 1,
                    onClick: index === trailingSegments.length - 1 ? null : () => navigateToPath(segmentPath)
                });
            });

            return segments;
        }

        function getCurrentAddressIconKey() {
            if (currentLocation === HOME_LOCATION) {
                return 'folder_home';
            }

            if (currentLocation === THIS_PC_LOCATION) {
                return 'this_pc';
            }

            if (currentLocation === RECYCLE_BIN_LOCATION) {
                return recycleBinState.empty ? 'recycle_bin/empty' : 'recycle_bin/full';
            }

            const exactFolder = findSpecialFolderByPath(currentPath);
            if (exactFolder) {
                return exactFolder.icon;
            }

            const parsedPath = currentPath ? path.parse(currentPath) : null;
            if (parsedPath && parsedPath.root && pathsMatch(parsedPath.root, currentPath)) {
                return 'main_drive';
            }

            return 'generic_folder';
        }

        function getCurrentLocationLabel() {
            if (currentLocation === HOME_LOCATION) {
                return 'Home';
            }

            if (currentLocation === THIS_PC_LOCATION) {
                return 'This PC';
            }

            if (currentLocation === RECYCLE_BIN_LOCATION) {
                return 'Recycle Bin';
            }

            const exactFolder = findSpecialFolderByPath(currentPath);
            if (exactFolder) {
                return exactFolder.name;
            }

            if (currentPath) {
                const parsedPath = path.parse(currentPath);
                if (parsedPath.root && pathsMatch(parsedPath.root, currentPath)) {
                    return getDisplayNameForRoot(currentPath);
                }
            }

            return currentPath ? path.basename(currentPath) : 'File Explorer';
        }

        function getActiveSidebarLocations() {
            if (currentLocation === HOME_LOCATION) {
                return [HOME_LOCATION];
            }

            if (currentLocation === THIS_PC_LOCATION) {
                return [THIS_PC_LOCATION];
            }

            if (currentLocation === RECYCLE_BIN_LOCATION) {
                return [RECYCLE_BIN_LOCATION];
            }

            const specialFolder = findContainingSpecialFolder(currentPath);
            if (specialFolder) {
                const activeLocations = [
                    specialFolder.id,
                    specialFolder.sidebarLocation,
                    specialFolder.thisPcLocation
                ].filter(Boolean);
                activeLocations.push(getFavoriteLocationKey(specialFolder.path));
                return activeLocations;
            }

            if (currentPath) {
                const containingFavoritePath = favoriteFolderPathsCache.find(folderPath =>
                    pathsMatch(folderPath, currentPath) || isPathInside(folderPath, currentPath)
                );

                return [
                    containingFavoritePath ? getFavoriteLocationKey(containingFavoritePath) : getFavoriteLocationKey(currentPath),
                    THIS_PC_LOCATION
                ];
            }

            return [THIS_PC_LOCATION];
        }

        function syncSidebarActiveState() {
            const activeLocations = new Set(getActiveSidebarLocations());
            document.querySelectorAll('.explorer-sidebar-item').forEach(item => item.classList.remove('active'));

            if (!activeLocations.size) {
                return;
            }

            document.querySelectorAll('.explorer-sidebar-item').forEach(item => {
                if (activeLocations.has(item.dataset.location)) {
                    item.classList.add('active');
                }
            });
        }

        function handleSectionHeaderClick(event) {
            const header = event.currentTarget;
            const sectionName = header.dataset.section;
            const disclosure = header.querySelector('.explorer-section-disclosure');

            // Check if the click was on the disclosure triangle
            const clickedDisclosure = event.target === disclosure || disclosure.contains(event.target);

            if (clickedDisclosure) {
                // Toggle expand/collapse
                if (!disclosure) return;

                const isExpanded = disclosure.dataset.expanded === 'true';
                const newExpandedState = !isExpanded;

                // Update disclosure triangle
                disclosure.dataset.expanded = newExpandedState.toString();

                // Find and toggle the content container
                const contentContainer = document.querySelector(`.explorer-section-content[data-section="${sectionName}"]`);
                if (contentContainer) {
                    contentContainer.dataset.expanded = newExpandedState.toString();

                    // Update max-height for smooth animation
                    if (newExpandedState) {
                        contentContainer.style.maxHeight = contentContainer.scrollHeight + 'px';
                    } else {
                        contentContainer.style.maxHeight = '0px';
                    }
                }
            } else {
                // Select all items in this section
                selectAllInSection(sectionName, header);
            }
        }

        function selectAllInSection(sectionName, header) {
            // Clear all selections first
            clearSelection();

            // Remove selected state from all section headers
            document.querySelectorAll('.explorer-section-header--collapsible').forEach(h => {
                h.classList.remove('is-selected');

            header.classList.add('is-selected');

            // Find the content container for this section
            const contentContainer = document.querySelector(`.explorer-section-content[data-section="${sectionName}"]`);
            if (!contentContainer) return;

            // Select all items in this section
            const items = contentContainer.querySelectorAll('.explorer-icon-item');

        function initializeSectionHeights() {

            document.querySelectorAll('.explorer-section-content').forEach(container => {

        function handleViewChange(event) {

        function updateRecycleBinSidebarIcon() {
            const sidebarIcon = document.getElementById('recycleBinSidebarIcon');
            if (!sidebarIcon) {
                return;
            }

            const recycleIconKey = recycleBinState.empty ? 'recycle_bin/empty' : 'recycle_bin/full';

        function syncRecycleBinPolling() {
            if (currentLocation !== RECYCLE_BIN_LOCATION) {
                if (recycleBinPollTimer) {
                    clearInterval(recycleBinPollTimer);
                    recycleBinPollTimer = null;
                }
                return;
            }

            if (recycleBinPollTimer) {
                return;
            }

            recycleBinPollTimer = setInterval(() => {
                void refreshVisibleRecycleBinIfNeeded();
            }, 5000);
        }

        async function applyRecycleBinStateUpdate(nextState) {
            recycleBinState = normalizeRecycleBinState(nextState);
            updateRecycleBinSidebarIcon();

            if (currentLocation !== RECYCLE_BIN_LOCATION) return;

            const content = document.getElementById('content');
            hideExplorerContextMenu();
            cancelInlineRename();
            content.innerHTML = '';
            clearSelection();
            renderedEntryElementsByPath = new Map();
            await renderRecycleBinView();
            updateBreadcrumbs();
            updateTitlebar();
        }

        async function refreshVisibleRecycleBinIfNeeded() {
            if (currentLocation !== RECYCLE_BIN_LOCATION) {
                return;
            }

            const previousState = { ...recycleBinState };
            const nextState = await loadRecycleBinState();
            const nextItems = await loadRecycleBinItems();
            const nextSignature = getRecycleBinItemsSignature(nextItems);

            if (nextState.available !== previousState.available
                || nextState.empty !== previousState.empty
                || nextState.itemCount !== previousState.itemCount
                || nextSignature !== recycleBinItemsSignature) {
                recycleBinState = nextState;
                recycleBinItemsSignature = nextSignature;
                await updateView();
            }
        }

        async function updateView() {
            const content = document.getElementById('content');
            hideExplorerContextMenu();
            cancelInlineRename();
            content.innerHTML = '';
            clearSelection();
            renderedEntryElementsByPath = new Map();
            recycleBinState = await loadRecycleBinState();

            if (currentLocation === HOME_LOCATION) {
                await renderHome();
            } else if (currentLocation === THIS_PC_LOCATION) {
                await renderThisPC();
            } else if (currentLocation === RECYCLE_BIN_LOCATION) {
                await renderRecycleBinView();
            } else if (currentPath) {
                await renderFolderView(currentPath);
            }

            await renderFavoritesSidebar();
            updateRecycleBinSidebarIcon();
            syncRecycleBinPolling();
            syncSidebarActiveState();
            updateNavigationButtons();
            updateBreadcrumbs();
            updateSearchPlaceholder();
            updateTitlebar();
            applyPendingSelection();
        }

        function formatDriveCapacity(bytes) {
            const units = [
                { label: 'TB', size: 1024 ** 4 },
                { label: 'GB', size: 1024 ** 3 },
                { label: 'MB', size: 1024 ** 2 },
                { label: 'KB', size: 1024 }
            ];
            const unit = units.find(({ size }) => bytes >= size) || units[units.length - 1];
            const value = bytes / unit.size;
            const fractionDigits = value >= 100 ? 0 : 1;

            return `${value.toFixed(fractionDigits).replace(/\.0$/, '')} ${unit.label}`;
        }

        async function getDriveUsageStats(drivePath) {
            if (typeof fs.statfs !== 'function') {
                return null;
            }

            try {
                const stats = await fs.statfs(drivePath);
                const blockSize = Number(stats.bsize || stats.frsize || 0);
                const totalBlocks = Number(stats.blocks || 0);
                const freeBlocks = Number(stats.bavail ?? stats.bfree ?? 0);
                const totalBytes = blockSize * totalBlocks;
                const freeBytes = blockSize * freeBlocks;

                if (!Number.isFinite(totalBytes) || totalBytes <= 0 || !Number.isFinite(freeBytes)) {
                    return null;
                }

                const clampedFreeBytes = Math.max(0, Math.min(totalBytes, freeBytes));

                return {
                    totalBytes,
                    freeBytes: clampedFreeBytes,
                    usedPercent: Math.max(0, Math.min(100, ((totalBytes - clampedFreeBytes) / totalBytes) * 100)),
                    usageText: `${formatDriveCapacity(clampedFreeBytes)} free of ${formatDriveCapacity(totalBytes)}`
                };
            } catch (error) {
                return null;
            }
        }

        async function getAvailableDrives() {
            const drives = [];

            // Add main system drive
            const mainDrive = {
                id: 'main-drive',
                name: process.platform === 'win32' ? 'Local Disk (C:)' : 'Macintosh HD',
                icon: 'main_drive',
                path: process.platform === 'win32' ? 'C:\\' : '/',
                isDrive: true,
                usage: await getDriveUsageStats(process.platform === 'win32' ? 'C:\\' : '/')
            };
            drives.push(mainDrive);

            // Detect external drives
            if (process.platform === 'darwin') {
                // macOS - check /Volumes for mounted drives
                try {
                    const volumesPath = '/Volumes';
                    const volumes = await fs.readdir(volumesPath, { withFileTypes: true });

                    for (const volume of volumes) {
                        if (volume.isDirectory()) {
                            const volumePath = path.join(volumesPath, volume.name);

                            // Skip Macintosh HD (it's the main drive)
                            if (volume.name === 'Macintosh HD') continue;

                            // Verify the volume is accessible
                            try {
                                await fs.access(volumePath);
                                drives.push({
                                    id: `volume-${volume.name}`,
                                    name: volume.name,
                                    icon: 'external_drive',
                                    path: volumePath,
                                    isDrive: true,
                                    usage: await getDriveUsageStats(volumePath)
                                });
                            } catch (error) {
                                // Volume not accessible, skip it
                                console.log(`Skipping inaccessible volume: ${volume.name}`);
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error reading volumes:', error);
                }
            } else if (process.platform === 'win32') {
                // Windows - check common drive letters
                const driveLetters = ['D', 'E', 'F', 'G', 'H'];
                for (const letter of driveLetters) {
                    const drivePath = `${letter}:\\`;
                    try {
                        await fs.access(drivePath);
                        drives.push({
                            id: `drive-${letter}`,
                            name: `Local Disk (${letter}:)`,
                            icon: 'external_drive',
                            path: drivePath,
                            isDrive: true,
                            usage: await getDriveUsageStats(drivePath)
                        });
                    } catch (error) {
                        // Drive doesn't exist or not accessible
                    }
                }
            }

            return drives;
        }
