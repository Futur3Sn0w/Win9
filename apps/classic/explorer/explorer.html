<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>File Explorer</title>
    <link rel="stylesheet" href="explorer.css">
    <link rel="stylesheet" href="../../../css/classic-windows.css">
    <link rel="stylesheet" href="../../../css/classic-controls.css">
    <link rel="stylesheet" href="../../../css/styles.css">
    <link rel="stylesheet" href="../../../css/fonts.css">

    <link href="https://cdn.metroui.org.ua/4.5.12/icons.css" rel="stylesheet">

</head>

<body>
    <div class="explorer">
        <!-- Command Bar -->
        <div class="explorer-command-bar">
            <div class="explorer-command-tabs">
                <button class="explorer-command-tab active" data-tab="file">File</button>
                <button class="explorer-command-tab" data-tab="computer">Computer</button>
                <button class="explorer-command-tab" data-tab="view">View</button>
            </div>
        </div>

        <!-- Navigation Bar (matching Control Panel exactly) -->
        <div class="explorer-nav-bar">
            <div class="explorer-nav-buttons">
                <button class="explorer-nav-btn" id="backBtn" disabled title="Back">
                    <span class="mif-arrow-left"></span>
                </button>
                <button class="explorer-nav-btn" id="forwardBtn" disabled title="Forward">
                    <span class="mif-arrow-right"></span>
                </button>
                <button class="explorer-nav-btn" id="upBtn" disabled title="Up one level">
                    <span class="mif-arrow-up"></span>
                </button>
            </div>
            <div class="explorer-address-bar">
                <img src="../../../resources/images/icons/explorer/folder_home/16.png" class="explorer-address-icon"
                    id="addressIcon" alt="Home">
                <div class="explorer-breadcrumbs" id="breadcrumbs">
                    <span class="explorer-breadcrumb active">Home</span>
                </div>
            </div>
            <div class="explorer-search-box">
                <input type="text" id="searchInput" placeholder="Search Home" />
                <span class="mif-search"></span>
            </div>
        </div>

        <!-- Main Container -->
        <div class="explorer-main">
            <!-- Sidebar -->
            <div class="explorer-sidebar" id="explorerSidebar">
                <div class="explorer-sidebar-section explorer-sidebar-section--pinned">
                    <div class="explorer-sidebar-item active" data-location="home">
                        <img src="../../../resources/images/icons/explorer/folder_home/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Home</span>
                    </div>
                </div>

                <div class="explorer-sidebar-section">
                    <div class="explorer-sidebar-item explorer-sidebar-item--expandable explorer-sidebar-item--non-navigable"
                        data-location="favorites">
                        <span class="explorer-sidebar-disclosure" data-expanded="true">▼</span>
                        <img src="../../../resources/images/icons/explorer/folder_favorites/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Favorites</span>
                    </div>
                    <div class="explorer-sidebar-children" data-parent="favorites">
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="desktop">
                            <img src="../../../resources/images/icons/explorer/desktop/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Desktop</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="downloads">
                            <img src="../../../resources/images/icons/explorer/folder_downloads/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Downloads</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="videos">
                            <img src="../../../resources/images/icons/explorer/folder_videos/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Videos</span>
                        </div>
                    </div>
                </div>

                <div class="explorer-sidebar-section">
                    <div class="explorer-sidebar-item explorer-sidebar-item--expandable" data-location="this-pc">
                        <span class="explorer-sidebar-disclosure" data-expanded="true">▼</span>
                        <img src="../../../resources/images/icons/explorer/this_pc/16.png"
                            class="explorer-sidebar-icon" />
                        <span>This PC</span>
                    </div>
                    <div class="explorer-sidebar-children" data-parent="this-pc">
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="desktop-folder">
                            <img src="../../../resources/images/icons/explorer/desktop/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Desktop</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="documents">
                            <img src="../../../resources/images/icons/explorer/folder_documents/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Documents</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested"
                            data-location="downloads-folder">
                            <img src="../../../resources/images/icons/explorer/folder_downloads/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Downloads</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="music">
                            <img src="../../../resources/images/icons/explorer/folder_music/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Music</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="pictures">
                            <img src="../../../resources/images/icons/explorer/folder_pictures/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Pictures</span>
                        </div>
                        <div class="explorer-sidebar-item explorer-sidebar-item--nested" data-location="videos">
                            <img src="../../../resources/images/icons/explorer/folder_videos/16.png"
                                class="explorer-sidebar-icon" />
                            <span>Videos</span>
                        </div>
                    </div>
                </div>

                <div class="explorer-sidebar-section">
                    <div class="explorer-sidebar-item explorer-sidebar-item--non-navigable" data-location="network">
                        <img src="../../../resources/images/icons/explorer/network/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Network</span>
                    </div>
                    <div class="explorer-sidebar-item explorer-sidebar-item--non-navigable explorer-sidebar-item--spaced" data-location="homegroup">
                        <img src="../../../resources/images/icons/explorer/homegroup/16.png"
                            class="explorer-sidebar-icon" />
                        <span>Homegroup</span>
                    </div>
                </div>
            </div>

            <!-- Resize Handle -->
            <div class="explorer-sidebar-resize" id="sidebarResize"></div>

            <!-- Content Area -->
            <div class="explorer-content" id="content">
                <!-- Content will be dynamically populated -->
            </div>
        </div>

        <!-- Status Bar -->
        <div class="explorer-status-bar">
            <div class="explorer-status-info" id="statusInfo">8 items</div>
            <div class="explorer-status-selected" id="statusSelected" style="display: none;">0 items selected</div>
            <div class="explorer-status-view-controls">
                <button class="explorer-view-btn" title="Extra large icons" data-view="extra-large">
                    <span class="mif-apps"></span>
                </button>
                <button class="explorer-view-btn active" title="Large icons" data-view="large">
                    <span class="mif-apps"></span>
                </button>
                <button class="explorer-view-btn" title="Medium icons" data-view="medium">
                    <span class="mif-apps"></span>
                </button>
                <button class="explorer-view-btn" title="List" data-view="list">
                    <span class="mif-list"></span>
                </button>
                <button class="explorer-view-btn" title="Details" data-view="details">
                    <span class="mif-list2"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = 'explorer';
        const os = require('os');
        const path = require('path');
        const fs = require('fs').promises;
        const HOME_LOCATION = 'home';
        const THIS_PC_LOCATION = 'this-pc';
        const HOME_FAVORITE_LOCATIONS = ['desktop', 'downloads', 'videos'];
        const HOME_FREQUENT_LOCATIONS = ['desktop', 'documents', 'downloads', 'music', 'pictures', 'videos'];
        const HOME_RECENT_FILE_LIMIT = 8;
        const DEFAULT_ICON_SIZES = [16, 20, 24, 32, 40, 48, 64, 80, 96, 128, 256, 512, 768];
        const ICON_SIZE_AVAILABILITY = {
            'bat': [16, 32, 48, 256],
            'desktop': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'dll': [16, 32, 48, 256],
            'external_drive': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'folder_documents': [16, 24, 32, 48, 256],
            'folder_downloads': [16, 24, 32, 48, 256],
            'folder_favorites': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'folder_home': [16, 20, 24, 32, 40, 48, 64, 80, 96, 768],
            'folder_music': [16, 24, 32, 48, 64, 256],
            'folder_pictures': [16, 24, 32, 48, 256],
            'folder_recent-places': [16, 20, 24, 32, 40, 48, 64, 80, 96],
            'folder_videos': [16, 24, 32, 48, 256],
            'generic_file': [16, 32, 48, 256],
            'generic_folder': [16, 32, 48],
            'generic_program': [16, 20, 24, 32, 40, 48, 64, 256],
            'homegroup': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'image/jpg': [16, 32, 48],
            'image/png': [16, 32, 48],
            'ini': [16, 32, 48, 256],
            'iso': [16, 24, 32, 48, 256],
            'main_drive': [16, 24, 32, 48, 64, 96, 128],
            'music': [16, 32, 48],
            'network': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'rich_text_document': [16, 24, 48],
            'text_document': [16, 32, 48],
            'this_pc': [16, 20, 24, 32, 40, 48, 64, 80, 96, 256, 512, 768],
            'video': [16, 32, 48],
            'zip': [16, 32, 48]
        };
        const SPECIAL_FOLDER_DEFINITIONS = [
            { id: 'desktop', name: 'Desktop', icon: 'desktop', relativePath: ['Desktop'], sidebarLocation: 'desktop', thisPcLocation: 'desktop-folder' },
            { id: 'documents', name: 'Documents', icon: 'folder_documents', relativePath: ['Documents'], sidebarLocation: 'documents', thisPcLocation: 'documents' },
            { id: 'downloads', name: 'Downloads', icon: 'folder_downloads', relativePath: ['Downloads'], sidebarLocation: 'downloads', thisPcLocation: 'downloads-folder' },
            { id: 'music', name: 'Music', icon: 'folder_music', relativePath: ['Music'], sidebarLocation: 'music', thisPcLocation: 'music' },
            { id: 'pictures', name: 'Pictures', icon: 'folder_pictures', relativePath: ['Pictures'], sidebarLocation: 'pictures', thisPcLocation: 'pictures' },
            { id: 'videos', name: 'Videos', icon: 'folder_videos', relativePath: ['Videos'], sidebarLocation: 'videos', thisPcLocation: 'videos' }
        ];

        // Window ID for multi-window support
        let windowId = null;

        // Check if running in Electron webview (has ipcRenderer)
        const isWebview = typeof require !== 'undefined';
        let ipcRenderer = null;

        if (isWebview) {
            try {
                const { ipcRenderer: ipc } = require('electron');
                ipcRenderer = ipc;

                // Listen for windowId from parent
                ipcRenderer.on('setWindowId', (event, data) => {
                    windowId = data.windowId;
                    console.log('Explorer window ID set:', windowId);
                });

                ipcRenderer.on('setLaunchOptions', (event, data) => {
                    queueLaunchOptions(data?.launchOptions);
                });

                ipcRenderer.on('host-command', (event, data) => {
                    handleHostCommand(data);
                });

                // Helper function to send messages to parent
                window.sendToParent = function(action, data) {
                    const messageData = {
                        action,
                        windowId,
                        appId: APP_ID,
                        ...data
                    };
                    ipcRenderer.sendToHost('window-message', messageData);
                };
            } catch (e) {
                console.warn('Failed to set up IPC:', e);
            }
        } else {
            // Fallback for iframe context
            window.sendToParent = function(action, data) {
                window.parent.postMessage({
                    action,
                    windowId,
                    appId: APP_ID,
                    ...data
                }, '*');
            };

            // Listen for postMessage
            window.addEventListener('message', function(e) {
                if (e.data.action === 'setWindowId') {
                    windowId = e.data.windowId;
                    console.log('Explorer window ID set:', windowId);
                } else if (e.data.action === 'setLaunchOptions') {
                    queueLaunchOptions(e.data.launchOptions);
                } else {
                    handleHostCommand(e.data);
                }
            });
        }

        let currentLocation = HOME_LOCATION;
        let currentPath = null;
        let navigationHistory = [];
        let historyIndex = -1;
        let currentView = 'large';
        let selectedItems = new Set();
        let isInitialized = false;
        let pendingLaunchOptions = window.launchOptions && typeof window.launchOptions === 'object'
            ? { ...window.launchOptions }
            : null;
        let launchOptionsDrainInFlight = false;
        let dragSelectState = {
            active: false,
            originX: 0,
            originY: 0,
            overlay: null
        };

        // Initialize on load (use 'load' instead of 'DOMContentLoaded' to ensure launchOptions are set)
        window.addEventListener('load', initialize);

        async function initialize() {
            const launchOptions = pendingLaunchOptions ? { ...pendingLaunchOptions } : {};
            pendingLaunchOptions = null;
            console.log('[File Explorer] Initialize with launchOptions:', launchOptions);

            const launchTarget = resolveLaunchTarget(launchOptions);
            if (launchTarget?.type === 'this-pc') {
                console.log('[File Explorer] Opening location: This PC');
                currentLocation = THIS_PC_LOCATION;
                currentPath = null;
                pushHistoryEntry({ type: 'this-pc' });
            } else if (launchTarget?.type === 'path') {
                console.log('[File Explorer] Opening folder:', launchTarget.path);
                currentLocation = 'path';
                currentPath = launchTarget.path;
                pushHistoryEntry({ type: 'path', path: launchTarget.path });
            } else {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                pushHistoryEntry({ type: 'home' });
            }

            await updateView();
            bindEventListeners();
            initializeSidebarResize();
            isInitialized = true;
            notifyParentWhenReady();
            drainPendingLaunchOptions();
        }

        async function handleHostCommand(command) {
            if (!command || typeof command.action !== 'string') {
                return;
            }

            if (command.action === 'resetForPreload') {
                await resetForPreload();
            }
        }

        async function resetForPreload() {
            currentLocation = HOME_LOCATION;
            currentPath = null;
            navigationHistory = [];
            historyIndex = -1;
            selectedItems = new Set();
            pushHistoryEntry({ type: 'home' });

            await updateView();
        }

        function queueLaunchOptions(launchOptions) {
            if (!launchOptions || typeof launchOptions !== 'object') {
                return;
            }

            pendingLaunchOptions = {
                ...(pendingLaunchOptions || {}),
                ...launchOptions
            };

            if (isInitialized) {
                drainPendingLaunchOptions();
            }
        }

        function resolveSpecialFolderPath(folderId) {
            if (typeof folderId !== 'string' || !folderId) {
                return null;
            }

            const folder = SPECIAL_FOLDER_DEFINITIONS.find(entry => entry.id === folderId);
            if (!folder) {
                return null;
            }

            return path.join(os.homedir(), ...folder.relativePath);
        }

        function resolveLaunchTarget(launchOptions) {
            if (!launchOptions || typeof launchOptions !== 'object') {
                return null;
            }

            if (launchOptions.openFolderPath) {
                return {
                    type: 'path',
                    path: launchOptions.openFolderPath
                };
            }

            if (launchOptions.openSpecialFolderId === THIS_PC_LOCATION) {
                return { type: 'this-pc' };
            }

            const specialFolderPath = resolveSpecialFolderPath(launchOptions.openSpecialFolderId);
            if (specialFolderPath) {
                return {
                    type: 'path',
                    path: specialFolderPath
                };
            }

            return null;
        }

        async function drainPendingLaunchOptions() {
            if (!isInitialized || launchOptionsDrainInFlight || !pendingLaunchOptions) {
                return;
            }

            launchOptionsDrainInFlight = true;
            const launchOptions = pendingLaunchOptions;
            pendingLaunchOptions = null;

            try {
                await handleLaunchOptions(launchOptions);
            } finally {
                launchOptionsDrainInFlight = false;
                if (pendingLaunchOptions) {
                    drainPendingLaunchOptions();
                }
            }
        }

        async function handleLaunchOptions(launchOptions) {
            const launchTarget = resolveLaunchTarget(launchOptions);
            if (!launchTarget) {
                return;
            }

            if (launchTarget.type === 'this-pc') {
                if (currentLocation === THIS_PC_LOCATION) {
                    return;
                }

                console.log('[File Explorer] Applying launch target: This PC');
                pushHistoryEntry({ type: 'this-pc' });
                currentLocation = THIS_PC_LOCATION;
                currentPath = null;
                await updateView();
                return;
            }

            if (currentLocation === 'path' && currentPath && pathsMatch(currentPath, launchTarget.path)) {
                return;
            }

            console.log('[File Explorer] Applying launch folder:', launchTarget.path);
            pushHistoryEntry({ type: 'path', path: launchTarget.path });
            currentLocation = 'path';
            currentPath = launchTarget.path;
            await updateView();
        }

        function notifyParentWhenReady(attempt = 0) {
            if (!window.sendToParent) {
                return;
            }

            if (!windowId && attempt < 20) {
                setTimeout(() => notifyParentWhenReady(attempt + 1), 50);
                return;
            }

            window.sendToParent('classicAppReady');
        }

        function bindEventListeners() {
            // Navigation buttons
            document.getElementById('backBtn').addEventListener('click', navigateBack);
            document.getElementById('forwardBtn').addEventListener('click', navigateForward);
            document.getElementById('upBtn').addEventListener('click', navigateUp);

            // Search
            document.getElementById('searchInput').addEventListener('input', handleSearch);

            // Sidebar items
            document.querySelectorAll('.explorer-sidebar-item').forEach(item => {
                item.addEventListener('click', handleSidebarClick);
            });

            // Disclosure triangles
            document.querySelectorAll('.explorer-sidebar-disclosure').forEach(disclosure => {
                disclosure.addEventListener('click', handleDisclosureClick);
            });

            // View controls
            document.querySelectorAll('.explorer-view-btn').forEach(btn => {
                btn.addEventListener('click', handleViewChange);
            });

            // Command tabs
            document.querySelectorAll('.explorer-command-tab').forEach(tab => {
                tab.addEventListener('click', handleCommandTabClick);
            });

            // Content area for drag selection
            document.getElementById('content').addEventListener('mousedown', handleContentMouseDown);

            // Initialize children container heights
            initializeChildrenHeights();
        }

        function initializeSidebarResize() {
            const resizeHandle = document.getElementById('sidebarResize');
            const sidebar = document.getElementById('explorerSidebar');
            let isResizing = false;
            let startX = 0;
            let startWidth = 0;

            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                document.body.style.cursor = 'ew-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const delta = e.clientX - startX;
                const newWidth = Math.max(150, Math.min(400, startWidth + delta));
                sidebar.style.width = `${newWidth}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        function handleSidebarClick(event) {
            const item = event.currentTarget;
            const location = item.dataset.location;

            // Don't navigate if clicking on disclosure triangle
            if (event.target.classList.contains('explorer-sidebar-disclosure')) {
                return;
            }

            // Don't navigate if item is non-navigable
            if (item.classList.contains('explorer-sidebar-item--non-navigable')) {
                return;
            }

            // Navigate based on location
            if (location === HOME_LOCATION) {
                navigateToHome();
                return;
            }

            if (location === THIS_PC_LOCATION) {
                navigateToThisPC();
                return;
            }

            const specialFolder = getSpecialFolderByLocation(location);
            if (specialFolder) {
                navigateToPath(specialFolder.path);
                return;
            }

            if (location === 'network') {
                // TODO: Implement network
                console.log('Network not yet implemented');
            }
        }

        function handleDisclosureClick(event) {
            event.stopPropagation();

            const disclosure = event.currentTarget;
            const isExpanded = disclosure.dataset.expanded === 'true';
            const newExpandedState = !isExpanded;

            // Update disclosure triangle
            disclosure.dataset.expanded = newExpandedState.toString();

            // Find the parent item's location
            const parentItem = disclosure.closest('.explorer-sidebar-item');
            const parentLocation = parentItem.dataset.location;

            // Find and toggle the children container
            const childrenContainer = document.querySelector(`.explorer-sidebar-children[data-parent="${parentLocation}"]`);
            if (childrenContainer) {
                childrenContainer.dataset.expanded = newExpandedState.toString();

                // Update max-height for smooth animation
                if (newExpandedState) {
                    childrenContainer.style.maxHeight = childrenContainer.scrollHeight + 'px';
                } else {
                    childrenContainer.style.maxHeight = '0px';
                }
            }
        }

        function initializeChildrenHeights() {
            // Set initial max-height for expanded children containers
            document.querySelectorAll('.explorer-sidebar-children').forEach(container => {
                const parentLocation = container.dataset.parent;
                const disclosure = document.querySelector(`.explorer-sidebar-item[data-location="${parentLocation}"] .explorer-sidebar-disclosure`);
                const isExpanded = disclosure ? disclosure.dataset.expanded !== 'false' : true;
                container.style.maxHeight = isExpanded ? `${container.scrollHeight}px` : '0px';
                container.dataset.expanded = isExpanded ? 'true' : 'false';
            });
        }

        function getKnownFolderEntries() {
            return SPECIAL_FOLDER_DEFINITIONS.map(definition => ({
                ...definition,
                path: path.join(os.homedir(), ...definition.relativePath)
            }));
        }

        function getSpecialFolderByLocation(location) {
            return getKnownFolderEntries().find(entry =>
                entry.id === location ||
                entry.sidebarLocation === location ||
                entry.thisPcLocation === location
            ) || null;
        }

        function normalizePathValue(targetPath) {
            if (!targetPath || typeof targetPath !== 'string') {
                return '';
            }

            const normalized = path.normalize(targetPath);
            return process.platform === 'win32' ? normalized.toLowerCase() : normalized;
        }

        function pathsMatch(leftPath, rightPath) {
            return normalizePathValue(leftPath) === normalizePathValue(rightPath);
        }

        function isPathInside(parentPath, candidatePath) {
            if (!parentPath || !candidatePath) {
                return false;
            }

            const relativePath = path.relative(parentPath, candidatePath);
            return Boolean(relativePath) && relativePath !== '.' && !relativePath.startsWith('..') && !path.isAbsolute(relativePath);
        }

        function findSpecialFolderByPath(targetPath) {
            return getKnownFolderEntries().find(entry => pathsMatch(entry.path, targetPath)) || null;
        }

        function findContainingSpecialFolder(targetPath) {
            return getKnownFolderEntries().find(entry => pathsMatch(entry.path, targetPath) || isPathInside(entry.path, targetPath)) || null;
        }

        async function getAccessibleSpecialFolders(folderIds) {
            const candidates = folderIds
                .map(folderId => getKnownFolderEntries().find(entry => entry.id === folderId))
                .filter(Boolean);

            const checks = await Promise.all(candidates.map(async entry => {
                try {
                    const stats = await fs.stat(entry.path);
                    return stats.isDirectory() ? entry : null;
                } catch (error) {
                    return null;
                }
            }));

            return checks.filter(Boolean);
        }

        function getAvailableIconSizes(iconKey) {
            const configuredSizes = ICON_SIZE_AVAILABILITY[iconKey];
            if (Array.isArray(configuredSizes) && configuredSizes.length > 0) {
                return [...new Set(configuredSizes)].sort((left, right) => left - right);
            }

            return DEFAULT_ICON_SIZES;
        }

        function resolveIconPath(iconKey, desiredSize, fallbackIconKey = null) {
            const resolvedKey = iconKey || fallbackIconKey || 'generic_file';
            const sizes = getAvailableIconSizes(resolvedKey);
            const exactSizes = sizes.filter(size => size === desiredSize);
            const largerSizes = sizes.filter(size => size > desiredSize);
            const smallerSizes = sizes.filter(size => size < desiredSize).sort((left, right) => right - left);
            const candidateSize = [...exactSizes, ...largerSizes, ...smallerSizes][0];

            if (candidateSize) {
                return `../../../resources/images/icons/explorer/${resolvedKey}/${candidateSize}.png`;
            }

            if (fallbackIconKey && fallbackIconKey !== resolvedKey) {
                return resolveIconPath(fallbackIconKey, desiredSize);
            }

            return `../../../resources/images/icons/explorer/generic_file/48.png`;
        }

        function resolveHostIconPath(iconKey, desiredSize, fallbackIconKey = null) {
            return resolveIconPath(iconKey, desiredSize, fallbackIconKey).replace('../../../', '');
        }

        function getDisplayNameForRoot(rootPath) {
            if (process.platform === 'win32') {
                const driveLetter = path.parse(rootPath).root.charAt(0).toUpperCase();
                return driveLetter ? `Local Disk (${driveLetter}:)` : rootPath;
            }

            return rootPath === path.sep ? path.sep : rootPath.replace(/[\\/]+$/, '');
        }

        function appendBreadcrumbSegment(container, segment, isLast) {
            const crumb = document.createElement('span');
            crumb.className = `explorer-breadcrumb${segment.active ? ' active' : ''}`;
            crumb.textContent = segment.label;

            if (!segment.active && typeof segment.onClick === 'function') {
                crumb.addEventListener('click', segment.onClick);
            }

            container.appendChild(crumb);

            if (!isLast) {
                const separator = document.createElement('span');
                separator.className = 'explorer-breadcrumb-separator';
                separator.textContent = ' > ';
                container.appendChild(separator);
            }
        }

        function buildPathBreadcrumbs(targetPath) {
            const containingFolder = findContainingSpecialFolder(targetPath);

            if (containingFolder) {
                const segments = [
                    { label: 'Home', active: false, onClick: navigateToHome }
                ];
                const relativePath = path.relative(containingFolder.path, targetPath);
                const trailingSegments = relativePath && relativePath !== '.'
                    ? relativePath.split(path.sep).filter(Boolean)
                    : [];

                segments.push({
                    label: containingFolder.name,
                    active: trailingSegments.length === 0,
                    onClick: trailingSegments.length === 0 ? null : () => navigateToPath(containingFolder.path)
                });

                let partialPath = containingFolder.path;
                trailingSegments.forEach((segment, index) => {
                    partialPath = path.join(partialPath, segment);
                    const segmentPath = partialPath;
                    segments.push({
                        label: segment,
                        active: index === trailingSegments.length - 1,
                        onClick: index === trailingSegments.length - 1 ? null : () => navigateToPath(segmentPath)
                    });
                });

                return segments;
            }

            const segments = [
                { label: 'This PC', active: false, onClick: navigateToThisPC }
            ];
            const parsedPath = path.parse(targetPath);
            const rootPath = parsedPath.root || targetPath;
            const relativePath = rootPath ? path.relative(rootPath, targetPath) : '';
            const trailingSegments = relativePath && relativePath !== '.'
                ? relativePath.split(path.sep).filter(Boolean)
                : [];

            segments.push({
                label: getDisplayNameForRoot(rootPath),
                active: trailingSegments.length === 0,
                onClick: trailingSegments.length === 0 ? null : () => navigateToPath(rootPath)
            });

            let partialPath = rootPath;
            trailingSegments.forEach((segment, index) => {
                partialPath = path.join(partialPath, segment);
                const segmentPath = partialPath;
                segments.push({
                    label: segment,
                    active: index === trailingSegments.length - 1,
                    onClick: index === trailingSegments.length - 1 ? null : () => navigateToPath(segmentPath)
                });
            });

            return segments;
        }

        function getCurrentAddressIconKey() {
            if (currentLocation === HOME_LOCATION) {
                return 'folder_home';
            }

            if (currentLocation === THIS_PC_LOCATION) {
                return 'this_pc';
            }

            const exactFolder = findSpecialFolderByPath(currentPath);
            if (exactFolder) {
                return exactFolder.icon;
            }

            const parsedPath = currentPath ? path.parse(currentPath) : null;
            if (parsedPath && parsedPath.root && pathsMatch(parsedPath.root, currentPath)) {
                return 'main_drive';
            }

            return 'generic_folder';
        }

        function getCurrentLocationLabel() {
            if (currentLocation === HOME_LOCATION) {
                return 'Home';
            }

            if (currentLocation === THIS_PC_LOCATION) {
                return 'This PC';
            }

            const exactFolder = findSpecialFolderByPath(currentPath);
            if (exactFolder) {
                return exactFolder.name;
            }

            if (currentPath) {
                const parsedPath = path.parse(currentPath);
                if (parsedPath.root && pathsMatch(parsedPath.root, currentPath)) {
                    return getDisplayNameForRoot(currentPath);
                }
            }

            return currentPath ? path.basename(currentPath) : 'File Explorer';
        }

        function syncSidebarActiveState() {

        function handleSectionHeaderClick(event) {
            const header = event.currentTarget;
            const sectionName = header.dataset.section;
            const disclosure = header.querySelector('.explorer-section-disclosure');

            // Check if the click was on the disclosure triangle
            const clickedDisclosure = event.target === disclosure || disclosure.contains(event.target);

            if (clickedDisclosure) {
                // Toggle expand/collapse
                if (!disclosure) return;

                const isExpanded = disclosure.dataset.expanded === 'true';
                const newExpandedState = !isExpanded;

                // Update disclosure triangle
                disclosure.dataset.expanded = newExpandedState.toString();

                // Find and toggle the content container
                const contentContainer = document.querySelector(`.explorer-section-content[data-section="${sectionName}"]`);
                if (contentContainer) {
                    contentContainer.dataset.expanded = newExpandedState.toString();

                    // Update max-height for smooth animation
                    if (newExpandedState) {
                        contentContainer.style.maxHeight = contentContainer.scrollHeight + 'px';
                    } else {
                        contentContainer.style.maxHeight = '0px';
                    }
                }
            } else {
                // Select all items in this section
                selectAllInSection(sectionName, header);

        function selectAllInSection(sectionName, header) {
            // Clear all selections first
            clearSelection();

            // Remove selected state from all section headers
            document.querySelectorAll('.explorer-section-header--collapsible').forEach(h => {
                h.classList.remove('is-selected');

            header.classList.add('is-selected');

            // Find the content container for this section
            const contentContainer = document.querySelector(`.explorer-section-content[data-section="${sectionName}"]`);
            if (!contentContainer) return;

        function formatDriveCapacity(bytes) {
            const units = [
                { label: 'TB', size: 1024 ** 4 },
                { label: 'GB', size: 1024 ** 3 },
                { label: 'MB', size: 1024 ** 2 },
                { label: 'KB', size: 1024 }
            ];
            const unit = units.find(({ size }) => bytes >= size) || units[units.length - 1];
            const value = bytes / unit.size;
            const fractionDigits = value >= 100 ? 0 : 1;

            return `${value.toFixed(fractionDigits).replace(/\.0$/, '')} ${unit.label}`;
        }

        async function getDriveUsageStats(drivePath) {
            if (typeof fs.statfs !== 'function') {
                return null;
            }

            try {
                const stats = await fs.statfs(drivePath);
                const blockSize = Number(stats.bsize || stats.frsize || 0);
                const totalBlocks = Number(stats.blocks || 0);
                const freeBlocks = Number(stats.bavail ?? stats.bfree ?? 0);
                const totalBytes = blockSize * totalBlocks;
                const freeBytes = blockSize * freeBlocks;

                if (!Number.isFinite(totalBytes) || totalBytes <= 0 || !Number.isFinite(freeBytes)) {
                    return null;
                }

                const clampedFreeBytes = Math.max(0, Math.min(totalBytes, freeBytes));

                return {
                    totalBytes,
                    freeBytes: clampedFreeBytes,
                    usedPercent: Math.max(0, Math.min(100, ((totalBytes - clampedFreeBytes) / totalBytes) * 100)),
                    usageText: `${formatDriveCapacity(clampedFreeBytes)} free of ${formatDriveCapacity(totalBytes)}`
                };
            } catch (error) {
                return null;
            }
        }

        async function getAvailableDrives() {
            const drives = [];

            // Add main system drive
            const mainDrive = {
                id: 'main-drive',
                name: process.platform === 'win32' ? 'Local Disk (C:)' : 'Macintosh HD',
                icon: 'main_drive',
                path: process.platform === 'win32' ? 'C:\\' : '/',
                isDrive: true,
                usage: await getDriveUsageStats(process.platform === 'win32' ? 'C:\\' : '/')
            };
            drives.push(mainDrive);

            // Detect external drives
            if (process.platform === 'darwin') {
                // macOS - check /Volumes for mounted drives
                try {
                    const volumesPath = '/Volumes';
                    const volumes = await fs.readdir(volumesPath, { withFileTypes: true });

                    for (const volume of volumes) {
                        if (volume.isDirectory()) {
                            const volumePath = path.join(volumesPath, volume.name);

                            // Skip Macintosh HD (it's the main drive)
                            if (volume.name === 'Macintosh HD') continue;

                            // Verify the volume is accessible
                            try {
                                await fs.access(volumePath);
                                drives.push({
                                    id: `volume-${volume.name}`,
                                    name: volume.name,
                                    icon: 'external_drive',
                                    path: volumePath,
                                    isDrive: true,
                                    usage: await getDriveUsageStats(volumePath)
                                });
                            } catch (error) {
                                // Volume not accessible, skip it
                                console.log(`Skipping inaccessible volume: ${volume.name}`);
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error reading volumes:', error);
                }
            } else if (process.platform === 'win32') {
                // Windows - check common drive letters
                const driveLetters = ['D', 'E', 'F', 'G', 'H'];
                for (const letter of driveLetters) {
                    const drivePath = `${letter}:\\`;
                    try {
                        await fs.access(drivePath);
                        drives.push({
                            id: `drive-${letter}`,
                            name: `Local Disk (${letter}:)`,
                            icon: 'external_drive',
                            path: drivePath,
                            isDrive: true,
                            usage: await getDriveUsageStats(drivePath)
                        });
                    } catch (error) {
                        // Drive doesn't exist or not accessible
                    }
                }
            }

            return drives;
        }

        async function appendCollapsibleSection(container, { sectionName, title, entries, itemType, emptyMessage }) {

                emptyMessageElement.textContent = emptyMessage;
                sectionContent.appendChild(emptyMessageElement);
            } else {

        async function getRecentFiles(limit = HOME_RECENT_FILE_LIMIT) {
            const frequentFolders = await getAccessibleSpecialFolders(HOME_FREQUENT_LOCATIONS);
            const recentEntries = [];
            const seenPaths = new Set();

            await Promise.all(frequentFolders.map(async folder => {
                try {
                    const entries = await fs.readdir(folder.path, { withFileTypes: true });
                    const visibleFiles = entries.filter(entry => entry.isFile() && !entry.name.startsWith('.')).slice(0, 100);

                    await Promise.all(visibleFiles.map(async entry => {
                        const filePath = path.join(folder.path, entry.name);
                        const normalizedPath = normalizePathValue(filePath);

                        if (seenPaths.has(normalizedPath)) {
                            return;
                        }

                        try {
                            const stats = await fs.stat(filePath);
                            const extension = path.extname(entry.name).slice(1).toLowerCase();
                            seenPaths.add(normalizedPath);
                            recentEntries.push({
                                id: `recent-${normalizedPath}`,
                                name: entry.name,
                                path: filePath,
                                icon: getIconTypeForExtension(extension),
                                extension,
                                modifiedTime: stats.mtimeMs
                            });
                        } catch (error) {
                            // Ignore files that disappear or become inaccessible.
                        }
                    }));
                } catch (error) {
                    // Ignore folders that are unavailable on this machine.
                }
            }));

            return recentEntries
                .sort((left, right) => right.modifiedTime - left.modifiedTime)
                .slice(0, limit);
        }

        async function createIconItem(entry, type = 'file') {
            const item = document.createElement('div');
            item.className = 'explorer-icon-item';
            item.dataset.path = entry.path;
            item.dataset.type = type;

            const iconSize = getIconSizeForView(currentView);

            const icon = document.createElement('div');
            icon.className = 'explorer-icon-item__icon';

            // Check if we should show a thumbnail
            if (type === 'file' && isDisplayableMedia(entry.path)) {
                const img = document.createElement('img');
                img.src = `file://${entry.path}`;
                img.className = 'explorer-icon-item__icon-image explorer-icon-item__icon-image--thumbnail';
                img.draggable = false;
                icon.classList.add('explorer-icon-item__icon--thumbnail');
                icon.appendChild(img);
            } else {
                const fallbackIcon = type === 'folder' ? 'generic_folder' : (type === 'drive' ? 'main_drive' : 'generic_file');
                const iconPath = resolveIconPath(entry.icon, iconSize, fallbackIcon);
                icon.innerHTML = `<img src="${iconPath}" alt="${entry.name}" />`;
            }

            const labelContainer = document.createElement('div');
            labelContainer.className = 'explorer-icon-item__label-container';

            const labelTruncated = document.createElement('div');
            labelTruncated.className = 'explorer-icon-item__label explorer-icon-item__label--truncated';
            labelTruncated.textContent = entry.name;

            const labelFull = document.createElement('div');
            labelFull.className = 'explorer-icon-item__label explorer-icon-item__label--full';
            labelFull.textContent = entry.name;

            labelContainer.appendChild(labelTruncated);
            labelContainer.appendChild(labelFull);

            item.appendChild(icon);
            if (entry.isDrive) {
                item.classList.add('explorer-icon-item--drive');

                const driveDetails = document.createElement('div');
                driveDetails.className = 'explorer-drive-details';
                driveDetails.appendChild(labelContainer);

                if (entry.usage) {
                    const usageBar = document.createElement('div');
                    usageBar.className = 'explorer-drive-usage';
                    usageBar.innerHTML = `
                        <div class="explorer-drive-usage-bar">
                            <div class="explorer-drive-usage-fill" style="width: ${entry.usage.usedPercent}%"></div>
                        </div>
                    `;
                    driveDetails.appendChild(usageBar);

                    const usageText = document.createElement('div');
                    usageText.className = 'explorer-drive-usage-text';
                    usageText.textContent = entry.usage.usageText;
                    driveDetails.appendChild(usageText);
                }

                item.appendChild(driveDetails);
            } else {
                item.appendChild(labelContainer);
            }

            // Selection handling
            item.addEventListener('click', (e) => handleItemClick(e, item));
            item.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (type === 'folder' || type === 'drive') {
                    navigateToPath(entry.path);
                } else {
                    openFile(entry.path);
                }
            });

            return item;
        }

        function isDisplayableMedia(filePath) {
            const ext = path.extname(filePath).slice(1).toLowerCase();
            const displayableExtensions = ['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg'];
            return displayableExtensions.includes(ext);
        }

        function handleItemClick(event, item) {
            event.stopPropagation();

            const additive = event.ctrlKey || event.metaKey;

            if (additive) {
                if (selectedItems.has(item)) {
                    removeFromSelection(item);
                } else {
                    addToSelection(item);
                }
            } else {
                selectExclusive(item);
            }
        }

        function addToSelection(item) {
            selectedItems.add(item);
            item.classList.add('is-selected');
            updateSelectedItemsDisplay();
        }

        function removeFromSelection(item) {
            selectedItems.delete(item);
            item.classList.remove('is-selected');
            updateSelectedItemsDisplay();
        }

        function selectExclusive(item) {
            clearSelection();
            addToSelection(item);
        }

        function clearSelection() {
            selectedItems.forEach(item => {
                item.classList.remove('is-selected');
            });
            selectedItems.clear();

            // Also clear section header selection
            document.querySelectorAll('.explorer-section-header--collapsible').forEach(header => {
                header.classList.remove('is-selected');
            });

            updateSelectedItemsDisplay();
        }

        function updateSelectedItemsDisplay() {
            const statusSelected = document.getElementById('statusSelected');
            if (!statusSelected) return;

            const count = selectedItems.size;

            if (count === 0) {
                statusSelected.style.display = 'none';
            } else {
                statusSelected.style.display = 'block';
                statusSelected.textContent = `${count} item${count !== 1 ? 's' : ''} selected`;
            }
        }

        function handleContentMouseDown(event) {
            // Only handle clicks on the content area itself, not on items
            if (event.target.closest('.explorer-icon-item')) {
                return;
            }

            event.preventDefault();
            clearSelection();
            beginDragSelection(event);
        }

        function beginDragSelection(event) {
            const content = document.getElementById('content');
            if (!content) return;

            dragSelectState.active = true;
            dragSelectState.originX = event.clientX;
            dragSelectState.originY = event.clientY;
            dragSelectState.overlay = createSelectionOverlay();

            content.appendChild(dragSelectState.overlay);
            document.addEventListener('mousemove', handleDragMouseMove);
            document.addEventListener('mouseup', handleDragMouseUp, { once: true });
            document.body.style.userSelect = 'none';
        }

        function createSelectionOverlay() {
            const overlay = document.createElement('div');
            overlay.className = 'explorer-selection-rect';
            overlay.style.left = '0px';
            overlay.style.top = '0px';
            overlay.style.width = '0px';
            overlay.style.height = '0px';
            return overlay;
        }

        function handleDragMouseMove(event) {
            if (!dragSelectState.active) return;

            const content = document.getElementById('content');
            const bounds = content.getBoundingClientRect();

            const current = {
                x: Math.min(Math.max(event.clientX, bounds.left), bounds.right),
                y: Math.min(Math.max(event.clientY, bounds.top), bounds.bottom)
            };

            const origin = {
                x: Math.min(Math.max(dragSelectState.originX, bounds.left), bounds.right),
                y: Math.min(Math.max(dragSelectState.originY, bounds.top), bounds.bottom)
            };

            updateSelectionOverlay(origin, current, bounds);
            selectItemsInRect(origin, current, bounds);
        }

        function updateSelectionOverlay(origin, current, bounds) {
            if (!dragSelectState.overlay) return;

            const left = Math.min(origin.x, current.x) - bounds.left;
            const top = Math.min(origin.y, current.y) - bounds.top;
            const width = Math.abs(current.x - origin.x);
            const height = Math.abs(current.y - origin.y);

            dragSelectState.overlay.style.left = `${left}px`;
            dragSelectState.overlay.style.top = `${top}px`;
            dragSelectState.overlay.style.width = `${width}px`;
            dragSelectState.overlay.style.height = `${height}px`;
        }

        function selectItemsInRect(origin, current, bounds) {
            const rect = {
                left: Math.min(origin.x, current.x) - bounds.left,
                top: Math.min(origin.y, current.y) - bounds.top,
                right: Math.max(origin.x, current.x) - bounds.left,
                bottom: Math.max(origin.y, current.y) - bounds.top
            };

            clearSelection();

            const items = document.querySelectorAll('.explorer-icon-item');
            items.forEach(item => {
                const itemRect = item.getBoundingClientRect();
                const relativeRect = {
                    left: itemRect.left - bounds.left,
                    top: itemRect.top - bounds.top,
                    right: itemRect.right - bounds.left,
                    bottom: itemRect.bottom - bounds.top
                };

                if (rectanglesIntersect(rect, relativeRect)) {
                    addToSelection(item);
                }
            });
        }

        function rectanglesIntersect(a, b) {
            return a.left < b.right &&
                a.right > b.left &&
                a.top < b.bottom &&
                a.bottom > b.top;
        }

        function handleDragMouseUp() {
            if (!dragSelectState.active) return;

            dragSelectState.active = false;

            if (dragSelectState.overlay && dragSelectState.overlay.parentNode) {
                dragSelectState.overlay.parentNode.removeChild(dragSelectState.overlay);
            }

            dragSelectState.overlay = null;
            document.removeEventListener('mousemove', handleDragMouseMove);
            document.body.style.userSelect = '';
        }

        function getIconSizeForView(view) {
            const sizeMap = {
                'extra-large': 96,
                'large': 48,
                'medium': 32,
                'list': 16,
                'details': 16
            };
            return sizeMap[view] || 48;
        }

        async function renderFolderView(folderPath) {
            const content = document.getElementById('content');

            const container = document.createElement('div');
            container.className = 'explorer-folder-view';

            try {
                const entries = await fs.readdir(folderPath, { withFileTypes: true });

                const grid = document.createElement('div');
                grid.className = `explorer-icon-grid explorer-icon-grid--${currentView}`;

                // Filter and sort entries
                const visibleEntries = entries
                    .filter(entry => !entry.name.startsWith('.'))
                    .sort((a, b) => {
                        if (a.isDirectory() && !b.isDirectory()) return -1;
                        if (!a.isDirectory() && b.isDirectory()) return 1;
                        return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
                    });

                for (const entry of visibleEntries) {
                    const itemPath = path.join(folderPath, entry.name);
                    const isDirectory = entry.isDirectory();
                    const extension = !isDirectory ? path.extname(entry.name).slice(1).toLowerCase() : '';

                    const itemData = {
                        name: entry.name,
                        path: itemPath,
                        icon: isDirectory ? 'generic_folder' : getIconTypeForExtension(extension),
                        isDrive: false
                    };

                    const item = await createIconItem(itemData, isDirectory ? 'folder' : 'file');
                    grid.appendChild(item);
                }

                if (visibleEntries.length === 0) {
                    const emptyMessage = document.createElement('div');
                    emptyMessage.className = 'explorer-empty-message';
                    emptyMessage.textContent = 'This folder is empty.';
                    container.appendChild(emptyMessage);
                } else {
                    container.appendChild(grid);
                }

                // Update status bar
                updateStatusBar(visibleEntries.length);

            } catch (error) {
                console.error('Error reading folder:', error);
                const errorMessage = document.createElement('div');
                errorMessage.className = 'explorer-error-message';

                // Provide more specific error messages
                let message = 'Unable to access this folder.';
                if (error.code === 'ENOENT') {
                    message = 'This folder does not exist or is no longer available.';
                } else if (error.code === 'EACCES' || error.code === 'EPERM') {
                    message = 'You do not have permission to access this folder.';
                } else if (error.code === 'ENOTDIR') {
                    message = 'The path is not a valid folder.';
                }

                errorMessage.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 48px; color: #999; margin-bottom: 16px;">⚠</div>
                        <div style="font-size: 14px; color: #333; margin-bottom: 8px; font-weight: 600;">${message}</div>
                        <div style="font-size: 12px; color: #666;">Error code: ${error.code || 'UNKNOWN'}</div>
                    </div>
                `;
                container.appendChild(errorMessage);
                updateStatusBar(0);
            }

            content.appendChild(container);
        }

        function getIconTypeForExtension(extension) {
            const iconMap = {
                'png': 'image/png',
                'jpg': 'image/jpg',
                'jpeg': 'image/jpg',
                'gif': 'image/jpg',
                'bmp': 'image/jpg',
                'bat': 'bat',
                'cmd': 'bat',
                'dll': 'dll',
                'ini': 'ini',
                'iso': 'iso',
                'txt': 'text_document',
                'rtf': 'rich_text_document',
                'mp4': 'video',
                'mov': 'video',
                'avi': 'video',
                'mp3': 'music',
                'wav': 'music',
                'zip': 'zip',
                'rar': 'zip',
                '7z': 'zip',
                'exe': 'generic_program',
                'app': 'generic_program'
            };

            return iconMap[extension] || 'generic_file';
        }

        function navigateToPath(newPath) {
            pushHistoryEntry({ type: 'path', path: newPath });
            currentLocation = 'path';
            currentPath = newPath;
            updateView();
        }

        function navigateToHome() {
            pushHistoryEntry({ type: 'home' });
            currentLocation = HOME_LOCATION;
            currentPath = null;
            updateView();
        }

        function navigateToThisPC() {
            pushHistoryEntry({ type: 'this-pc' });
            currentLocation = THIS_PC_LOCATION;
            currentPath = null;
            updateView();
        }

        function pushHistoryEntry(entry) {
            if (historyIndex < navigationHistory.length - 1) {
                navigationHistory = navigationHistory.slice(0, historyIndex + 1);
            }

            navigationHistory.push(entry);
            historyIndex = navigationHistory.length - 1;
        }

        function applyHistoryEntry(historyItem) {
            if (!historyItem) {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                return;
            }

            if (historyItem.type === 'home') {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                return;
            }

            if (historyItem.type === 'this-pc') {
                currentLocation = THIS_PC_LOCATION;
                currentPath = null;
                return;
            }

            currentLocation = 'path';
            currentPath = historyItem.path;
        }

        function navigateBack() {
            if (historyIndex > 0) {
                historyIndex--;
                applyHistoryEntry(navigationHistory[historyIndex]);
                updateView();
            } else if (historyIndex === 0 && currentLocation !== HOME_LOCATION) {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                historyIndex = -1;
                navigationHistory = [];
                pushHistoryEntry({ type: 'home' });
                updateView();
            }
        }

        function navigateForward() {
            if (historyIndex < navigationHistory.length - 1) {
                historyIndex++;
                applyHistoryEntry(navigationHistory[historyIndex]);
                updateView();
            }
        }

        function navigateUp() {
            if (currentPath) {
                const specialFolder = findSpecialFolderByPath(currentPath);
                if (specialFolder) {
                    navigateToHome();
                    return;
                }

                const parentPath = path.dirname(currentPath);

                if (parentPath === currentPath || parentPath === os.homedir()) {
                    navigateToHome();
                } else {
                    navigateToPath(parentPath);
                }
            }
        }

        function updateNavigationButtons() {
            const backBtn = document.getElementById('backBtn');
            const forwardBtn = document.getElementById('forwardBtn');
            const upBtn = document.getElementById('upBtn');

            backBtn.disabled = historyIndex <= 0;
            forwardBtn.disabled = historyIndex >= navigationHistory.length - 1;
            upBtn.disabled = currentLocation === HOME_LOCATION || currentLocation === THIS_PC_LOCATION;
        }

        function updateBreadcrumbs() {
            const breadcrumbs = document.getElementById('breadcrumbs');
            const addressIcon = document.getElementById('addressIcon');
            breadcrumbs.innerHTML = '';

            if (currentLocation === HOME_LOCATION) {
                appendBreadcrumbSegment(breadcrumbs, { label: 'Home', active: true }, true);
            } else if (currentLocation === THIS_PC_LOCATION) {
                appendBreadcrumbSegment(breadcrumbs, { label: 'This PC', active: true }, true);
            } else if (currentPath) {
                const segments = buildPathBreadcrumbs(currentPath);
                segments.forEach((segment, index) => appendBreadcrumbSegment(breadcrumbs, segment, index === segments.length - 1));
            }

            addressIcon.src = resolveIconPath(getCurrentAddressIconKey(), 16, 'generic_folder');
        }

        function updateSearchPlaceholder() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;

            if (currentLocation === HOME_LOCATION) {
                searchInput.placeholder = 'Search Home';
            } else if (currentLocation === THIS_PC_LOCATION) {
                searchInput.placeholder = 'Search This PC';
            } else if (currentPath) {
                searchInput.placeholder = `Search ${getCurrentLocationLabel()}`;
            } else {
                searchInput.placeholder = 'Search';
            }
        }

        function updateTitlebar() {
            const newTitle = getCurrentLocationLabel();
            const newIconPath = resolveHostIconPath(getCurrentAddressIconKey(), 16, 'generic_folder');
            console.log('[File Explorer] Updating title to:', newTitle);

            // Send title update to parent with windowId
            if (window.sendToParent) {
                window.sendToParent('updateWindowTitle', { title: newTitle });
                window.sendToParent('updateWindowIcon', { iconPath: newIconPath });
            } else {
                console.warn('[File Explorer] sendToParent not available');
            }
        }

        function updateStatusBar(itemCount) {
            const statusInfo = document.getElementById('statusInfo');
            statusInfo.textContent = `${itemCount} item${itemCount !== 1 ? 's' : ''}`;
        }

        function handleSearch(event) {
            const searchTerm = event.target.value.toLowerCase();
            // TODO: Implement search functionality
            console.log('Searching for:', searchTerm);
        }

        async function openFile(filePath) {
            // Use the file associations system if available
            if (window.FileAssociations && typeof window.FileAssociations.openPath === 'function') {
                await window.FileAssociations.openPath(filePath, 'file');
            } else if (window.parent && window.parent.FileAssociations && typeof window.parent.FileAssociations.openPath === 'function') {
                await window.parent.FileAssociations.openPath(filePath, 'file');
            } else {
                // Fallback to external opening
                const { shell } = require('electron');
                if (typeof shell.openPath === 'function') {
                    const result = await shell.openPath(filePath);
                    if (result) {
                        console.error('Failed to open file:', result);
                    }
                }
            }
        }
    </script>
