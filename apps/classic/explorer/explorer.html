        async function getRecentFiles(limit = HOME_RECENT_FILE_LIMIT) {
            const frequentFolders = await getAccessibleSpecialFolders(HOME_FREQUENT_LOCATIONS);
            const recentEntries = [];
            const seenPaths = new Set();

            await Promise.all(frequentFolders.map(async folder => {
                try {
                    const entries = await fs.readdir(folder.path, { withFileTypes: true });
                    const visibleFiles = entries
                        .filter(entry => entry.isFile() && !isHiddenShellEntry(entry.name))
                        .slice(0, 100);

                    await Promise.all(visibleFiles.map(async entry => {
                        const filePath = path.join(folder.path, entry.name);
                        const normalizedPath = normalizePathValue(filePath);

                        if (seenPaths.has(normalizedPath)) {
                            return;
                        }

                        try {
                            const stats = await fs.stat(filePath);
                            const extension = path.extname(entry.name).slice(1).toLowerCase();
                            seenPaths.add(normalizedPath);
                            recentEntries.push({
                                id: `recent-${normalizedPath}`,
                                name: entry.name,
                                path: filePath,
                                icon: getIconTypeForExtension(extension),
                                extension,
                                modifiedTime: stats.mtimeMs
                            });
                        } catch (error) {
                            // Ignore files that disappear or become inaccessible.
                        }
                    }));
                } catch (error) {
                    // Ignore folders that are unavailable on this machine.
                }
            }));

            return recentEntries
                .sort((left, right) => right.modifiedTime - left.modifiedTime)
                .slice(0, limit);
        }

        function getShortcutInfoForEntry(entry, type = 'file') {
            if (type !== 'file' || !entry || !entry.name) {
                return null;
            }

            const extension = path.extname(entry.name).slice(1).toLowerCase();
            if (extension !== 'ink' && extension !== 'lnk') {
                return null;
            }

            const baseWithoutShortcut = entry.name.replace(/\.(ink|lnk)$/i, '').replace(/\s*-\s*Shortcut$/i, '');
            const targetExtension = path.extname(baseWithoutShortcut).slice(1).toLowerCase();

            return {
                targetExtension
            };
        }

        function getEffectiveEntryExtension(entry, type = 'file') {
            const shortcutInfo = getShortcutInfoForEntry(entry, type);
            return shortcutInfo?.targetExtension || (typeof entry?.extension === 'string' ? entry.extension.toLowerCase() : '');
        }

        function getShortcutBadgePath(iconSize) {
            const availableSizes = [8, 16, 24, 32, 48];
            const desiredSize = Math.max(8, Math.round((iconSize || 16) * 0.5));
            const exactSize = availableSizes.find(size => size === desiredSize);
            const largerSize = availableSizes.find(size => size > desiredSize);
            const smallerSize = availableSizes.slice().reverse().find(size => size < desiredSize);
            const selectedSize = exactSize || largerSize || smallerSize || 16;
            return `../../../resources/images/icons/explorer/shortcut_badge/${selectedSize}.png`;
        }

        function appendShortcutBadge(icon, iconSize) {
            const badge = document.createElement('img');
            badge.src = getShortcutBadgePath(iconSize);
            badge.alt = '';
            badge.className = 'explorer-icon-item__shortcut-badge';
            badge.draggable = false;
            icon.appendChild(badge);
        }

        function populateExplorerIcon(icon, entry, type, iconSize) {
            const shortcutInfo = getShortcutInfoForEntry(entry, type);
            const effectiveExtension = getEffectiveEntryExtension(entry, type);

            if (type === 'file' && entry.path && !shortcutInfo && isDisplayableMedia(entry.path)) {
                const img = document.createElement('img');
                img.src = `file://${entry.path}`;
                img.className = 'explorer-icon-item__icon-image explorer-icon-item__icon-image--thumbnail';
                img.draggable = false;
                icon.classList.add('explorer-icon-item__icon--thumbnail');
                icon.appendChild(img);
            } else {
                const fallbackIcon = type === 'folder' || type === 'recycle-bin-folder'
                    ? 'generic_folder'
                    : (type === 'drive' ? 'main_drive' : 'generic_file');
                const iconKey = type === 'folder' || type === 'drive'
                    ? entry.icon
                    : getIconTypeForExtension(effectiveExtension || entry.extension);
                const img = document.createElement('img');
                img.src = resolveIconPath(iconKey, iconSize, fallbackIcon);
                img.alt = entry.name || '';
                img.draggable = false;
                icon.appendChild(img);
            }

            if (shortcutInfo) {
                appendShortcutBadge(icon, iconSize);
            }
        }

        async function createIconItem(entry, type = 'file') {
            const item = document.createElement('div');
            item.className = 'explorer-icon-item';
            if (typeof entry.path === 'string' && entry.path) {
                item.dataset.path = entry.path;
            }
            if (entry.id) {
                item.dataset.entryId = entry.id;
            }
            item.dataset.type = type;
            itemEntryMap.set(item, entry);

            const iconSize = getIconSizeForView(currentView);

            const icon = document.createElement('div');
            icon.className = 'explorer-icon-item__icon';
            populateExplorerIcon(icon, entry, type, iconSize);

            const labelContainer = document.createElement('div');
            labelContainer.className = 'explorer-icon-item__label-container';

            const labelTruncated = document.createElement('div');
            labelTruncated.className = 'explorer-icon-item__label explorer-icon-item__label--truncated';
            labelTruncated.textContent = entry.name;

            const labelFull = document.createElement('div');
            labelFull.className = 'explorer-icon-item__label explorer-icon-item__label--full';
            labelFull.textContent = entry.name;

            labelContainer.appendChild(labelTruncated);
            labelContainer.appendChild(labelFull);

            item.appendChild(icon);
            if (entry.isDrive) {
                item.classList.add('explorer-icon-item--drive');

                const driveDetails = document.createElement('div');
                driveDetails.className = 'explorer-drive-details';
                driveDetails.appendChild(labelContainer);

                if (entry.usage) {
                    const usageBar = document.createElement('div');
                    usageBar.className = 'explorer-drive-usage';
                    usageBar.innerHTML = `
                        <div class="explorer-drive-usage-bar">
                            <div class="explorer-drive-usage-fill" style="width: ${entry.usage.usedPercent}%"></div>
                        </div>
                    `;
                    driveDetails.appendChild(usageBar);

                    const usageText = document.createElement('div');
                    usageText.className = 'explorer-drive-usage-text';
                    usageText.textContent = entry.usage.usageText;
                    driveDetails.appendChild(usageText);
                }

                item.appendChild(driveDetails);
            } else {
                item.appendChild(labelContainer);
            }

            // Selection handling
            item.addEventListener('click', (e) => handleItemClick(e, item));
            item.addEventListener('contextmenu', (e) => handleItemContextMenu(e, item, entry, type));
            item.addEventListener('mouseenter', () => handleItemMouseEnter(item));
            item.addEventListener('mouseleave', () => handleItemMouseLeave(item));
            if (canCopyContextEntry(entry, type)) {
                item.draggable = true;
                item.addEventListener('dragstart', (e) => handleItemDragStart(e, item, entry, type));
            }
            item.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (type === 'folder' || type === 'drive') {
                    navigateToPath(entry.path);
                } else if (type === 'recycle-bin-folder' || type === 'recycle-bin-item') {
                    return;
                } else {
                    openFile(entry.path);
                }
            });

            registerRenderedItem(item, entry);

            return item;
        }

        function isDisplayableMedia(filePath) {
            const ext = path.extname(filePath).slice(1).toLowerCase();
            const displayableExtensions = ['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg'];
            return displayableExtensions.includes(ext);
        }

        function handleItemDragStart(event, item, entry, type) {
            // Block drag from the Desktop folder (items are already on the desktop)
            const explorerDesktopPath = path.join(os.homedir(), 'Desktop');
            if (currentLocation === RECYCLE_BIN_LOCATION) {
                event.preventDefault();
                return;
            }
            if (currentLocation === 'path' && currentPath && pathsMatch(currentPath, explorerDesktopPath)) {
                event.preventDefault();
                return;
            }

            // Use the full selection if this item is part of it, otherwise just this item
            const dragPaths = selectedItems.has(item)
                ? getSelectedEntryPaths(entry)
                : (entry.path ? [entry.path] : []);

            if (!dragPaths.length) {
                event.preventDefault();
                return;
            }

            event.dataTransfer.effectAllowed = 'copyMove';
            event.dataTransfer.setData('application/x-win9-files', JSON.stringify({
                paths: dragPaths,
                sourceFolder: currentPath || null
            }));
        }

        function handleItemClick(event, item) {
            event.stopPropagation();

            const additive = event.ctrlKey || event.metaKey;

            if (additive) {
                if (selectedItems.has(item)) {
                    removeFromSelection(item);
                } else {
                    addToSelection(item);
                }
            } else {
                selectExclusive(item);
            }
        }

        function addToSelection(item) {
            selectedItems.add(item);
            item.classList.add('is-selected');
            updateSelectionHighlight(item);
            updateSelectedItemsDisplay();
        }

        function removeFromSelection(item) {
            selectedItems.delete(item);
            item.classList.remove('is-selected', 'is-hovered');
            item.style.removeProperty('--label-extra-height');
            updateSelectedItemsDisplay();
        }

        function selectExclusive(item) {
            clearSelection();
            addToSelection(item);
        }

        function clearSelection() {
            selectedItems.forEach(item => {
                item.classList.remove('is-selected', 'is-hovered');
                item.style.removeProperty('--label-extra-height');
            });
            selectedItems.clear();

            // Also clear section header selection
            document.querySelectorAll('.explorer-section-header--collapsible').forEach(header => {
                header.classList.remove('is-selected');
            });

            updateSelectedItemsDisplay();
        }

        function updateSelectedItemsDisplay() {
            const statusSelected = document.getElementById('statusSelected');
            if (!statusSelected) return;

            const count = selectedItems.size;

            if (count === 0) {
                statusSelected.style.display = 'none';
            } else {
                statusSelected.style.display = 'block';
                statusSelected.textContent = `${count} item${count !== 1 ? 's' : ''} selected`;
            }
        }

        function registerRenderedItem(item, entry) {
            if (!entry || !entry.path) {
                return;
            }

            renderedEntryElementsByPath.set(normalizePathValue(entry.path), item);
            updateItemTooltip(item);
        }

        function applyPendingSelection() {
            if (!pendingSelectionPath) {
                return;
            }

            const item = renderedEntryElementsByPath.get(normalizePathValue(pendingSelectionPath));
            pendingSelectionPath = null;

            if (!item) {
                return;
            }

            selectExclusive(item);
        }

        function getSelectedEntryPaths(fallbackEntry = null) {
            const paths = Array.from(selectedItems)
                .map(item => ({
                    entry: itemEntryMap.get(item),
                    type: item.dataset.type
                }))
                .filter(({ entry, type }) => canCopyContextEntry(entry, type))
                .map(({ entry }) => entry.path);

            if (paths.length) {
                return paths;
            }

            return canCopyContextEntry(fallbackEntry, null) && fallbackEntry && fallbackEntry.path
                ? [fallbackEntry.path]
                : [];
        }

        function updateSelectionHighlight(item) {
            if (!item || !item.classList.contains('is-selected')) {
                if (item) {
                    item.style.removeProperty('--label-extra-height');
                }
                return;
            }

            const labelContainer = item.querySelector('.explorer-icon-item__label-container');
            const truncatedLabel = labelContainer ? labelContainer.querySelector('.explorer-icon-item__label--truncated') : null;
            const fullLabel = labelContainer ? labelContainer.querySelector('.explorer-icon-item__label--full') : null;

            if (!labelContainer || !truncatedLabel || !fullLabel) {
                item.style.removeProperty('--label-extra-height');
                return;
            }

            const truncatedHeight = truncatedLabel.offsetHeight || 0;
            const fullHeight = fullLabel.scrollHeight || 0;
            const extraHeight = Math.max(fullHeight - truncatedHeight, 0);
            item.style.setProperty('--label-extra-height', `${extraHeight}px`);
        }

        function updateItemTooltip(item) {
            if (!item) {
                return;
            }

            const truncatedLabel = item.querySelector('.explorer-icon-item__label--truncated');
            if (!truncatedLabel) {
                item.removeAttribute('title');
                return;
            }

            const text = truncatedLabel.textContent || '';
            if (!text) {
                item.removeAttribute('title');
                return;
            }

            const overflow = truncatedLabel.scrollWidth > (truncatedLabel.clientWidth + 0.5);
            if (overflow) {
                item.setAttribute('title', text);
            } else {
                item.removeAttribute('title');
            }
        }

        function handleItemMouseEnter(item) {
            if (!item.classList.contains('is-selected')) {
                return;
            }

            item.classList.add('is-hovered');
            updateSelectionHighlight(item);
        }

        function handleItemMouseLeave(item) {
            item.classList.remove('is-hovered');
        }

        function canRenameContextEntry(entry, type) {
            return Boolean(entry && entry.path && !entry.isDrive && type !== 'recycle-bin-folder' && type !== 'recycle-bin-item');
        }

        function canRecycleContextEntry(entry, type) {
            return Boolean(entry && entry.path && !entry.isDrive && type !== 'recycle-bin-folder' && type !== 'recycle-bin-item');
        }

        function canCopyContextEntry(entry, type) {
            return Boolean(entry && entry.path && !entry.isDrive && type !== 'recycle-bin-folder' && type !== 'recycle-bin-item');
        }

        function canFavoriteContextEntry(entry, type) {
            return Boolean(entry && entry.path && type === 'folder' && !entry.isDrive);
        }

        async function openParentFolderForEntry(entry) {
            if (!entry || !entry.path) {
                return;
            }

            const parentPath = path.dirname(entry.path);
            if (!parentPath || parentPath === entry.path) {
                return;
            }

            setPendingSelectionPath(entry.path);
            navigateToPath(parentPath);
        }

        async function toggleFavoriteFolder(entry) {
            if (!entry || !entry.path) {
                return;
            }

            if (await isFavoriteFolderPath(entry.path)) {
                await removeFavoriteFolderPath(entry.path);
            } else {
                await addFavoriteFolderPath(entry.path);
            }

            await updateView();
        }

        function resolvePasteTargetPath(entry, type) {
            if (entry && type === 'folder' && entry.path) {
                return entry.path;
            }

            return currentPath;
        }

        function positionExplorerContextMenu(menu, x, y) {
            const menuWidth = menu.offsetWidth;
            const menuHeight = menu.offsetHeight;
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const left = Math.min(Math.max(8, x), Math.max(8, viewportWidth - menuWidth - 8));
            const top = Math.min(Math.max(8, y), Math.max(8, viewportHeight - menuHeight - 8));

            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
        }

        function appendContextMenuAction(menu, config) {
            if (config.type === 'separator') {
                const separator = document.createElement('div');
                separator.className = 'classic-context-menu-separator';
                menu.appendChild(separator);
                return;
            }

            const button = document.createElement('div');
            button.className = 'classic-context-menu-item desktop-item-context-menu-button';
            button.setAttribute('data-action', config.action);

            if (config.disabled) {
                button.classList.add('is-disabled');
            }

            if (config.bold) {
                button.style.fontWeight = 'bold';
            }

            const icon = document.createElement('span');
            icon.className = 'classic-context-menu-item-icon';
            icon.appendChild(document.createElement('span'));

            const text = document.createElement('span');
            text.className = 'classic-context-menu-item-text';
            text.textContent = config.label;

            button.appendChild(icon);
            button.appendChild(text);

            button.addEventListener('click', async (event) => {
                event.preventDefault();
                event.stopPropagation();

                if (config.disabled || typeof config.handler !== 'function') {
                    return;
                }

                hideExplorerContextMenu();
                try {
                    await config.handler();
                } catch (error) {
                    console.error('[File Explorer] Context menu action failed:', error);
                }
            });

            menu.appendChild(button);
        }

        function handleItemContextMenu(event, item, entry, type) {
            event.preventDefault();
            event.stopPropagation();

            if (type === 'recycle-bin-folder' || type === 'recycle-bin-item') {
                return;
            }

            if (!selectedItems.has(item)) {
                selectExclusive(item);
            }

            void showExplorerItemContextMenu(item, entry, type, event.clientX, event.clientY);
        }

        async function showExplorerItemContextMenu(item, entry, type, x, y) {
            hideExplorerContextMenu();

            const selectionPaths = getSelectedEntryPaths(entry);
            const pasteTargetPath = resolvePasteTargetPath(entry, type);
            const canPaste = await canPasteToDirectory(pasteTargetPath);
            const canFavorite = canFavoriteContextEntry(entry, type);
            const isFavorite = canFavorite ? await isFavoriteFolderPath(entry.path) : false;

            const isHomeRecentFileItem = Boolean(item.closest('.explorer-section-content[data-section="recent-files"]'));
            const canShowInParentFolder = isHomeRecentFileItem && Boolean(entry && entry.path && type === 'file');

            const menu = document.createElement('div');
            menu.className = 'classic-context-menu desktop-item-context-menu explorer-context-menu';
            menu.style.position = 'fixed';
            menu.style.zIndex = '5000';

            const actions = [];

            if (type === 'file' && entry.path) {
                actions.push({
                    action: 'open',
                    label: 'Open',
                    bold: true,
                    handler: async () => openFile(entry.path)
                });
                actions.push({
                    action: 'open-with',
                    label: 'Open with...',
                    handler: async () => openFileWithChooser(entry.path)
                });
                actions.push({ type: 'separator' });
            } else if ((type === 'folder' || type === 'drive') && entry.path) {
                actions.push({
                    action: 'open',
                    label: 'Open',
                    bold: true,
                    handler: async () => navigateToPath(entry.path)
                });
                actions.push({ type: 'separator' });
            }

            if (!isHomeRecentFileItem) {
                actions.push({
                    action: 'rename',
                    label: 'Rename',
                    disabled: !canRenameContextEntry(entry, type),
                    handler: async () => beginInlineRename(item, entry)
                });
            }

            if (canShowInParentFolder) {
                actions.push({
                    action: 'show-in-parent-folder',
                    label: 'Show in parent folder',
                    handler: async () => openParentFolderForEntry(entry)
                });
            }

            actions.push({
                action: 'toggle-favorite',
                label: isFavorite ? 'Remove from Favorites' : 'Add to Favorites',
                disabled: !canFavorite,
                handler: async () => toggleFavoriteFolder(entry)
            });

            if (!isHomeRecentFileItem) {
                actions.push({
                    action: 'delete',
                    label: 'Delete',
                    disabled: !canRecycleContextEntry(entry, type) || selectionPaths.length === 0,
                    handler: async () => deleteSelectedEntries(entry)
                });
            }

            actions.push({ type: 'separator' });
            actions.push({
                action: 'copy',
                label: 'Copy',
                disabled: selectionPaths.length === 0,
                handler: async () => {
                    await copyPathsToClipboard(selectionPaths);
                }
            });
            actions.push({
                action: 'cut',
                label: 'Cut',
                disabled: selectionPaths.length === 0 || !canRecycleContextEntry(entry, type),
                handler: async () => {
                    await cutPathsToClipboard(selectionPaths);
                }
            });
            actions.push({
                action: 'paste',
                label: 'Paste',
                disabled: !canPaste,
                handler: async () => pasteIntoPath(pasteTargetPath)
            });

            actions.forEach(action => appendContextMenuAction(menu, action));

            menu.addEventListener('contextmenu', (menuEvent) => {
                menuEvent.preventDefault();
                menuEvent.stopPropagation();
            });

            document.body.appendChild(menu);
            positionExplorerContextMenu(menu, x, y);
            explorerContextMenu = menu;
            scheduleExplorerContextMenuDismiss();
        }

        async function showFolderBackgroundContextMenu(x, y) {
            hideExplorerContextMenu();

            const canPaste = await canPasteToDirectory(currentPath);

            const menu = document.createElement('div');
            menu.className = 'classic-context-menu desktop-item-context-menu explorer-context-menu';
            menu.style.position = 'fixed';
            menu.style.zIndex = '5000';

            appendContextMenuAction(menu, {
                action: 'paste',
                label: 'Paste',
                disabled: !canPaste,
                handler: async () => pasteIntoPath(currentPath)
            });

            menu.addEventListener('contextmenu', (menuEvent) => {
                menuEvent.preventDefault();
                menuEvent.stopPropagation();
            });

            document.body.appendChild(menu);
            positionExplorerContextMenu(menu, x, y);
            explorerContextMenu = menu;
            scheduleExplorerContextMenuDismiss();
        }

        async function pasteIntoPath(targetPath) {
            if (!targetPath) {
                return;
            }

            try {
                const result = await pasteClipboardToDirectoryViaHost(targetPath);
                if (Array.isArray(result?.createdPaths) && result.createdPaths.length) {
                    setPendingSelectionPath(result.createdPaths[result.createdPaths.length - 1]);
                }
                await updateView();
            } catch (error) {
                console.error('[File Explorer] Paste failed:', error);
                const systemDialog = getSystemDialogApi();
                if (systemDialog && typeof systemDialog.error === 'function') {
                    systemDialog.error(error && error.message ? error.message : 'Unable to paste item.', 'Paste');
                }
            }
        }

        async function deleteSelectedEntries(fallbackEntry = null) {
            const selectionPaths = getSelectedEntryPaths(fallbackEntry);
            if (!selectionPaths.length) return;

            const hiddenItems = selectionPaths
                .map(p => renderedEntryElementsByPath.get(normalizePathValue(p)))
                .filter(Boolean);
            hiddenItems.forEach(item => { item.style.visibility = 'hidden'; });

            const previousState = { ...recycleBinState };
            recycleBinState = { ...recycleBinState, empty: false, itemCount: recycleBinState.itemCount + selectionPaths.length };
            updateRecycleBinSidebarIcon();

            const engine = getSharedExplorerEngine();
            const revertDesktop = engine && typeof engine.optimisticRecycleBinUpdate === 'function'
                ? engine.optimisticRecycleBinUpdate(selectionPaths.length)
                : null;

            try {
                await movePathsToRecycleBinViaHost(selectionPaths);
                setPendingSelectionPath(null);
                await updateView();
            } catch (error) {
                hiddenItems.forEach(item => { item.style.visibility = ''; });
                recycleBinState = previousState;
                updateRecycleBinSidebarIcon();
                if (revertDesktop) revertDesktop();
                console.error('[File Explorer] Delete failed:', error);
                const systemDialog = getSystemDialogApi();
                if (systemDialog && typeof systemDialog.error === 'function') {
                    systemDialog.error('Unable to move one or more items to the Recycle Bin.', 'Recycle Bin');
                }
            }
        }

        function getPrimarySelectedItem() {
            const selected = Array.from(selectedItems);
            return selected.length === 1 ? selected[0] : null;
        }

        function beginInlineRename(item, entry) {
            if (!canRenameContextEntry(entry, item?.dataset?.type)) {
                return;
            }

            if (explorerRenameState && explorerRenameState.commitInProgress) {
                return;
            }

            cancelInlineRename();
            hideExplorerContextMenu();

            const labelContainer = item.querySelector('.explorer-icon-item__label-container');
            if (!labelContainer) {
                return;
            }

            item.removeAttribute('title');

            const truncatedLabel = labelContainer.querySelector('.explorer-icon-item__label--truncated');
            const fullLabel = labelContainer.querySelector('.explorer-icon-item__label--full');
            const currentName = truncatedLabel ? truncatedLabel.textContent : (entry.name || path.basename(entry.path));

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'explorer-icon-item__rename-input';
            input.value = currentName;
            input.setAttribute('spellcheck', 'false');

            if (truncatedLabel) {
                truncatedLabel.style.display = 'none';
            }
            if (fullLabel) {
                fullLabel.style.display = 'none';
            }

            labelContainer.appendChild(input);

            explorerRenameState = {
                item,
                entry,
                input,
                truncatedLabel,
                fullLabel,
                originalName: currentName,
                commitInProgress: false
            };

            input.addEventListener('keydown', handleRenameInputKeydown);
            input.addEventListener('blur', handleRenameInputBlur);

            requestAnimationFrame(() => {
                input.focus();
                input.select();
            });
        }

        function handleRenameInputKeydown(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                void commitInlineRename();
                return;
            }

            if (event.key === 'Escape') {
                event.preventDefault();
                cancelInlineRename();
            }
        }

        function handleRenameInputBlur() {
            if (!explorerRenameState || explorerRenameState.commitInProgress) {
                return;
            }

            void commitInlineRename();
        }

        function finishInlineRename(labelText) {
            if (!explorerRenameState) {
                return;
            }

            const { item, input, truncatedLabel, fullLabel, originalName } = explorerRenameState;
            const resolvedLabel = typeof labelText === 'string' && labelText.length ? labelText : originalName;

            input.removeEventListener('keydown', handleRenameInputKeydown);
            input.removeEventListener('blur', handleRenameInputBlur);

            if (input.parentNode) {
                input.parentNode.removeChild(input);
            }

            if (truncatedLabel) {
                truncatedLabel.style.display = '';
                truncatedLabel.textContent = resolvedLabel;
            }

            if (fullLabel) {
                fullLabel.style.display = '';
                fullLabel.textContent = resolvedLabel;
            }

            explorerRenameState = null;
            updateItemTooltip(item);
            updateSelectionHighlight(item);
        }

        function cancelInlineRename() {
            if (!explorerRenameState || explorerRenameState.commitInProgress) {
                return;
            }

            finishInlineRename(explorerRenameState.originalName);
        }

        async function commitInlineRename() {
            if (!explorerRenameState || explorerRenameState.commitInProgress) {
                return;
            }

            const { entry, input, originalName } = explorerRenameState;
            const nextName = typeof input.value === 'string' ? input.value.trim() : '';
            const systemDialog = getSystemDialogApi();

            if (!nextName) {
                if (systemDialog && typeof systemDialog.error === 'function') {
                    systemDialog.error('Please enter a name.', 'Rename');
                }
                requestAnimationFrame(() => {
                    input.focus();
                    input.select();
                });
                return;
            }

            if (nextName === originalName) {
                finishInlineRename(originalName);
                return;
            }

            explorerRenameState.commitInProgress = true;
            input.disabled = true;

            try {
                const destinationPath = await renameEntryPathViaHost(entry.path, nextName);
                entry.path = destinationPath;
                entry.name = nextName;
                setPendingSelectionPath(destinationPath);
                finishInlineRename(nextName);
                await updateView();
            } catch (error) {
                explorerRenameState.commitInProgress = false;
                input.disabled = false;

                if (systemDialog && typeof systemDialog.error === 'function') {
                    systemDialog.error(error && error.message ? error.message : 'Unable to rename this item.', 'Rename');
                }

                requestAnimationFrame(() => {
                    input.focus();
                    input.select();
                });
            }
        }

        function handleContentMouseDown(event) {
            if (event.button !== 0) {
                return;
            }

            // Only handle clicks on the content area itself, not on items
            if (event.target.closest('.explorer-icon-item')) {
                return;
            }

            event.preventDefault();
            clearSelection();
            beginDragSelection(event);
        }

        function handleContentContextMenu(event) {
            if (event.target.closest('.explorer-icon-item')) {
                return;
            }

            event.preventDefault();
            clearSelection();

            if (currentLocation === RECYCLE_BIN_LOCATION) {
                showRecycleBinContextMenu(event.clientX, event.clientY);
                return;
            }

            if (!currentPath) {
                return;
            }

            void showFolderBackgroundContextMenu(event.clientX, event.clientY);
        }

        function handleExplorerContextMenuKeydown(event) {
            if (event.key === 'Escape') {
                hideExplorerContextMenu();
                cancelInlineRename();
                return;
            }

            if (explorerRenameState) {
                return;
            }

            const activeElement = document.activeElement;
            const isTextInputFocused = activeElement && (
                activeElement.tagName === 'INPUT'
                || activeElement.tagName === 'TEXTAREA'
                || activeElement.isContentEditable
            );

            if (isTextInputFocused) {
                return;
            }

            const primarySelectedItem = getPrimarySelectedItem();
            const primaryEntry = primarySelectedItem ? itemEntryMap.get(primarySelectedItem) : null;
            const selectionPaths = getSelectedEntryPaths(primaryEntry);
            const modifierPressed = event.ctrlKey || event.metaKey;

            if (modifierPressed && event.key.toLowerCase() === 'c' && selectionPaths.length) {
                event.preventDefault();
                void copyPathsToClipboard(selectionPaths);
                return;
            }

            if (modifierPressed && event.key.toLowerCase() === 'x' && selectionPaths.length) {
                event.preventDefault();
                void cutPathsToClipboard(selectionPaths);
                return;
            }

            if (modifierPressed && event.key.toLowerCase() === 'v' && currentPath) {
                event.preventDefault();
                void pasteIntoPath(currentPath);
                return;
            }

            if (event.key === 'Delete' && selectionPaths.length) {
                event.preventDefault();
                void deleteSelectedEntries(primaryEntry);
                return;
            }

            if (event.key === 'F2' && primarySelectedItem && primaryEntry) {
                event.preventDefault();
                beginInlineRename(primarySelectedItem, primaryEntry);
            }
        }

        function handleWindowFocusRefresh() {
            if (currentLocation === RECYCLE_BIN_LOCATION) {
                void refreshVisibleRecycleBinIfNeeded();
            }
        }

        function beginDragSelection(event) {
            const content = document.getElementById('content');
            if (!content) return;

            dragSelectState.active = true;
            dragSelectState.originX = event.clientX;
            dragSelectState.originY = event.clientY;
            dragSelectState.overlay = createSelectionOverlay();

            content.appendChild(dragSelectState.overlay);
            document.addEventListener('mousemove', handleDragMouseMove);
            document.addEventListener('mouseup', handleDragMouseUp, { once: true });
            document.body.style.userSelect = 'none';
        }

        function createSelectionOverlay() {
            const overlay = document.createElement('div');
            overlay.className = 'explorer-selection-rect';
            overlay.style.left = '0px';
            overlay.style.top = '0px';
            overlay.style.width = '0px';
            overlay.style.height = '0px';
            return overlay;
        }

        function handleDragMouseMove(event) {
            if (!dragSelectState.active) return;

            const content = document.getElementById('content');
            const bounds = content.getBoundingClientRect();

            const current = {
                x: Math.min(Math.max(event.clientX, bounds.left), bounds.right),
                y: Math.min(Math.max(event.clientY, bounds.top), bounds.bottom)
            };

            const origin = {
                x: Math.min(Math.max(dragSelectState.originX, bounds.left), bounds.right),
                y: Math.min(Math.max(dragSelectState.originY, bounds.top), bounds.bottom)
            };

            updateSelectionOverlay(origin, current, bounds);
            selectItemsInRect(origin, current, bounds);
        }

        function updateSelectionOverlay(origin, current, bounds) {
            if (!dragSelectState.overlay) return;

            const left = Math.min(origin.x, current.x) - bounds.left;
            const top = Math.min(origin.y, current.y) - bounds.top;
            const width = Math.abs(current.x - origin.x);
            const height = Math.abs(current.y - origin.y);

            dragSelectState.overlay.style.left = `${left}px`;
            dragSelectState.overlay.style.top = `${top}px`;
            dragSelectState.overlay.style.width = `${width}px`;
            dragSelectState.overlay.style.height = `${height}px`;
        }

        function selectItemsInRect(origin, current, bounds) {
            const rect = {
                left: Math.min(origin.x, current.x) - bounds.left,
                top: Math.min(origin.y, current.y) - bounds.top,
                right: Math.max(origin.x, current.x) - bounds.left,
                bottom: Math.max(origin.y, current.y) - bounds.top
            };

            clearSelection();

            const items = document.querySelectorAll('.explorer-icon-item');
            items.forEach(item => {
                const itemRect = item.getBoundingClientRect();
                const relativeRect = {
                    left: itemRect.left - bounds.left,
                    top: itemRect.top - bounds.top,
                    right: itemRect.right - bounds.left,
                    bottom: itemRect.bottom - bounds.top
                };

                if (rectanglesIntersect(rect, relativeRect)) {
                    addToSelection(item);
                }
            });
        }

        function rectanglesIntersect(a, b) {
            return a.left < b.right &&
                a.right > b.left &&
                a.top < b.bottom &&
                a.bottom > b.top;
        }

        function handleDragMouseUp() {
            if (!dragSelectState.active) return;

            dragSelectState.active = false;

            if (dragSelectState.overlay && dragSelectState.overlay.parentNode) {
                dragSelectState.overlay.parentNode.removeChild(dragSelectState.overlay);
            }

            dragSelectState.overlay = null;
            document.removeEventListener('mousemove', handleDragMouseMove);
            document.body.style.userSelect = '';
        }

        function getIconSizeForView(view) {
            const sizeMap = {
                'extra-large': 96,
                'large': 48,
                'medium': 32,
                'list': 16,
                'details': 16
            };
            return sizeMap[view] || 48;
        }

        async function renderFolderView(folderPath) {
            const content = document.getElementById('content');

            const container = document.createElement('div');
            container.className = 'explorer-folder-view';

            try {
                const entries = await fs.readdir(folderPath, { withFileTypes: true });

                const grid = document.createElement('div');
                grid.className = `explorer-icon-grid explorer-icon-grid--${currentView}`;

                // Filter and sort entries
                const visibleEntries = entries
                    .filter(entry => !isHiddenShellEntry(entry.name))
                    .sort((a, b) => {
                        if (a.isDirectory() && !b.isDirectory()) return -1;
                        if (!a.isDirectory() && b.isDirectory()) return 1;
                        return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
                    });

                for (const entry of visibleEntries) {
                    const itemPath = path.join(folderPath, entry.name);
                    const isDirectory = entry.isDirectory();
                    const extension = !isDirectory ? path.extname(entry.name).slice(1).toLowerCase() : '';

                    let folderIcon = 'generic_folder';
                    if (isDirectory) {
                        try {
                            const subEntries = await fs.readdir(itemPath);
                            const visibleSub = subEntries.filter(name => !isHiddenShellEntry(name));
                            if (visibleSub.length > 0) {
                                folderIcon = 'folder_of_folders';
                            }
                        } catch (_) {}
                    }

                    const itemData = {
                        name: entry.name,
                        path: itemPath,
                        extension,
                        icon: isDirectory ? folderIcon : getIconTypeForExtension(extension),
                        isDrive: false
                    };

                    const item = await createIconItem(itemData, isDirectory ? 'folder' : 'file');
                    grid.appendChild(item);
                }

                if (visibleEntries.length === 0) {
                    const emptyMessage = document.createElement('div');
                    emptyMessage.className = 'explorer-empty-message';
                    emptyMessage.textContent = 'This folder is empty.';
                    container.appendChild(emptyMessage);
                } else {
                    container.appendChild(grid);
                }

                // Update status bar
                updateStatusBar(visibleEntries.length);

            } catch (error) {
                console.error('Error reading folder:', error);
                const errorMessage = document.createElement('div');
                errorMessage.className = 'explorer-error-message';

                // Provide more specific error messages
                let message = 'Unable to access this folder.';
                if (error.code === 'ENOENT') {
                    message = 'This folder does not exist or is no longer available.';
                } else if (error.code === 'EACCES' || error.code === 'EPERM') {
                    message = 'You do not have permission to access this folder.';
                } else if (error.code === 'ENOTDIR') {
                    message = 'The path is not a valid folder.';
                }

                errorMessage.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 48px; color: #999; margin-bottom: 16px;">⚠</div>
                        <div style="font-size: 14px; color: #333; margin-bottom: 8px; font-weight: 500;">${message}</div>
                        <div style="font-size: 12px; color: #666;">Error code: ${error.code || 'UNKNOWN'}</div>
                    </div>
                `;
                container.appendChild(errorMessage);
                updateStatusBar(0);
            }

            content.appendChild(container);
        }

        async function renderRecycleBinView() {
            const content = document.getElementById('content');
            const container = document.createElement('div');
            container.className = 'explorer-folder-view explorer-folder-view--recycle-bin';

            const items = await loadRecycleBinItems();
            recycleBinItemsSignature = getRecycleBinItemsSignature(items);

            if (items.length === 0) {
                const emptyMessage = document.createElement('div');
                emptyMessage.className = 'explorer-empty-message';
                emptyMessage.textContent = recycleBinState.available
                    ? 'The Recycle Bin is empty.'
                    : 'Recycle Bin is unavailable on this host.';
                container.appendChild(emptyMessage);
                updateStatusBar(0);
                content.appendChild(container);
                return;
            }

            const grid = document.createElement('div');
            grid.className = `explorer-icon-grid explorer-icon-grid--${currentView}`;

            for (const recycleItem of items) {
                const entryData = {
                    id: recycleItem.id,
                    name: recycleItem.name,
                    path: recycleItem.path,
                    icon: recycleItem.isDirectory ? 'generic_folder' : getIconTypeForExtension(recycleItem.extension),
                    isDrive: false,
                    originalPath: recycleItem.originalPath,
                    deletedAt: recycleItem.deletedAt
                };

                const item = await createIconItem(
                    entryData,
                    recycleItem.isDirectory ? 'recycle-bin-folder' : 'recycle-bin-item'
                );

                grid.appendChild(item);
            }

            container.appendChild(grid);
            content.appendChild(container);
            updateStatusBar(items.length);
        }

        function hideExplorerContextMenu() {
            if (explorerContextMenuDismissHandler) {
                document.removeEventListener('mousedown', explorerContextMenuDismissHandler, true);
                document.removeEventListener('contextmenu', explorerContextMenuDismissHandler, true);
                explorerContextMenuDismissHandler = null;
            }

            if (explorerContextMenu && explorerContextMenu.parentNode) {
                explorerContextMenu.parentNode.removeChild(explorerContextMenu);
            }

            explorerContextMenu = null;
        }

        function scheduleExplorerContextMenuDismiss() {
            if (!explorerContextMenu) {
                return;
            }

            explorerContextMenuDismissHandler = (event) => {
                if (explorerContextMenu && !explorerContextMenu.contains(event.target)) {
                    hideExplorerContextMenu();
                }
            };

            requestAnimationFrame(() => {
                if (!explorerContextMenuDismissHandler) {
                    return;
                }

                document.addEventListener('mousedown', explorerContextMenuDismissHandler, true);
                document.addEventListener('contextmenu', explorerContextMenuDismissHandler, true);
            });
        }

        function showRecycleBinContextMenu(x, y) {
            hideExplorerContextMenu();

            const menu = document.createElement('div');
            menu.className = 'classic-context-menu desktop-item-context-menu explorer-context-menu';
            menu.style.position = 'fixed';
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
            menu.style.zIndex = '5000';

            const button = document.createElement('div');
            button.className = 'classic-context-menu-item desktop-item-context-menu-button';
            if (!recycleBinState.available) {
                button.classList.add('is-disabled');
            }
            button.setAttribute('data-action', 'empty-recycle-bin');
            const recycleBinIconKey = recycleBinState.empty ? 'recycle_bin/empty' : 'recycle_bin/full';
            const recycleBinIconPath = resolveIconPath(recycleBinIconKey, 16, 'recycle_bin/empty');
            button.innerHTML = `
                <span class="classic-context-menu-item-icon"><img src="${recycleBinIconPath}" alt="" width="16" height="16"></span>
                <span class="classic-context-menu-item-text">${process.platform === 'darwin' ? 'Empty Trash' : 'Empty Recycle Bin'}</span>
            `;

            if (recycleBinState.available) {
                button.addEventListener('click', async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    hideExplorerContextMenu();
                    await emptyRecycleBinFromExplorer();
                });
            } else {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                });
            }

            menu.addEventListener('contextmenu', (event) => {
                event.preventDefault();
                event.stopPropagation();
            });

            menu.appendChild(button);
            document.body.appendChild(menu);

            const menuWidth = menu.offsetWidth;
            const menuHeight = menu.offsetHeight;
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            if (x + menuWidth > viewportWidth) {
                menu.style.left = `${Math.max(8, viewportWidth - menuWidth - 8)}px`;
            }

            if (y + menuHeight > viewportHeight) {
                menu.style.top = `${Math.max(8, viewportHeight - menuHeight - 8)}px`;
            }

            explorerContextMenu = menu;
            scheduleExplorerContextMenuDismiss();
        }

        async function emptyRecycleBinFromExplorer() {
            if (!ipcRenderer || typeof ipcRenderer.invoke !== 'function') {
                return;
            }

            try {
                await ipcRenderer.invoke('trash:empty');
                recycleBinState = await loadRecycleBinState();
                await updateView();
            } catch (error) {
                console.error('[File Explorer] Failed to empty recycle bin:', error);
            }
        }

        function getIconTypeForExtension(extension) {
            const iconMap = {
                'png': 'image/png',
                'jpg': 'image/jpg',
                'jpeg': 'image/jpg',
                'gif': 'image/jpg',
                'bmp': 'image/jpg',
                'bat': 'bat',
                'cmd': 'bat',
                'dll': 'dll',
                'ini': 'ini',
                'iso': 'iso',
                'txt': 'text_document',
                'rtf': 'rich_text_document',
                'mp4': 'video',
                'mov': 'video',
                'avi': 'video',
                'mp3': 'music',
                'wav': 'music',
                'zip': 'zip',
                'rar': 'zip',
                '7z': 'zip',
                'exe': 'generic_program',
                'app': 'generic_program'
            };

            return iconMap[extension] || 'generic_file';
        }

        function navigateToPath(newPath) {
            pushHistoryEntry({ type: 'path', path: newPath });
            currentLocation = 'path';
            currentPath = newPath;
            updateView();
        }

        function navigateToHome() {
            pushHistoryEntry({ type: 'home' });
            currentLocation = HOME_LOCATION;
            currentPath = null;
            updateView();
        }

        function navigateToThisPC() {
            pushHistoryEntry({ type: 'this-pc' });
            currentLocation = THIS_PC_LOCATION;
            currentPath = null;
            updateView();
        }

        function navigateToRecycleBin() {
            pushHistoryEntry({ type: RECYCLE_BIN_LOCATION });
            currentLocation = RECYCLE_BIN_LOCATION;
            currentPath = null;
            updateView();
        }

        function pushHistoryEntry(entry) {
            if (historyIndex < navigationHistory.length - 1) {
                navigationHistory = navigationHistory.slice(0, historyIndex + 1);
            }

            navigationHistory.push(entry);
            historyIndex = navigationHistory.length - 1;
        }

        function applyHistoryEntry(historyItem) {
            if (!historyItem) {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                return;
            }

            if (historyItem.type === 'home') {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                return;
            }

            if (historyItem.type === 'this-pc') {
                currentLocation = THIS_PC_LOCATION;
                currentPath = null;
                return;
            }

            if (historyItem.type === RECYCLE_BIN_LOCATION) {
                currentLocation = RECYCLE_BIN_LOCATION;
                currentPath = null;
                return;
            }

            currentLocation = 'path';
            currentPath = historyItem.path;
        }

        function navigateBack() {
            if (historyIndex > 0) {
                historyIndex--;
                applyHistoryEntry(navigationHistory[historyIndex]);
                updateView();
            } else if (historyIndex === 0 && currentLocation !== HOME_LOCATION) {
                currentLocation = HOME_LOCATION;
                currentPath = null;
                historyIndex = -1;
                navigationHistory = [];
                pushHistoryEntry({ type: 'home' });
                updateView();
            }
        }

        function navigateForward() {
            if (historyIndex < navigationHistory.length - 1) {
                historyIndex++;
                applyHistoryEntry(navigationHistory[historyIndex]);
                updateView();
            }
        }

        function navigateUp() {
            if (currentLocation === RECYCLE_BIN_LOCATION) {
                return;
            }

            if (currentPath) {
                const specialFolder = findSpecialFolderByPath(currentPath);
                if (specialFolder) {
                    navigateToHome();
                    return;
                }

                const parentPath = path.dirname(currentPath);

                if (parentPath === currentPath || parentPath === os.homedir()) {
                    navigateToHome();
                } else {
                    navigateToPath(parentPath);
                }
            }
        }

        function updateNavigationButtons() {
            const backBtn = document.getElementById('backBtn');
            const forwardBtn = document.getElementById('forwardBtn');
            const upBtn = document.getElementById('upBtn');

            backBtn.disabled = historyIndex <= 0;
            forwardBtn.disabled = historyIndex >= navigationHistory.length - 1;
            upBtn.disabled = currentLocation === HOME_LOCATION
                || currentLocation === THIS_PC_LOCATION
                || currentLocation === RECYCLE_BIN_LOCATION;
        }

        function updateBreadcrumbs() {
            const breadcrumbs = document.getElementById('breadcrumbs');
            const addressIcon = document.getElementById('addressIcon');
            breadcrumbs.innerHTML = '';

            if (currentLocation === HOME_LOCATION) {
                appendBreadcrumbSegment(breadcrumbs, { label: 'Home', active: true }, true);
            } else if (currentLocation === THIS_PC_LOCATION) {
                appendBreadcrumbSegment(breadcrumbs, { label: 'This PC', active: true }, true);
            } else if (currentLocation === RECYCLE_BIN_LOCATION) {
                appendBreadcrumbSegment(breadcrumbs, { label: 'Recycle Bin', active: true }, true);
            } else if (currentPath) {
                const segments = buildPathBreadcrumbs(currentPath);
                segments.forEach((segment, index) => appendBreadcrumbSegment(breadcrumbs, segment, index === segments.length - 1));
            }

            addressIcon.src = resolveIconPath(getCurrentAddressIconKey(), 16, 'generic_folder');
        }

        function updateSearchPlaceholder() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;

            if (currentLocation === HOME_LOCATION) {
                searchInput.placeholder = 'Search Home';
            } else if (currentLocation === THIS_PC_LOCATION) {
                searchInput.placeholder = 'Search This PC';
            } else if (currentLocation === RECYCLE_BIN_LOCATION) {
                searchInput.placeholder = 'Search Recycle Bin';
            } else if (currentPath) {
                searchInput.placeholder = `Search ${getCurrentLocationLabel()}`;
            } else {
                searchInput.placeholder = 'Search';
            }
        }

        function updateTitlebar() {
            const newTitle = getCurrentLocationLabel();
            const newIconPath = resolveHostIconPath(getCurrentAddressIconKey(), 16, 'generic_folder');
            console.log('[File Explorer] Updating title to:', newTitle);

            // Send title update to parent with windowId
            if (window.sendToParent) {
                window.sendToParent('updateWindowTitle', { title: newTitle });
                window.sendToParent('updateWindowIcon', { iconPath: newIconPath });
            } else {
                console.warn('[File Explorer] sendToParent not available');
            }
        }

        function updateStatusBar(itemCount) {
            const statusInfo = document.getElementById('statusInfo');
            statusInfo.textContent = `${itemCount} item${itemCount !== 1 ? 's' : ''}`;
        }

        function handleSearch(event) {
            const searchTerm = event.target.value.toLowerCase();
            // TODO: Implement search functionality
            console.log('Searching for:', searchTerm);
        }

        async function openFile(filePath) {
            try {
                await requestExplorerHost('openFile', { filePath });
            } catch (error) {
                console.error('[File Explorer] Failed to open file via host:', error);
                // Fallback to external opening
                const { shell } = require('electron');
                if (typeof shell.openPath === 'function') {
                    const result = await shell.openPath(filePath);
                    if (result) {
                        console.error('Failed to open file:', result);
                    }
                }
            }
        }

        async function openFileWithChooser(filePath) {
            try {
                await requestExplorerHost('openFileWithChooser', { filePath });
            } catch (error) {
                console.error('[File Explorer] Failed to show open-with via host:', error);
                await openFile(filePath);
            }
        }
    </script>
