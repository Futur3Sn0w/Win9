<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Clipboard board -->
  <rect x="6" y="8" width="18" height="21" rx="1" fill="#e8e0d0" stroke="#888" stroke-width="1.2"/>
  <!-- Document on clipboard -->
  <rect x="9" y="11" width="12" height="15" rx="0.5" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <!-- Lines on document -->
  <line x1="11" y1="14.5" x2="19" y2="14.5" stroke="#ccc" stroke-width="1"/>
  <line x1="11" y1="17"   x2="19" y2="17"   stroke="#ccc" stroke-width="1"/>
  <line x1="11" y1="19.5" x2="16" y2="19.5" stroke="#ccc" stroke-width="1"/>
  <!-- Clipboard clip -->
  <rect x="12" y="6" width="8" height="5" rx="1" fill="#b8b0a0" stroke="#888" stroke-width="1"/>
  <rect x="14" y="4" width="4" height="4" rx="1.5" fill="#d0c8b8" stroke="#888" stroke-width="1"/>
</svg>
