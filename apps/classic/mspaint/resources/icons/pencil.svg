<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
  <!-- Pencil shaft -->
  <polygon points="3,17 15,5 18,8 6,20" fill="#f5c518" stroke="#c8a010" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Pencil highlight stripe -->
  <polygon points="4.5,17 16.5,5 17.5,6 5.5,18" fill="#fad84a" opacity="0.5"/>
  <!-- Metal ferrule -->
  <polygon points="14,6.5 15.5,5 18,7.5 16.5,9" fill="#c0c0c0" stroke="#999" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- Eraser tip -->
  <polygon points="15.5,5 17,3.5 19,5.5 17.5,7" fill="#e08090" stroke="#c07080" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- Pencil tip -->
  <polygon points="3,17 3.8,18 5,19.5 6,20" fill="#c8a010" stroke="#a08000" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="3.8,18 5,19.5 4.5,19.8" fill="#2a2a2a"/>
</svg>
