<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="../../../css/classic-windows.css">
    <link rel="stylesheet" href="../../../css/classic-controls.css">
    <link rel="stylesheet" href="../../../css/styles.css">
    <link rel="stylesheet" href="../../../css/fonts.css">
    <link rel="stylesheet" href="taskmgr.exe.css">
</head>

<body>
    <div class="taskmgr-shell">
        <div class="classic-command-bar">
            <div class="classic-command-bar-item"><span class="classic-command-bar-label"><u>F</u>ile</span></div>
            <div class="classic-command-bar-item"><span class="classic-command-bar-label"><u>O</u>ptions</span></div>
            <div class="classic-command-bar-item"><span class="classic-command-bar-label"><u>V</u>iew</span></div>
            <div class="classic-command-bar-item"><span class="classic-command-bar-label"><u>H</u>elp</span></div>
        </div>

        <div class="taskmgr-tabs" role="tablist" aria-label="Task Manager sections">
            <button class="taskmgr-tab is-active" type="button" data-panel="applications">Applications</button>
            <button class="taskmgr-tab" type="button" data-panel="processes">Processes</button>
            <button class="taskmgr-tab" type="button" data-panel="services">Services</button>
            <button class="taskmgr-tab" type="button" data-panel="performance">Performance</button>
            <button class="taskmgr-tab" type="button" data-panel="networking">Networking</button>
            <button class="taskmgr-tab" type="button" data-panel="users">Users</button>
        </div>

        <div class="taskmgr-panel">
            <div class="taskmgr-summary">
                <h1 id="taskmgr-title">Applications</h1>
                <p id="taskmgr-description">Blank scaffold for the future Task Manager implementation.</p>
            </div>

            <div class="taskmgr-table">
                <div class="taskmgr-table__row taskmgr-table__row--header">
                    <span>Name</span>
                    <span>Status</span>
                    <span>CPU</span>
                    <span>Memory</span>
                </div>
                <div class="taskmgr-table__row">
                    <span>Task Manager</span>
                    <span>Running</span>
                    <span>--</span>
                    <span>--</span>
                </div>
                <div class="taskmgr-table__row taskmgr-table__row--empty">
                    <span>No live task data is connected yet.</span>
                </div>
            </div>
        </div>

        <div class="taskmgr-statusbar">
            <span id="taskmgr-status-text">Processes: 0</span>
            <span>CPU Usage: --</span>
            <span>Physical Memory: --</span>
        </div>
    </div>

    <script src="taskmgr.exe.js"></script>
</body>

</html>
