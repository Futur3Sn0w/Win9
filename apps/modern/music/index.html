<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <link rel="stylesheet" href="../../../css/fonts.css">
    <link rel="stylesheet" href="./music.css">
</head>

<body>
    <div id="music-app" class="music-app" aria-label="Music">
        <div class="music-app-shell">
            <aside class="music-sidebar" aria-label="Music navigation">
                <div class="music-brand">
                    <div class="music-brand-mark">
                        <img src="resources/images/icons/explorer/music/48.png" alt="">
                    </div>
                    <div class="music-brand-copy">
                        <div class="music-brand-name">Xbox Music</div>
                        <div class="music-brand-subtitle">Metro preview</div>
                    </div>
                </div>

                <label class="music-search" for="music-search">
                    <input id="music-search" type="search" placeholder="Search the catalog" autocomplete="off">
                    <button type="button" class="music-search-button" aria-label="Search">Go</button>
                </label>

                <nav class="music-nav">
                    <button type="button" class="music-nav-item" data-view="collection">Collection</button>
                    <button type="button" class="music-nav-item" data-view="radio">Radio</button>
                    <button type="button" class="music-nav-item" data-view="explore">Explore</button>
                </nav>

                <div class="music-sidebar-divider"></div>

                <div class="music-sidebar-heading">Library</div>
                <div id="music-sidebar-library" class="music-sidebar-list"></div>

                <div class="music-sidebar-heading">Playlists</div>
                <div id="music-sidebar-playlists" class="music-sidebar-list"></div>

                <div class="music-sidebar-footer">
                    <div id="music-folder-label" class="music-folder-label">Music Library</div>
                    <div class="music-sidebar-actions">
                        <button type="button" class="music-action-button" data-action="refresh-library">Refresh</button>
                        <button type="button" class="music-action-button" data-action="choose-folder">Change folder</button>
                    </div>
                </div>
            </aside>

            <main class="music-main">
                <div id="music-main-content" class="music-main-content"></div>
            </main>
        </div>

        <footer class="music-player">
            <div id="music-now-playing" class="music-now-playing"></div>

            <div class="music-player-center">
                <div class="music-progress-row">
                    <span id="music-current-time" class="music-timecode">0:00</span>
                    <input id="music-progress" class="music-progress" type="range" min="0" max="1000" value="0">
                    <span id="music-total-time" class="music-timecode">0:00</span>
                </div>

                <div class="music-control-row">
                    <button type="button" class="music-icon-button" data-action="previous-track" aria-label="Previous track">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7 6h2v12H7zM11 12l8-6v12z" fill="currentColor"></path>
                        </svg>
                    </button>
                    <button type="button" id="music-play-pause" class="music-icon-button music-icon-button--primary"
                        data-action="toggle-playback" aria-label="Play">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M8 5.5v13l10-6.5z" fill="currentColor"></path>
                        </svg>
                    </button>
                    <button type="button" class="music-icon-button" data-action="next-track" aria-label="Next track">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15 6h2v12h-2zM5 6l8 6-8 6z" fill="currentColor"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="music-player-volume">
                <span class="music-volume-label">Volume</span>
                <input id="music-volume" class="music-volume" type="range" min="0" max="100" value="80">
            </div>
        </footer>

        <audio id="music-audio" preload="metadata"></audio>
    </div>

    <script src="./music.js"></script>
</body>

</html>
