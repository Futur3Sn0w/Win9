<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="../../../css/fonts.css">
    <link href="https://cdn.metroui.org.ua/4.5.12/icons.css" rel="stylesheet">
    <style>
        :root {
            --search-accent: #643ebf;
            --search-accent-soft: #f1edff;
            --search-border: #d8d8d8;
            --search-text: #1a1a1a;
            --search-subtle: #666;
            --search-shell: #f7f7f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            color: var(--search-text);
            background:
                radial-gradient(circle at top left, rgba(100, 62, 191, 0.13), transparent 34%),
                linear-gradient(180deg, #ffffff 0%, var(--search-shell) 100%);
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .search-app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .search-app-header {
            padding: 34px 42px 22px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .search-app-kicker {
            color: var(--search-accent);
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 14px;
        }

        .search-app-querybar {
            width: min(620px, 100%);
            display: flex;
            align-items: stretch;
            border: 2px solid var(--search-accent);
            min-height: 44px;
            background: #fff;
            box-shadow: 0 10px 24px rgba(100, 62, 191, 0.08);
        }

        .search-app-querybar input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            color: inherit;
            font-size: 18px;
            padding: 0 14px;
        }

        .search-app-querybar input:focus {
            outline: none;
        }

        .search-app-querybar button {
            border: none;
            background: var(--search-accent);
            color: #fff;
            font-size: 14px;
            padding: 0 18px;
            flex-shrink: 0;
        }

        .search-app-tabs {
            display: flex;
            gap: 8px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .search-app-tab {
            min-height: 32px;
            padding: 0 14px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.72);
            color: var(--search-text);
        }

        .search-app-tab.is-active {
            background: var(--search-accent);
            border-color: var(--search-accent);
            color: #fff;
        }

        .search-app-main {
            flex: 1;
            padding: 26px 42px 42px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-app-status {
            color: var(--search-subtle);
            font-size: 15px;
            line-height: 1.45;
        }

        .search-app-results {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .search-app-group {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
        }

        .search-app-group-header {
            padding: 14px 16px 0;
            color: var(--search-accent);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .search-app-group-body {
            display: flex;
            flex-direction: column;
            padding: 10px 0 8px;
        }

        .search-app-result {
            width: 100%;
            min-height: 60px;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            text-align: left;
            color: inherit;
        }

        .search-app-result:hover,
        .search-app-result:focus {
            outline: none;
            background: rgba(100, 62, 191, 0.08);
        }

        .search-app-result-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--search-text);
        }

        .search-app-result-icon.search-panel-result-icon--plate {
            padding: 5px;
        }

        .search-app-result-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .search-app-result-icon [class^="mif-"],
        .search-app-result-icon [class*=" mif-"],
        .search-app-result-icon [class^="sui-"],
        .search-app-result-icon [class*=" sui-"] {
            font-size: 22px;
            line-height: 1;
        }

        .search-app-result-copy {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .search-app-result-title {
            font-size: 16px;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-app-result-subtitle {
            color: var(--search-subtle);
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-app-empty {
            padding: 24px 0;
            color: var(--search-subtle);
            font-size: 16px;
            line-height: 1.5;
        }

        @media (max-width: 720px) {
            .search-app-header,
            .search-app-main {
                padding-left: 22px;
                padding-right: 22px;
            }

            .search-app-querybar {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="search-app-shell">
        <header class="search-app-header">
            <div class="search-app-kicker">Search</div>
            <div class="search-app-querybar">
                <input type="text" id="search-app-query" placeholder="Search apps, settings, and files">
                <button type="button" id="search-app-submit">Search</button>
            </div>
            <div class="search-app-tabs" id="search-app-tabs">
                <button type="button" class="search-app-tab" data-source="all">All</button>
                <button type="button" class="search-app-tab" data-source="apps">Apps</button>
                <button type="button" class="search-app-tab" data-source="settings">Settings</button>
                <button type="button" class="search-app-tab" data-source="files">Files</button>
            </div>
        </header>
        <main class="search-app-main">
            <div class="search-app-status" id="search-app-status">Loading search results.</div>
            <div class="search-app-results" id="search-app-results"></div>
        </main>
    </div>

    <script>
        const SEARCH_QUERY_STORAGE_KEY = 'win8-search-last-query';
        const SEARCH_SOURCE_STORAGE_KEY = 'win8-search-last-source';

        const searchInput = document.getElementById('search-app-query');
        const searchSubmit = document.getElementById('search-app-submit');
        const searchStatus = document.getElementById('search-app-status');
        const searchResults = document.getElementById('search-app-results');
        const searchTabs = Array.from(document.querySelectorAll('.search-app-tab'));

        let currentQuery = '';
        let currentSource = 'all';
        let currentResults = [];
        let currentRequestId = 0;
        let inputDebounceTimer = null;

        function normalizeQuery(value) {
            return String(value || '').trim();
        }

        function normalizeSource(value) {
            const normalized = String(value || '').trim().toLowerCase();
            return ['all', 'apps', 'settings', 'files'].includes(normalized)
                ? normalized
                : 'all';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getSourceLabel(source) {
            switch (normalizeSource(source)) {
                case 'apps':
                    return 'Apps';
                case 'settings':
                    return 'Settings';
                case 'files':
                    return 'Files';
                default:
                    return 'All';
            }
        }

        function persistSearchState() {
            try {
                localStorage.setItem(SEARCH_QUERY_STORAGE_KEY, currentQuery);
                localStorage.setItem(SEARCH_SOURCE_STORAGE_KEY, currentSource);
            } catch (error) {
                console.warn('[Search app] Failed to persist search state:', error);
            }
        }

        function updateTabState() {
            searchTabs.forEach(tab => {
                tab.classList.toggle('is-active', tab.dataset.source === currentSource);
            });
        }

        function getResultIconMarkup(result) {
            const iconClass = result?.icon?.className ? ` ${result.icon.className}` : '';
            const iconStyle = typeof result?.icon?.style === 'string' && result.icon.style.trim()
                ? ` style="${escapeHtml(result.icon.style)}"`
                : '';

            return `<span class="search-app-result-icon${iconClass}"${iconStyle}>${result?.icon?.html || '<span class="sui-search"></span>'}</span>`;
        }

        function groupResults(results, source) {
            const normalizedSource = normalizeSource(source);
            if (normalizedSource !== 'all') {
                return [{
                    label: getSourceLabel(normalizedSource),
                    items: results.map((result, index) => ({ result, index }))
                }];
            }

            const groups = [];
            const groupOrder = ['Apps', 'Settings', 'Files', 'Search'];

            groupOrder.forEach(label => {
                const items = [];
                results.forEach((result, index) => {
                    if ((result.group || result.source || '') === label || (label === 'Search' && result.source === 'search')) {
                        items.push({ result, index });
                    }
                });

                if (items.length) {
                    groups.push({ label, items });
                }
            });

            return groups;
        }

        function renderResults() {
            if (!currentResults.length) {
                searchResults.innerHTML = `<div class="search-app-empty">${currentQuery
                    ? 'No results matched that search.'
                    : 'Suggested results will appear here as the shared search engine responds.'}</div>`;
                return;
            }

            const groups = groupResults(currentResults, currentSource);
            searchResults.innerHTML = groups.map(group => `
                <section class="search-app-group">
                    <div class="search-app-group-header">${escapeHtml(group.label)}</div>
                    <div class="search-app-group-body">
                        ${group.items.map(item => `
                            <button type="button" class="search-app-result" data-result-index="${item.index}">
                                ${getResultIconMarkup(item.result)}
                                <span class="search-app-result-copy">
                                    <span class="search-app-result-title">${escapeHtml(item.result.title)}</span>
                                    <span class="search-app-result-subtitle">${escapeHtml(item.result.subtitle || '')}</span>
                                </span>
                            </button>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        function updateStatus() {
            if (!currentResults.length) {
                searchStatus.textContent = currentQuery
                    ? `No ${getSourceLabel(currentSource).toLowerCase()} results matched "${currentQuery}".`
                    : `Showing suggested ${getSourceLabel(currentSource).toLowerCase()} results.`;
                return;
            }

            searchStatus.textContent = currentQuery
                ? `Showing ${currentResults.length} ${getSourceLabel(currentSource).toLowerCase()} result${currentResults.length === 1 ? '' : 's'} for "${currentQuery}".`
                : `Showing suggested ${getSourceLabel(currentSource).toLowerCase()} results.`;
        }

        function postToHost(payload) {
            if (!window.parent || window.parent === window) {
                return false;
            }

            window.parent.postMessage({
                appId: 'search',
                ...payload
            }, '*');
            return true;
        }

        function requestResults() {
            currentRequestId += 1;
            const requestId = currentRequestId;

            searchStatus.textContent = currentQuery
                ? `Searching ${getSourceLabel(currentSource).toLowerCase()} for "${currentQuery}"...`
                : `Loading suggested ${getSourceLabel(currentSource).toLowerCase()} results...`;

            if (!postToHost({
                action: 'oneSearchRequest',
                query: currentQuery,
                source: currentSource,
                requestId
            })) {
                searchStatus.textContent = 'Search host is unavailable in this view.';
            }
        }

        function applySearchState(nextState, options = {}) {
            const {
                request = true
            } = options;

            currentQuery = normalizeQuery(nextState?.query ?? currentQuery);
            currentSource = normalizeSource(nextState?.source ?? currentSource);

            searchInput.value = currentQuery;
            updateTabState();
            persistSearchState();

            if (request) {
                requestResults();
            } else {
                updateStatus();
                renderResults();
            }
        }

        searchInput.addEventListener('input', function () {
            currentQuery = normalizeQuery(this.value);
            persistSearchState();

            if (inputDebounceTimer) {
                clearTimeout(inputDebounceTimer);
            }

            inputDebounceTimer = setTimeout(() => {
                requestResults();
            }, 120);
        });

        searchInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();

                if (currentResults.length > 0) {
                    postToHost({
                        action: 'oneSearchExecute',
                        result: currentResults[0]
                    });
                    return;
                }

                requestResults();
            }
        });

        searchSubmit.addEventListener('click', function () {
            if (currentResults.length > 0) {
                postToHost({
                    action: 'oneSearchExecute',
                    result: currentResults[0]
                });
                return;
            }

            requestResults();
        });

        searchTabs.forEach(tab => {
            tab.addEventListener('click', function () {
                applySearchState({
                    source: tab.dataset.source
                }, {
                    request: true
                });
            });
        });

        searchResults.addEventListener('click', function (event) {
            const target = event.target.closest('.search-app-result[data-result-index]');
            if (!target) {
                return;
            }

            const index = Number(target.getAttribute('data-result-index'));
            if (!Number.isFinite(index) || !currentResults[index]) {
                return;
            }

            postToHost({
                action: 'oneSearchExecute',
                result: currentResults[index]
            });
        });

        window.addEventListener('message', function (event) {
            const data = event.data;
            if (!data || typeof data.action !== 'string') {
                return;
            }

            if (data.action === 'updateSearchQuery') {
                applySearchState({
                    query: data.query || '',
                    source: data.source || currentSource
                }, {
                    request: true
                });
                return;
            }

            if (data.action !== 'oneSearchResults') {
                return;
            }

            if (data.requestId && data.requestId < currentRequestId) {
                return;
            }

            currentRequestId = Math.max(currentRequestId, Number(data.requestId) || 0);
            currentQuery = normalizeQuery(data.query || currentQuery);
            currentSource = normalizeSource(data.source || currentSource);
            currentResults = Array.isArray(data.results) ? data.results : [];

            searchInput.value = currentQuery;
            updateTabState();
            persistSearchState();
            updateStatus();
            renderResults();
        });

        try {
            currentQuery = normalizeQuery(localStorage.getItem(SEARCH_QUERY_STORAGE_KEY) || '');
            currentSource = normalizeSource(localStorage.getItem(SEARCH_SOURCE_STORAGE_KEY) || 'all');
        } catch (error) {
            console.warn('[Search app] Failed to restore persisted search state:', error);
            currentQuery = '';
            currentSource = 'all';
        }

        searchInput.value = currentQuery;
        updateTabState();
        updateStatus();
        renderResults();
        requestResults();
    </script>
</body>

</html>
