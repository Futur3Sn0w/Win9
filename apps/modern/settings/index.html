        function syncBluetoothExpandedDevice(state) {
            if (!bluetoothExpandedDeviceId || !state) {
                return;
            }

            const visibleDeviceIds = new Set(
                []
                    .concat(state.connectedDevices || [])
                    .concat(state.discoveredDevices || [])
                    .map(device => device.id)
            );

            if (!visibleDeviceIds.has(bluetoothExpandedDeviceId)) {
                bluetoothExpandedDeviceId = null;
            }
        }

        function renderBluetoothSettingsContent(state) {
            const isEnabled = Boolean(state && state.enabled);
            const connectedDevices = Array.isArray(state && state.connectedDevices) ? state.connectedDevices : [];
            const discoveredDevices = Array.isArray(state && state.discoveredDevices) ? state.discoveredDevices : [];
            const introText = isEnabled
                ? 'Your PC is searching for and can be discovered by Bluetooth devices.'
                : 'Bluetooth is turned off. Turn it on to connect and discover devices.';

            return `
                <div class="settings-bluetooth-page">
                    <div class="settings-content-title">Manage Bluetooth devices</div>
                    <div class="settings-toggle-container">
                        <div class="settings-toggle-copy">
                            <div class="settings-toggle-label">Bluetooth</div>
                            <div class="settings-toggle-description">Turn Bluetooth on or off.</div>
                        </div>
                        <button class="modern-switch ${isEnabled ? 'is-on' : ''}"
                            type="button"
                            data-bluetooth-toggle
                            aria-pressed="${isEnabled ? 'true' : 'false'}">
                            <span class="modern-switch-thumb"></span>
                        </button>
                    </div>
                    <div class="settings-bluetooth-intro">
                        ${escapeHtml(introText)}
                        ${isEnabled && state.searching ? `
                            <span class="settings-bluetooth-searching" aria-hidden="true">
                                <span class="settings-bluetooth-searching-dot"></span>
                                <span class="settings-bluetooth-searching-dot"></span>
                                <span class="settings-bluetooth-searching-dot"></span>
                            </span>
                        ` : ''}
                    </div>

                    <div class="settings-bluetooth-section">
                        <div class="settings-bluetooth-section-title">Connected devices</div>
                        <div class="settings-bluetooth-device-list">
                            ${isEnabled
                    ? (connectedDevices.length > 0
                        ? connectedDevices.map(renderBluetoothDeviceMarkup).join('')
                        : getBluetoothEmptyMarkup('No devices are currently connected.'))
                    : getBluetoothEmptyMarkup('Turn Bluetooth on to see connected devices.')}
                        </div>
                    </div>

                    <div class="settings-bluetooth-section">
                        <div class="settings-bluetooth-section-title">Discovered devices</div>
                        <div class="settings-bluetooth-device-list">
                            ${isEnabled
                    ? (discoveredDevices.length > 0
                        ? discoveredDevices.map(renderBluetoothDeviceMarkup).join('')
                        : getBluetoothEmptyMarkup('No Bluetooth devices found right now.'))
                    : getBluetoothEmptyMarkup('Discovered devices will appear here when Bluetooth is on.')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBluetoothErrorState(message, animate = false) {
            updateSettingsContentWrapper(`
                <div class="settings-bluetooth-page">
                    <div class="settings-content-title">Manage Bluetooth devices</div>
                    <div class="settings-bluetooth-intro">${escapeHtml(message)}</div>
                </div>
            `, animate);
        }

        function renderBluetoothState(state, animate = false) {
            bluetoothPageState = state;
            syncBluetoothExpandedDevice(state);
            const wrapper = updateSettingsContentWrapper(renderBluetoothSettingsContent(state), animate);
            applyShellUserProfile(document);
            setupBluetoothPageHandlers(wrapper);
        }

        async function renderBluetoothSubmenuContent(animate = true, renderToken = 0) {
            updateSettingsContentWrapper(`
                <div class="settings-bluetooth-page">
                    <div class="settings-content-title">Manage Bluetooth devices</div>
                    <div class="settings-bluetooth-intro">Loading Bluetooth devices...</div>
                </div>
            `, animate);

            try {
                const state = await loadBluetoothState();
                if (renderToken !== settingsRenderToken) {
                    return;
                }

                renderBluetoothState(state, false);
            } catch (error) {
                if (renderToken !== settingsRenderToken) {
                    return;
                }

                console.error('[Settings] Failed to load Bluetooth state:', error);
                renderBluetoothErrorState(error.message || 'Unable to load Bluetooth devices.');
            }
        }

        async function handleBluetoothDeviceAction(deviceId, action) {
            if (!deviceId || !action) {
                return;
            }

            bluetoothBusyDeviceId = deviceId;
            bluetoothBusyAction = action;
            renderBluetoothState(bluetoothPageState || getBluetoothFallbackState(), false);

            try {
                let state;
                if (action === 'connect') {
                    state = await invokeBluetoothAction('bluetooth:connect-device', deviceId);
                } else if (action === 'disconnect') {
                    state = await invokeBluetoothAction('bluetooth:disconnect-device', deviceId);
                } else if (action === 'remove') {
                    state = await invokeBluetoothAction('bluetooth:remove-device', deviceId);
                } else {
                    return;
                }

                renderBluetoothState(state, false);
            } catch (error) {
                console.error('[Settings] Bluetooth device action failed:', error);
                renderBluetoothErrorState(error.message || 'Bluetooth action failed.');
            } finally {
                bluetoothBusyDeviceId = null;
                bluetoothBusyAction = null;

                if (currentCategory === 'pc-and-devices' && currentItem === 'bluetooth') {
                    const latestState = await loadBluetoothState().catch(() => null);
                    if (latestState) {
                        renderBluetoothState(latestState, false);
                    }
                }
            }
        }

        function setupBluetoothPageHandlers(root = document) {
            const scopedRoot = root && typeof root.querySelector === 'function' ? root : document;
            const toggle = scopedRoot.querySelector('[data-bluetooth-toggle]');
            if (toggle) {
                toggle.addEventListener('click', async function () {
                    console.log('[Settings] Bluetooth toggle clicked');
                    const nextEnabledState = !(bluetoothPageState && bluetoothPageState.enabled);
                    toggle.disabled = true;

                    try {
                        bluetoothExpandedDeviceId = null;
                        console.log('[Settings] Requesting Bluetooth enabled state:', nextEnabledState);
                        const state = await invokeBluetoothAction('bluetooth:set-enabled', nextEnabledState);
                        console.log('[Settings] Bluetooth toggle completed with state:', state);
                        renderBluetoothState(state, false);
                    } catch (error) {
                        console.error('[Settings] Failed to toggle Bluetooth:', error);
                        renderBluetoothErrorState(error.message || 'Unable to change Bluetooth state.');
                    }
                });
            }

            scopedRoot.querySelectorAll('[data-bluetooth-device-toggle]').forEach((button) => {
                button.addEventListener('click', function () {
                    const deviceId = this.getAttribute('data-bluetooth-device-toggle');
                    bluetoothExpandedDeviceId = bluetoothExpandedDeviceId === deviceId ? null : deviceId;
                    renderBluetoothState(bluetoothPageState || getBluetoothFallbackState(), false);
                });
            });

            scopedRoot.querySelectorAll('[data-bluetooth-action]').forEach((button) => {
                button.addEventListener('click', function (event) {
                    event.stopPropagation();
                    handleBluetoothDeviceAction(
                        this.getAttribute('data-bluetooth-device-id'),
                        this.getAttribute('data-bluetooth-action')
                    );
                });
            });
        }

        // Function to render content for a submenu item
        // animate parameter: true to slide in (default for navigation), false to update in place
        async function renderSubmenuContent(categoryId, itemId, animate = true) {
            currentCategory = categoryId;
            currentItem = itemId;
            const renderToken = ++settingsRenderToken;

            if (isLockScreenTarget(categoryId, itemId)) {
                renderLockScreenSubmenuContent(animate);
                return;
            }

            if (categoryId === PERSONALIZE_CATEGORY_ID && itemId === 'start-surfaces') {
                renderStartSurfacesState(animate);
                return;
            }

            if (categoryId === PERSONALIZE_CATEGORY_ID && itemId === 'taskbar') {
                taskbarSettingsPageState = null;
                renderTaskbarSettingsState(animate);
                return;
            }

            if (categoryId === PERSONALIZE_CATEGORY_ID && itemId === 'corners-and-edges') {
                cornersAndEdgesPageState = null;
                renderCornersAndEdgesState(animate);
                return;
            }

            if (categoryId === 'pc-and-devices' && itemId === 'bluetooth') {
                await renderBluetoothSubmenuContent(animate, renderToken);
                return;
            }

            const categoryData = settingsData[categoryId];
            if (!categoryData || !categoryData.items[itemId]) {
                console.error('Invalid category or item:', categoryId, itemId);
                return;
            }

            const itemData = categoryData.items[itemId];
            let html = '';

            // Render each section
            itemData.sections.forEach(section => {
                const isAccountsProfilePage = categoryId === 'accounts' && itemId === 'your-account';
                const isProfileNameSection = isAccountsProfilePage && section.title === 'MS_ACCTNAME';
                const sectionTitle = isProfileNameSection ? shellUserProfile.displayName : section.title;
                const titleAttribute = isProfileNameSection ? ' data-shell-user-profile-name="display"' : '';

                html += '<div class="settings-content-title"' + titleAttribute + '>' + escapeHtml(sectionTitle) + '</div>';

                if (isProfileNameSection) {
                    html += renderAccountsProfileSummary();
                } else if (isAccountsProfilePage && section.title === 'Account picture') {
                    html += renderAccountsPicturePreview();
                } else if (isAccountsProfilePage && section.title === 'Create an account picture') {
                    html += '<div class="settings-account-note">The simulator is using the current host account name and picture for a more personalized shell.</div>';
                }

                // Render settings in this section
                if (section.settings && section.settings.length > 0) {
                    section.settings.forEach(setting => {
                        // TODO: Render individual settings
                        // Will add this when we populate the settings array
                    });
                }
            });

            updateSettingsContentWrapper(html, animate);

            applyShellUserProfile(document);
        }

        // Helper function to navigate to a specific submenu item
        function navigateToSubmenuItem(categoryId, itemId) {
            const target = normalizeNavigationTarget(categoryId, itemId);

            // Find the category link in the main menu
            const categoryLink = document.querySelector(`.settings-category[data-category="${target.categoryId}"]`);
            if (categoryLink) {
                // Simulate clicking the category to open submenu
                categoryLink.click();

                // Wait for submenu to be created, then select the specific item
                setTimeout(() => {
                    const submenu = document.getElementById('submenu');
                    if (submenu) {
                        const itemLink = submenu.querySelector(`.settings-category[data-submenu-item="${target.itemId}"]`);
                        if (itemLink) {
                            // Remove active from all items
                            submenu.querySelectorAll('.settings-category').forEach(cat => {
                                cat.classList.remove('active');
                            });
                            // Add active to target item
                            itemLink.classList.add('active');
                            // Render content
                            renderSubmenuContent(target.categoryId, target.itemId);
                            // In narrow mode, jump straight to the content pane
                            narrowShowContent();
                        }
                    }
                }, 100);
            }
        }

        function handleSettingsNavigationRequest(categoryId, itemId) {
            if (!categoryId) {
                return;
            }

            const target = normalizeNavigationTarget(categoryId, itemId);

            if (!settingsData || Object.keys(settingsData).length === 0) {
                pendingNavigationRequest = target;
                return;
            }

            pendingNavigationRequest = null;

            if (target.itemId) {
                navigateToSubmenuItem(target.categoryId, target.itemId);
                return;
            }

            const categoryLink = document.querySelector(`.settings-category[data-category="${target.categoryId}"]`);
            if (categoryLink) {
                categoryLink.click();
            }
        }

        // Setup click handlers for personalize tiles
        function setupPersonalizeTileHandlers() {
            const lockScreenTile = document.getElementById('tile-lock-screen');
            const accountPictureTile = document.getElementById('tile-account-picture');
            const viewMoreLink = document.getElementById('personalize-view-more-link');

            if (lockScreenTile) {
                lockScreenTile.addEventListener('click', function () {
                    navigateToSubmenuItem(PERSONALIZE_CATEGORY_ID, 'lock-screen');
                });
            }

            if (accountPictureTile) {
                accountPictureTile.addEventListener('click', function () {
                    navigateToSubmenuItem('accounts', 'your-account');
                });
            }

            if (viewMoreLink) {
                viewMoreLink.addEventListener('click', function (event) {
                    event.preventDefault();
                    handleSettingsNavigationRequest(PERSONALIZE_CATEGORY_ID);
                });
            }
        }

        // Trigger initial animation on page load
        // Use requestAnimationFrame to ensure DOM is ready
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                sidebarTitle.classList.add('visible');
                mainMenu.classList.add('visible');

                // Animate initial content
                const initialWrapper = settingsContent.querySelector('.settings-content-wrapper');
                if (initialWrapper) {
                    initialWrapper.classList.add('visible');
                }

                // Setup tile handlers after DOM is ready
                setupPersonalizeTileHandlers();
            });
        });

        loadShellUserProfile();

        // Handle back button
        backBtn.addEventListener('click', function () {
            // Narrow mode: if content pane is showing, slide back to submenu
            if (isNarrowMode() && settingsContainer.classList.contains('narrow-show-content')) {
                narrowHideContent();
                return;
            }

            // Return to main menu
            currentMenu = 'main';
            currentCategory = null;
            currentItem = null;
            settingsRenderToken += 1;
            bluetoothExpandedDeviceId = null;

            // Always clear narrow-show-content when going to root
            narrowHideContent();

            // Hide back button
            backBtn.classList.remove('visible');

            // Instantly hide header (no exit animation)
            sidebarTitle.classList.remove('visible');

            // Remove submenu if it exists
            const submenu = document.getElementById('submenu');
            if (submenu) {
                submenu.remove();
            }

            // Wait for browser to render hidden state, then change text and animate in
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    // Change text
                    sidebarTitleText.textContent = 'PC settings';

                    // Force reflow to ensure animation triggers
                    void sidebarTitle.offsetWidth;

                    // Animate header in
                    sidebarTitle.classList.add('visible');

                    // Show main menu with animation
                    mainMenu.classList.remove('hidden');
                    mainMenu.classList.remove('visible');
                    void mainMenu.offsetWidth;
                    mainMenu.classList.add('visible');
                });
            });

            // Remove existing content wrapper (no exit animation)
            const existingWrapper = settingsContent.querySelector('.settings-content-wrapper');
            if (existingWrapper) {
                existingWrapper.remove();
            }

            // Restore Personalize content with current wallpaper
            const wrapper = document.createElement('div');
            wrapper.className = 'settings-content-wrapper';
            wrapper.innerHTML = getPersonalizeContent();
            settingsContent.appendChild(wrapper);
            applyShellUserProfile(document);

            // Animate content in
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    wrapper.classList.add('visible');

                    // Re-attach tile handlers after restoring content
                    setupPersonalizeTileHandlers();
                });
            });
        });

        // Handle sidebar navigation
        document.querySelectorAll('.settings-category').forEach(category => {
            category.addEventListener('click', function (e) {
                e.preventDefault();

                // Special handling for Control Panel
                if (this.id === 'control-panel-link') {
                    // First switch to desktop, then launch Control Panel
                    if (window.parent) {
                        // Close start screen to go to desktop
                        if (window.parent.closeStartScreen) {
                            window.parent.closeStartScreen();
                        }
                        // Wait a bit for transition, then launch Control Panel
                        setTimeout(() => {
                            if (window.parent.launchApp) {
                                window.parent.launchApp('control-panel');
                            }
                        }, 450); // Wait for closeStartScreen animation (400ms) + small buffer
                    }
                    return;
                }

                // Get category name and data
                const categoryName = this.querySelector('.settings-category-name').textContent;
                const categoryId = this.getAttribute('data-category');

                // Enter submenu mode
                currentMenu = 'submenu';
                currentCategory = categoryId;
                currentItem = null;

                // Instantly hide main menu (no exit animation)
                mainMenu.classList.add('hidden');
                mainMenu.classList.remove('visible');

                // Instantly hide header (no exit animation)
                sidebarTitle.classList.remove('visible');

                // Get category data from settingsData
                const categoryData = settingsData[categoryId];
                if (categoryData && categoryData.items) {
                    // Create submenu container
                    const submenuContainer = document.createElement('div');
                    submenuContainer.className = 'settings-menu-list';
                    submenuContainer.id = 'submenu';

                    // Get array of item IDs and data
                    const itemEntries = Object.entries(categoryData.items);

                    // Add each submenu item
                    itemEntries.forEach(([itemId, itemData], index) => {
                        const item = document.createElement('a');
                        item.href = '#';
                        item.className = 'active-scale-effect settings-category';
                        item.setAttribute('data-submenu-item', itemId);
                        item.innerHTML = '<span class="settings-category-name">' + itemData.name + '</span>';

                        // Mark first item as active
                        if (index === 0) {
                            item.classList.add('active');
                        }

                        // Add click handler for submenu items
                        item.addEventListener('click', function (e) {
                            e.preventDefault();

                            // Remove active class from all submenu items
                            submenuContainer.querySelectorAll('.settings-category').forEach(cat => {
                                cat.classList.remove('active');
                            });

                            // Add active class to clicked item
                            item.classList.add('active');

                            // Render content for this item
                            renderSubmenuContent(categoryId, itemId);

                            // In narrow mode, slide to the content pane
                            narrowShowContent();
                        });

                        submenuContainer.appendChild(item);
                    });

                    // Insert submenu after main menu
                    mainMenu.parentNode.insertBefore(submenuContainer, mainMenu.nextSibling);

                    // Wait for browser to render hidden state, then change text and animate in
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            // Show back button and update title text
                            backBtn.classList.add('visible');
                            sidebarTitleText.textContent = categoryName;

                            // Force reflow to ensure animation triggers
                            void sidebarTitle.offsetWidth;

                            // Animate header back in
                            sidebarTitle.classList.add('visible');

                            // Animate submenu in
                            submenuContainer.classList.add('visible');
                        });
                    });

                    // Set content area to show first submenu item
                    const firstItemId = itemEntries[0][0];
                    renderSubmenuContent(categoryId, firstItemId);
                } else {
                    currentItem = null;
                    // No submenu items, just animate header
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            // Show back button and update title text
                            backBtn.classList.add('visible');
                            sidebarTitleText.textContent = categoryName;

                            // Force reflow to ensure animation triggers
                            void sidebarTitle.offsetWidth;

                            // Animate header back in
                            sidebarTitle.classList.add('visible');
                        });
                    });

                    // Clear content area for categories without submenu items
                    settingsContent.innerHTML = '<div class="settings-content-title">' + categoryName + '</div>';
                }
            });
        });
    </script>
</body>

</html>
