<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Settings</title>
    <link rel="stylesheet" href="../../../css/fonts.css">
    <link rel="stylesheet" href="../../../css/modern-ui.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/v4/css/metro-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            color: #000;
        }

        .settings-container {
            display: flex;
            height: 100vh;
        }

        .settings-sidebar {
            display: flex;
            flex-direction: column;
            width: 400px;
            flex-shrink: 0;
            height: 100%;
            background: var(--ui-accent);
            padding: 40px 0;
            border-right: none;
            overflow-x: hidden;
        }

        .settings-sidebar-title {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 30px;
            box-sizing: border-box;
            padding-left: 60px;
            padding-right: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;

            /* Initial state - entire header off-screen to the right */
            transform: translateX(100%);
            opacity: 0;

            /* Slide-in animation - header comes first */
            transition: transform 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s,
                opacity 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s;
        }

        .settings-sidebar-title.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .settings-sidebar-title-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .settings-back-btn {
            display: none;
            margin-left: -40px;
            margin-right: -10px;
            margin-bottom: -3px;
        }

        .settings-back-btn.visible {
            display: flex;
        }

        .settings-search-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .settings-search-icon:hover {
            opacity: 1;
        }

        .settings-menu-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .settings-category {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            padding-left: 60px;
            margin-bottom: 2px;
            border-radius: 0;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;

            /* Initial state - off-screen to the right */
            transform: translateX(50%);
            opacity: 0;

            /* Slide-in animation - all items together after title */
            transition: transform 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0.15s,
                opacity 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0.15s,
                background 0.1s ease;
        }

        .settings-menu-list.hidden {
            display: none;
        }

        /* When menu is visible, slide all items in together */
        .settings-menu-list.visible .settings-category {
            transform: translateX(0);
            opacity: 1;
        }

        .settings-category:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .settings-category.active {
            background: rgba(0, 0, 0, 0.15);
        }

        .settings-category-icon {
            display: none;
        }

        .settings-category-name {
            font-size: 15px;
        }

        .settings-content {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            position: relative;
        }

        .settings-content-wrapper {
            /* Initial state - off-screen to the right (reduced distance) */
            transform: translateX(10%);
            opacity: 0;

            /* Slide-in animation */
            transition: transform 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s,
                opacity 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s;
        }

        .settings-content-wrapper.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .settings-content-title {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 30px;
            color: var(--ui-accent);
            padding-bottom: 10px;
        }

        .settings-content-title:not(:first-child) {
            margin-top: 40px;
        }

        .settings-section {
            margin-bottom: 40px;
        }

        .settings-section-title {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #f2f2f2;
        }

        .settings-item-info {
            flex: 1;
        }

        .settings-item-title {
            font-size: 15px;
            margin-bottom: 5px;
        }

        .settings-item-description {
            font-size: 13px;
            color: #666;
        }

        .settings-account-summary {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: -8px 0 36px;
        }

        .settings-account-summary-avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            background: #d7d7d7;
            flex-shrink: 0;
        }

        .settings-account-summary-name {
            font-size: 30px;
            font-weight: 300;
            color: var(--ui-accent);
            line-height: 1.15;
        }

        .settings-account-summary-username {
            margin-top: 6px;
            font-size: 14px;
            color: #666;
        }

        .settings-account-picture-preview {
            width: 172px;
            height: 172px;
            padding: 12px;
            background: #f3f3f3;
            border: 1px solid #e1e1e1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-account-picture-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #d7d7d7;
        }

        .settings-account-note {
            max-width: 460px;
            font-size: 14px;
            line-height: 1.5;
            color: #666;
            margin: -8px 0 30px;
        }

        .personalize-tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            width: 720px;
        }

        .personalize-tile {
            position: relative;
            height: 200px;
            overflow: hidden;
            transition: 0.1s ease;

            display: flex;
            align-items: center;
            justify-content: center;

            &::after {
                content: '';

                position: absolute;
                z-index: 50;
                width: 100%;
                height: 100%;

                background-color: black;
                opacity: .25;
            }
        }

        .personalize-tile:hover {
            opacity: 0.9;
        }

        .personalize-tile.large {
            width: 720px;
            height: 337px;
        }

        .personalize-tile.user {
            width: 215px;
            height: 215px;
        }

        .personalize-tile.picpass {
            width: 375px;
            height: 215px;
        }

        .personalize-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .personalize-tile-label {
            position: absolute;
            z-index: 100;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-weight: 300;
        }

        .recently-used-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--ui-accent);
            font-size: 15px;
            text-decoration: none;
            cursor: pointer;
        }

        .recently-used-link:hover {
            text-decoration: underline;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-page {
            max-width: 980px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-intro,
        body:has(.settings-start-surfaces-page) .settings-start-surfaces-note,
        body:has(.settings-start-surfaces-page) .settings-start-surfaces-mode-copy {
            font-size: 14px;
            line-height: 1.5;
            color: #666;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-intro {
            margin: -8px 0 24px;
            max-width: 760px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-mode-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice {
            width: 100%;
            padding: 0;
            border: 2px solid #d7d7d7;
            background: #fff;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice:hover {
            transform: translateY(-1px);
            border-color: #bfbfbf;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.07);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice.is-active {
            border-color: var(--ui-accent);
            box-shadow: 0 0 0 1px rgba(var(--accent-rgb, 0, 120, 215), 0.18);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-preview {
            position: relative;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            background-color: var(--ui-wall-color, #2b2b2b);
            background-size: cover;
            background-position: center;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-desktop {
            position: absolute;
            inset: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-taskbar {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 11%;
            background: color-mix(in srgb, var(--ui-wall-color, #0078d7) 18%, #808080);
            border-top: 1px solid rgba(0, 0, 0, 0.28);
            display: flex;
            align-items: center;
            padding: 0 8px 0 6px;
            gap: 5px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-logo {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
            opacity: 0.9;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-logo svg {
            width: 13px;
            height: 13px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-dots {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            margin-right: 5px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-dot {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 50%;
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-apps {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-app {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.13);
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-tray {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-tray-item {
            width: 11px;
            height: 11px;
            background: rgba(255, 255, 255, 0.18);
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-clock {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-clock-row {
            height: 4px;
            background: rgba(255, 255, 255, 0.72);
            width: 24px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tb-clock-row.short {
            width: 18px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-menu {
            position: absolute;
            left: 0;
            bottom: 11%;
            width: 40%;
            height: 60%;
            display: grid;
            grid-template-columns: 49% 51%;
            background: var(--preview-menu-color, var(--ui-wall-color, rgba(11, 11, 11, 0.84)));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-menu.classic {
            width: 22%;
            grid-template-columns: 1fr;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-menu-left {
            padding: 10px 9px;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-user-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 9px;
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-avatar {
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-username {
            height: 6px;
            width: 52%;
            background: rgba(255, 255, 255, 0.72);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-menu-sep {
            height: 1px;
            background: rgba(255, 255, 255, 0.11);
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-menu-item {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 7px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-item-icon {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.38);
            flex-shrink: 0;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-item-text {
            height: 6px;
            background: rgba(255, 255, 255, 0.72);
            flex: 1;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-item-text.short {
            max-width: 52%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-item-text.medium {
            max-width: 68%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-menu-right {
            padding: 8px;
            background: transparent;
            width: 100%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-titlebar {
            width: 54%;
            height: 10px;
            background: rgba(255, 255, 255, 0.82);
            margin-bottom: 12px;
            opacity: 0.75;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-line {
            height: 8px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.8);
            opacity: 0.78;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-line.short {
            width: 62%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-line.medium {
            width: 78%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-line.long {
            width: 92%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tiles {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            height: 100%;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tile {
            background: rgba(255, 255, 255, 0.26);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tile.wide {
            grid-column: span 2;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-tile.medium {
            grid-column: span 1;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-copy {
            padding: 16px 18px 18px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 24px;
            font-weight: 300;
            color: var(--ui-accent);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice-pill {
            padding: 2px 10px;
            background: #ededed;
            color: #555;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-choice.is-active .settings-start-surfaces-choice-pill {
            background: var(--ui-accent);
            color: #fff;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-mode-copy {
            margin-top: 18px;
            max-width: 760px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-section {
            margin-top: 34px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-swatch {
            width: 34px;
            height: 34px;
            border: 2px solid transparent;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: transform 0.12s ease, border-color 0.12s ease, opacity 0.12s ease;
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-swatch:hover {
            opacity: 0.86;
            transform: translateY(-1px);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-swatch.is-active {
            border-color: var(--ui-accent);
        }

        body:has(.settings-start-surfaces-page) .settings-start-surfaces-swatch.is-active::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.72);
        }

        /* Lock screen page */
        .settings-lock-screen-page {
            max-width: 860px;
        }

        .settings-lock-screen-note {
            font-size: 14px;
            line-height: 1.5;
            color: #666;
        }

        .settings-lock-screen-stage {
            margin-bottom: 0;
        }

        .lock-screen-preview {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .lock-screen-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lock-screen-status-strip {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .lock-screen-status-detailed {
            min-width: 120px;
            padding: 10px 12px;
            background: rgba(6, 6, 6, 0.56);
            color: #fff;
            backdrop-filter: blur(3px);
        }

        .lock-screen-status-detailed-label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.72;
        }

        .lock-screen-status-detailed-name {
            display: block;
            margin-top: 4px;
            font-size: 20px;
            font-weight: 300;
        }

        .lock-screen-status-detailed-text {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.88;
        }

        .lock-screen-status-icons {
            display: grid;
            grid-template-columns: repeat(2, 36px);
            gap: 8px;
        }

        .lock-screen-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(6, 6, 6, 0.56);
            color: #fff;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            backdrop-filter: blur(3px);
        }

        .lock-screen-status-badge.is-empty {
            background: rgba(6, 6, 6, 0.26);
            color: rgba(255, 255, 255, 0.58);
        }

        .lock-screen-overlay {
            position: absolute;
            inset: auto 0 0 0;
            padding: 42px 40px 34px;
            color: white;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.64), transparent 72%);
        }

        .lock-screen-time {
            font-size: 72px;
            font-weight: 300;
            line-height: 0.95;
            margin-bottom: 7px;
        }

        .lock-screen-date {
            font-size: 20px;
            font-weight: 300;
        }

        .lock-screen-overlay-layout {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 28px;
        }

        .lock-screen-overlay-primary {
            min-width: 0;
        }

        .lock-screen-overlay-secondary {
            min-width: 160px;
            margin-bottom: 16px;
            text-align: left;
        }

        .lock-screen-preview-detailed {
            color: rgba(255, 255, 255, 0.92);
        }

        .lock-screen-preview-detailed-title {
            display: block;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.1;
        }

        .lock-screen-preview-detailed-text {
            display: block;
            margin-top: 3px;
            font-size: 13px;
            line-height: 1.25;
            opacity: 0.86;
        }

        .lock-screen-preview-quick {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .lock-screen-preview-quick-slot {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.88);
            font-size: 12px;
        }

        .lock-screen-preview-quick-slot.is-empty {
            color: rgba(255, 255, 255, 0.34);
        }

        .lock-screen-app-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: inherit;
            font-size: 20px;
            line-height: 1;
        }

        .lock-screen-app-icon.is-preview {
            font-size: 14px;
        }

        .lock-screen-app-icon-plus {
            position: absolute;
            font-size: 16px;
            line-height: 1;
            font-family: 'Segoe UI', sans-serif;
        }

        .settings-lock-screen-browse-row {
            padding: 10px 0 4px;
        }

    <script>
        // Listen for theme variables from parent window
        window.addEventListener('message', function (event) {
            if (event.data.action === 'setThemeVariables') {
                const variables = event.data.variables;
                console.log('[Settings] Received theme variables:', variables);

                // Apply CSS variables to the document root
                for (const [key, value] of Object.entries(variables)) {
                    if (value) {
                        document.documentElement.style.setProperty(`--${key}`, value);
                        console.log('[Settings] Set CSS variable --' + key + ':', value);
                    }
                }
            } else if (event.data.action === 'openSettingsCategory') {
                handleSettingsNavigationRequest(event.data.categoryId, event.data.itemId || null);
            }
        });

        // Navigation state
        let currentMenu = 'main'; // 'main' or 'submenu'
        let currentCategory = null;
        let currentItem = null;
        let settingsRenderToken = 0;

        const settingsContainer = document.querySelector('.settings-container');

        function isNarrowMode() {
            return settingsContainer.classList.contains('narrow-mode');
        }

        function narrowShowContent() {
            if (isNarrowMode()) {
                contentHeaderTitle.textContent = sidebarTitleText.textContent;
                settingsContainer.classList.add('narrow-show-content');
            }
        }

        function narrowHideContent() {
            settingsContainer.classList.remove('narrow-show-content');
        }

        function setNarrowMode(narrow) {
            const wasNarrow = isNarrowMode();
            if (narrow && !wasNarrow) {
                settingsContainer.classList.add('narrow-mode');
            } else if (!narrow && wasNarrow) {
                settingsContainer.classList.remove('narrow-mode');
                narrowHideContent();
            }
        }

        const NARROW_BREAKPOINT = 720;
        let isSnappedState = false;
        let isNarrowWidthState = false;

        function updateNarrowMode() {
            setNarrowMode(isSnappedState || isNarrowWidthState);
        }

        // Watch width via ResizeObserver
        const narrowModeObserver = new ResizeObserver(entries => {
            for (const entry of entries) {
                isNarrowWidthState = entry.contentRect.width < NARROW_BREAKPOINT;
                updateNarrowMode();
            }
        });
        narrowModeObserver.observe(settingsContainer);

        // Watch snap state via MutationObserver on the parent app container.
        // Use window.parent.AppsManager (known to be accessible) to get the
        // container element directly — avoids any document querying issues.
        try {
            const appContainer = window.parent?.AppsManager?.getRunningApp?.('settings')?.$container?.[0];
            if (appContainer) {
                new MutationObserver(() => {
                    isSnappedState = appContainer.classList.contains('snapped');
                    updateNarrowMode();
                }).observe(appContainer, { attributes: true, attributeFilter: ['class'] });

                isSnappedState = appContainer.classList.contains('snapped');
                updateNarrowMode();
            }
        } catch (e) {
            // Restricted context — snap detection unavailable
        }

        // Settings data will be loaded from JSON file
        let settingsData = {};
        let pendingNavigationRequest = null;
        const DEFAULT_SHELL_USER_IMAGE = new URL('../../../resources/images/user.png', window.location.href).href;

        const registryAPI = (function () {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (ctx && ctx.RegistryAPI) {
                    return ctx.RegistryAPI;
                }
            }
            return null;
        })();

        const shellUserProfileAPI = (function () {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (ctx && ctx.ShellUserProfile) {
                    return ctx.ShellUserProfile;
                }
            }
            return null;
        })();

        const timeBankAPI = (function () {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (ctx && ctx.TimeBank) {
                    return ctx.TimeBank;
                }
            }
            return null;
        })();

        function resolveShellContext(methodName) {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (!ctx) {
                    continue;
                }

                if (!methodName || typeof ctx[methodName] === 'function') {
                    return ctx;
                }
            }

            return null;
        }

        const settingsIpcRenderer = (function () {
            try {
                if (typeof require === 'function') {
                    return require('electron').ipcRenderer;
                }
            } catch (error) {
                console.warn('[Settings] Electron IPC is unavailable:', error);
            }

            try {
                if (window.parent && window.parent !== window &&
                    window.parent.Win9ElectronBridge &&
                    typeof window.parent.Win9ElectronBridge.invoke === 'function') {
                    console.log('[Settings] Using parent Win9ElectronBridge for IPC');
                    return window.parent.Win9ElectronBridge;
                }
            } catch (error) {
                console.warn('[Settings] Parent IPC bridge is unavailable:', error);
            }

            return null;

        function loadTaskbarSettingsPageState() {
            const defaults = {
                locked: true, autoHide: false, smallIcons: false, showUserTile: true,
                location: 'bottom', taskbarButtons: 'always',
                searchMode: 'icon', showTaskViewButton: true, showNotificationCenterIcon: true
            };
            const registry = getSettingsRegistry();
            if (!registry) {
                return { ...defaults };
            }

            try {
                let locked = true, autoHide = false, location = 'bottom';
                if (registryAPI && typeof registryAPI.decodeStuckRects2 === 'function') {
                    const binary = registry.getValue(TASKBAR_STUCKRECTS2_REGISTRY_PATH, 'Settings');
                    if (binary) {
                        const decoded = registryAPI.decodeStuckRects2(binary);
                        locked = decoded.locked !== undefined ? !!decoded.locked : true;
                        autoHide = !!decoded.autoHide;
                        location = TASKBAR_POSITION_TO_LOCATION[decoded.position] || 'bottom';
                    }
                }

                const glomLevel = registry.getValue(TASKBAR_ADVANCED_REGISTRY_PATH, 'TaskbarGlomLevel', 0);

                return {
                    locked,
                    autoHide,
                    smallIcons: Number(registry.getValue(TASKBAR_ADVANCED_REGISTRY_PATH, 'TaskbarSmallIcons', 0)) === 1,
                    showUserTile: Number(registry.getValue(TASKBAR_ADVANCED_REGISTRY_PATH, 'ShowUserTile', 1)) !== 0,
                    location,
                    taskbarButtons: TASKBAR_GLOM_TO_BUTTONS[glomLevel] || 'always',
                    searchMode: (() => { const v = Number(registry.getValue(TASKBAR_ADVANCED_REGISTRY_PATH, TASKBAR_SETTINGS_VALUE_NAMES.searchMode, 1)); return v === 2 ? 'box' : v === 0 ? 'off' : 'icon'; })(),
                    showTaskViewButton: Number(registry.getValue(TASKBAR_ADVANCED_REGISTRY_PATH, TASKBAR_SETTINGS_VALUE_NAMES.showTaskViewButton, 1)) !== 0,
                    showNotificationCenterIcon: Number(registry.getValue(TASKBAR_ADVANCED_REGISTRY_PATH, TASKBAR_SETTINGS_VALUE_NAMES.showNotificationCenterIcon, 1)) !== 0
                };
            } catch (error) {
                console.warn('[Settings] Failed to load taskbar settings from registry:', error);
                return { ...defaults };
            }
        }

        function getTaskbarSettingsPageState() {
            if (!taskbarSettingsPageState) {
                taskbarSettingsPageState = loadTaskbarSettingsPageState();
            }
            return taskbarSettingsPageState;
        }

        function persistTaskbarSetting(key, value) {
            const registry = getSettingsRegistry();
            if (!registry || !TASKBAR_SETTINGS_VALUE_NAMES[key]) {
                return;
            }

            try {
                const dwordValue = key === 'searchMode'
                    ? ({ icon: 1, box: 2, off: 0 }[value] ?? 1)
                    : (value ? 1 : 0);
                registry.setValue(TASKBAR_ADVANCED_REGISTRY_PATH, TASKBAR_SETTINGS_VALUE_NAMES[key], dwordValue, getRegistryDwordType());
            } catch (error) {
                console.warn('[Settings] Failed to persist taskbar setting:', key, error);
            }
        }

        function broadcastTaskbarSettingChange(key, value) {
            const contexts = [window.parent, window.top];
            const settings = {};
            settings[key] = value;
            contexts.forEach((ctx) => {
                if (!ctx || ctx === window) {
                    return;
                }
                try {
                    ctx.postMessage({ action: 'applyTaskbarSettings', settings }, '*');
                } catch (error) {
                    console.warn('[Settings] Failed to broadcast taskbar setting change:', error);
                }
            });
        }

        function applyTaskbarSettingToggle(key) {
            const state = getTaskbarSettingsPageState();
            const newValue = !state[key];
            persistTaskbarSetting(key, newValue);
            broadcastTaskbarSettingChange(key, newValue);
            taskbarSettingsPageState = { ...state, [key]: newValue };
            renderTaskbarSettingsState(false);
        }

        function applyTaskbarSettingSelect(key, value) {
            const state = getTaskbarSettingsPageState();
            const registry = getSettingsRegistry();

            if (key === 'location') {
                if (registry && registryAPI && typeof registryAPI.decodeStuckRects2 === 'function' && typeof registryAPI.encodeStuckRects2 === 'function') {
                    try {
                        const binary = registry.getValue(TASKBAR_STUCKRECTS2_REGISTRY_PATH, 'Settings');
                        const existing = binary ? registryAPI.decodeStuckRects2(binary) : { autoHide: false, alwaysOnTop: false, locked: true, height: 40, position: 3 };
                        existing.position = TASKBAR_LOCATION_TO_POSITION[value] ?? 3;
                        const regBinaryType = registryAPI.RegistryType ? registryAPI.RegistryType.REG_BINARY : 3;
                        registry.setValue(TASKBAR_STUCKRECTS2_REGISTRY_PATH, 'Settings', Array.from(registryAPI.encodeStuckRects2(existing)), regBinaryType);
                    } catch (error) {
                        console.warn('[Settings] Failed to persist taskbar location:', error);
                    }
                }
            } else if (key === 'taskbarButtons') {
                if (registry) {
                    try {
                        registry.setValue(TASKBAR_ADVANCED_REGISTRY_PATH, 'TaskbarGlomLevel', TASKBAR_BUTTONS_TO_GLOM[value] ?? 0, getRegistryDwordType());
                    } catch (error) {
                        console.warn('[Settings] Failed to persist taskbar buttons setting:', error);
                    }
                }
            } else if (key === 'searchMode') {
                persistTaskbarSetting(key, value);
            }

            broadcastTaskbarSettingChange(key, value);
            taskbarSettingsPageState = { ...state, [key]: value };
            renderTaskbarSettingsState(false);
        }

                { value: 'off', label: 'Off' }
            ])}
                ${toggleRow('Task View', 'showTaskViewButton')}
                ${toggleRow('Notifications', 'showNotificationCenterIcon')}
                ${toggleRow('User tile', 'showUserTile')}

        function setupTaskbarSettingsHandlers(root = document) {
            const scopedRoot = root && typeof root.querySelector === 'function' ? root : document;

            scopedRoot.querySelectorAll('[data-taskbar-settings-toggle]').forEach((button) => {
                button.addEventListener('click', function () {
                    const key = this.getAttribute('data-taskbar-settings-toggle');
                    if (!key) return;
                    applyTaskbarSettingToggle(key);

            scopedRoot.querySelectorAll('.settings-dropdown-trigger').forEach((trigger) => {
                trigger.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const wrapper = this.parentElement;
                    const menu = wrapper && wrapper.querySelector('.settings-dropdown-menu');
                    if (!menu) return;
                    const isOpen = menu.classList.contains('active');
                    scopedRoot.querySelectorAll('.settings-dropdown-menu.active').forEach(m => m.classList.remove('active'));
                    if (!isOpen) menu.classList.add('active');
                });
            });

            scopedRoot.querySelectorAll('.settings-dropdown-item').forEach((item) => {
                item.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const key = this.getAttribute('data-taskbar-settings-select');
                    const value = this.getAttribute('data-select-value');
                    if (!key || value == null) return;
                    applyTaskbarSettingSelect(key, value);
                });
            });

            if (!document._settingsDropdownOutsideHandler) {
                document._settingsDropdownOutsideHandler = function () {
                    document.querySelectorAll('.settings-dropdown-menu.active').forEach(m => m.classList.remove('active'));
                };
                document.addEventListener('click', document._settingsDropdownOutsideHandler);

        function loadCornersAndEdgesPageState() {

        function applyCornersAndEdgesToggle(key) {

            if (registry) {
                try {

        function getLockScreenStatusApp(appId) {
            return LOCK_SCREEN_STATUS_APPS.find((app) => app.id === appId) || LOCK_SCREEN_STATUS_APPS[0];
        }

        function getLockScreenQuickStatusApps() {
            return normalizeLockScreenPageState(lockScreenPageState).quickStatusApps;
        }

        function getLockScreenSlotColor(app) {
            return app && app.tileColor ? app.tileColor : '#d5d5d5';
        }

        function getLockScreenChooserOptions(type) {
            if (type === 'alarms') {
                return [
                    getLockScreenStatusApp('none'),
                    ...LOCK_SCREEN_STATUS_APPS.filter((app) => app.supportsAlarm)
                ];
            }

            return LOCK_SCREEN_STATUS_APPS;
        }

        function getLockScreenAppIconMarkup(app, variant = 'tile') {
            const iconClass = app && app.iconClass ? app.iconClass : 'sui-apps';
            const isEmpty = app && app.id === 'none';
            const ariaLabel = app ? app.label : 'App';
            return `
                <span class="lock-screen-app-icon ${variant === 'preview' ? 'is-preview' : ''}" aria-label="${escapeHtml(ariaLabel)}">

                    ? `<span class="lock-screen-app-icon-plus">+</span>`
                    : `<span class="${escapeHtml(iconClass)}"></span>`}

            `;
        }

        function updateLockScreenPageState(partialState) {
            lockScreenPageState = saveLockScreenPageState({
                ...lockScreenPageState,
                ...partialState
            });
            return lockScreenPageState;

        function renderLockScreenSlot(appId, options = {}) {
            const app = getLockScreenStatusApp(appId || 'none');
            const {
                attributes = '',
                isSelected = false,
                isPreview = false
            } = options;
            const classNames = ['settings-lock-screen-slot'];
            if (app.id === 'none') {
                classNames.push('is-empty');
            }
            if (isSelected) {
                classNames.push('is-selected');

            return `

        function openLockScreenChooser(type, slotIndex = null) {
            lockScreenChooserState = { type, slotIndex };
            renderLockScreenState(false);
        }

        function closeLockScreenChooser() {
            if (!lockScreenChooserState) {
                return;
            }
            lockScreenChooserState = null;
            renderLockScreenState(false);
        }

        function applyLockScreenChooserSelection(appId) {
            if (!lockScreenChooserState) {
                return;
            }

            const chooser = lockScreenChooserState;
            const nextAppId = getLockScreenStatusApp(appId).id;

            if (chooser.type === 'detailed') {
                const nextQuickApps = getLockScreenQuickStatusApps().filter((value) => value !== nextAppId);
                const nextAlarmApp = lockScreenPageState.alarmsStatusApp === nextAppId ? 'none' : lockScreenPageState.alarmsStatusApp;
                updateLockScreenPageState({
                    detailedStatusApp: nextAppId,
                    quickStatusApps: nextQuickApps,
                    alarmsStatusApp: nextAlarmApp
                });
            } else if (chooser.type === 'alarms') {
                const nextQuickApps = getLockScreenQuickStatusApps().filter((value) => value !== nextAppId);
                const nextDetailedApp = lockScreenPageState.detailedStatusApp === nextAppId ? 'none' : lockScreenPageState.detailedStatusApp;
                updateLockScreenPageState({
                    alarmsStatusApp: nextAppId,
                    quickStatusApps: nextQuickApps,
                    detailedStatusApp: nextDetailedApp
                });
            } else if (chooser.type === 'quick') {
                const slotIndex = typeof chooser.slotIndex === 'number' ? chooser.slotIndex : getLockScreenQuickStatusApps().length;
                let nextQuickApps = getLockScreenQuickStatusApps().slice();
                if (nextAppId === 'none') {
                    if (slotIndex >= 0 && slotIndex < nextQuickApps.length) {
                        nextQuickApps.splice(slotIndex, 1);
                    }
                } else {
                    nextQuickApps = nextQuickApps.filter((value) => value !== nextAppId);
                    if (lockScreenPageState.detailedStatusApp === nextAppId) {
                        updateLockScreenPageState({ detailedStatusApp: 'none' });
                    }
                    if (lockScreenPageState.alarmsStatusApp === nextAppId) {
                        updateLockScreenPageState({ alarmsStatusApp: 'none' });
                    }
                    const insertAt = Math.max(0, Math.min(slotIndex, 6));
                    while (nextQuickApps.length < insertAt) {
                        nextQuickApps.push('none');
                    }
                    nextQuickApps.splice(insertAt, 0, nextAppId);
                    nextQuickApps = nextQuickApps.filter((value) => value !== 'none').slice(0, 7);
                }
                updateLockScreenPageState({ quickStatusApps: nextQuickApps });
            }

            lockScreenChooserState = null;
            renderLockScreenState(false);
        }

        function resolveLockScreenImageSrc(wallpaper, type = 'builtin') {
            const identifier = wallpaper || DEFAULT_LOCK_SCREEN_STATE.currentWallpaper;
            if (registryAPI && typeof registryAPI.resolveLockScreenWallpaperPath === 'function') {
                try {
                    const resolved = registryAPI.resolveLockScreenWallpaperPath(identifier, type);
                    if (typeof resolved === 'string' && resolved.length > 0) {
                        const normalized = resolved.replace(/\\/g, '/');
                        if (normalized.startsWith('resources/')) {
                            return new URL('../../../' + normalized, window.location.href).href;
                        }
                        return toImageUrl(normalized);
                    }
                } catch (error) {
                    console.warn('[Settings] Failed to resolve lock screen wallpaper path:', error);
                }
            }

            if (identifier.startsWith('resources/')) {
                return new URL('../../../' + identifier.replace(/\\/g, '/'), window.location.href).href;
            }

            return toImageUrl(/^(?:https?:|file:|blob:|data:|[A-Za-z]:)/i.test(identifier)
                ? identifier
                : '../../../resources/images/wallpapers/Lock/' + identifier);
        }

        function setupLockScreenPageHandlers(root = document) {
            const scopedRoot = root && typeof root.querySelector === 'function' ? root : document;

            scopedRoot.querySelectorAll('[data-lock-screen-wallpaper]').forEach((button) => {
                button.addEventListener('click', function () {
                    const wallpaper = this.getAttribute('data-lock-screen-wallpaper');
                    const wallpaperType = this.getAttribute('data-lock-screen-wallpaper-type') || 'builtin';
                    if (!wallpaper || (wallpaper === currentLockScreenWallpaper && wallpaperType === currentLockScreenWallpaperType)) {
                        return;
                    }

                    persistLockScreenWallpaperState(wallpaper, wallpaperType);
                    renderLockScreenState(false);
                });
            });

            scopedRoot.querySelectorAll('[data-lock-screen-background-mode]').forEach((button) => {
                button.addEventListener('click', function () {
                    const nextMode = lockScreenPageState.backgroundMode === 'slideshow' ? 'picture' : 'slideshow';
                    updateLockScreenPageState({ backgroundMode: nextMode });
                    renderLockScreenState(false);
                });
            });

            scopedRoot.querySelectorAll('[data-lock-screen-toggle]').forEach((button) => {
                button.addEventListener('click', function () {
                    const key = this.getAttribute('data-lock-screen-toggle');
                    if (!key) {
                        return;
                    }

                    updateLockScreenPageState({ [key]: !Boolean(lockScreenPageState[key]) });
                    renderLockScreenState(false);
                });
            });

            const sourceToggle = scopedRoot.querySelector('[data-lock-screen-source-toggle]');
            if (sourceToggle) {
                sourceToggle.addEventListener('click', function () {
                    updateLockScreenPageState({
                        slideshowSource: lockScreenPageState.slideshowSource === 'onedrive' ? 'local' : 'onedrive'
                    });
                    renderLockScreenState(false);
                });
            }

            const durationSelect = scopedRoot.querySelector('[data-lock-screen-duration]');
            if (durationSelect) {
                durationSelect.addEventListener('change', function () {
                    updateLockScreenPageState({ slideshowDuration: this.value });
                });
            }

            scopedRoot.querySelectorAll('[data-lock-screen-slot]').forEach((button) => {
                button.addEventListener('click', function () {
                    const slotType = this.getAttribute('data-lock-screen-slot');
                    if (!slotType) {
                        return;
                    }

                    const slotIndexValue = this.getAttribute('data-lock-screen-slot-index');
                    const slotIndex = slotIndexValue == null ? null : Number(slotIndexValue);
                    openLockScreenChooser(slotType, Number.isFinite(slotIndex) ? slotIndex : null);
                });
            });

            scopedRoot.querySelectorAll('[data-lock-screen-choose-app]').forEach((button) => {
                button.addEventListener('click', function () {
                    const appId = this.getAttribute('data-lock-screen-choose-app');
                    if (!appId) {
                        return;
                    }

                    applyLockScreenChooserSelection(appId);
                });
            });

            const chooserDismiss = scopedRoot.querySelector('[data-lock-screen-chooser-dismiss]');
            if (chooserDismiss) {
                chooserDismiss.addEventListener('click', function (event) {
                    event.preventDefault();
                    closeLockScreenChooser();
                });
            }

            const browseButton = scopedRoot.querySelector('[data-lock-screen-browse]');
            const fileInput = scopedRoot.querySelector('[data-lock-screen-file]');
            if (browseButton && fileInput) {
                browseButton.addEventListener('click', () => {
                    fileInput.click();
                });

                fileInput.addEventListener('change', function () {
                    const file = this.files && this.files[0];
                    if (!file) {
                        return;
                    }

                    const candidatePath = typeof file.path === 'string' && file.path.length > 0
                        ? file.path
                        : URL.createObjectURL(file);
                    persistLockScreenWallpaperState(candidatePath, 'custom');
                    renderLockScreenState(false);
                    this.value = '';
                });
            }
        }

        function updateSettingsContentWrapper(html, animate = true) {
            let wrapper = settingsContent.querySelector('.settings-content-wrapper');

            if (animate) {
                if (wrapper) {
                    wrapper.remove();

                wrapper = document.createElement('div');
                wrapper.className = 'settings-content-wrapper';
                wrapper.innerHTML = html;
                settingsContent.appendChild(wrapper);

                requestAnimationFrame(() => {

                        wrapper.classList.add('visible');
                    });
                });
            } else {
                if (wrapper) {
                    wrapper.innerHTML = html;
                } else {
                    wrapper = document.createElement('div');
                    wrapper.className = 'settings-content-wrapper visible';
                    wrapper.innerHTML = html;
                    settingsContent.appendChild(wrapper);

            return wrapper;

        function getBluetoothFallbackState() {
            return {
                success: true,
                available: false,
                enabled: false,

                connectedDevices: [],
                discoveredDevices: []
            };
        }

        async function invokeBluetoothAction(channel, ...args) {
            if (!settingsIpcRenderer || typeof settingsIpcRenderer.invoke !== 'function') {
                console.warn('[Settings] Bluetooth IPC unavailable, using fallback state for channel:', channel);
                return getBluetoothFallbackState();
            }

            console.log('[Settings] Invoking Bluetooth IPC:', channel, args);
            const result = await Promise.race([
                settingsIpcRenderer.invoke(channel, ...args),
                new Promise((_, reject) => {
                    setTimeout(() => reject(new Error(`Bluetooth request timed out for ${channel}.`)), 6000);
                })
            ]);

            console.log('[Settings] Bluetooth IPC result:', channel, result);
            if (!result || !result.success) {
                throw new Error(result && result.error ? result.error : 'Bluetooth action failed.');
            }

            return result;
        }

        async function loadBluetoothState() {
            return invokeBluetoothAction('bluetooth:get-state');
