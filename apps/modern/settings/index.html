<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Settings</title>
    <link rel="stylesheet" href="../../../css/fonts.css">
    <link rel="stylesheet" href="../../../css/modern-ui.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/v4/css/metro-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            color: #000;
        }

        .settings-container {
            display: flex;
            height: 100vh;
        }

        .settings-sidebar {
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 100%;
            background: var(--ui-accent);
            padding: 40px 0;
            border-right: none;
            overflow-x: hidden;
        }

        .settings-sidebar-title {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 30px;
            box-sizing: border-box;
            padding-left: 60px;
            padding-right: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;

            /* Initial state - entire header off-screen to the right */
            transform: translateX(100%);
            opacity: 0;

            /* Slide-in animation - header comes first */
            transition: transform 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s,
                opacity 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s;
        }

        .settings-sidebar-title.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .settings-sidebar-title-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .settings-back-btn {
            display: none;
            margin-left: -40px;
            margin-right: -10px;
            margin-bottom: -3px;
        }

        .settings-back-btn.visible {
            display: flex;
        }

        .settings-search-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .settings-search-icon:hover {
            opacity: 1;
        }

        .settings-menu-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .settings-category {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            padding-left: 60px;
            margin-bottom: 2px;
            border-radius: 0;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;

            /* Initial state - off-screen to the right */
            transform: translateX(50%);
            opacity: 0;

            /* Slide-in animation - all items together after title */
            transition: transform 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0.15s,
                opacity 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0.15s,
                background 0.1s ease;
        }

        .settings-menu-list.hidden {
            display: none;
        }

        /* When menu is visible, slide all items in together */
        .settings-menu-list.visible .settings-category {
            transform: translateX(0);
            opacity: 1;
        }

        .settings-category:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .settings-category.active {
            background: rgba(0, 0, 0, 0.15);
        }

        .settings-category-icon {
            display: none;
        }

        .settings-category-name {
            font-size: 15px;
        }

        .settings-content {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            position: relative;
        }

        .settings-content-wrapper {
            /* Initial state - off-screen to the right (reduced distance) */
            transform: translateX(10%);
            opacity: 0;

            /* Slide-in animation */
            transition: transform 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s,
                opacity 1s cubic-bezier(0.05, 0.7, 0.1, 1) 0s;
        }

        .settings-content-wrapper.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .settings-content-title {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 30px;
            color: var(--ui-accent);
            padding-bottom: 10px;
        }

        .settings-section {
            margin-bottom: 40px;
        }

        .settings-section-title {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #f2f2f2;
        }

        .settings-item-info {
            flex: 1;
        }

        .settings-item-title {
            font-size: 15px;
            margin-bottom: 5px;
        }

        .settings-item-description {
            font-size: 13px;
            color: #666;
        }

        .settings-account-summary {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: -8px 0 36px;
        }

        .settings-account-summary-avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            background: #d7d7d7;
            flex-shrink: 0;
        }

        .settings-account-summary-name {
            font-size: 30px;
            font-weight: 300;
            color: var(--ui-accent);
            line-height: 1.15;
        }

        .settings-account-summary-username {
            margin-top: 6px;
            font-size: 14px;
            color: #666;
        }

        .settings-account-picture-preview {
            width: 172px;
            height: 172px;
            padding: 12px;
            background: #f3f3f3;
            border: 1px solid #e1e1e1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-account-picture-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #d7d7d7;
        }

        .settings-account-note {
            max-width: 460px;
            font-size: 14px;
            line-height: 1.5;
            color: #666;
            margin: -8px 0 30px;
        }

        .personalize-tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            width: 600px;
        }

        .personalize-tile {
            position: relative;
            height: 200px;
            overflow: hidden;
            transition: 0.1s ease;

            display: flex;
            align-items: center;
            justify-content: center;

            &::after {
                content: '';

                position: absolute;
                z-index: 50;
                width: 100%;
                height: 100%;

                background-color: black;
                opacity: .25;
            }
        }

        .personalize-tile:hover {
            opacity: 0.9;
        }

        .personalize-tile.large {
            width: 600px;
            height: 337px;
        }

        .personalize-tile.user {
            width: 215px;
            height: 215px;
        }

        .personalize-tile.picpass {
            width: 375px;
            height: 215px;
        }

        .personalize-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .personalize-tile-label {
            position: absolute;
            z-index: 100;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-weight: 300;
        }

        .recently-used-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--ui-accent);
            font-size: 15px;
            text-decoration: none;
            cursor: pointer;
        }

        .recently-used-link:hover {
            text-decoration: underline;
        }

        /* Lock screen page */
        .settings-lock-screen-page {
            max-width: 860px;
        }

        .settings-lock-screen-intro,
        .settings-lock-screen-note {
            font-size: 14px;
            line-height: 1.5;
            color: #666;
        }

        .settings-lock-screen-intro {
            margin: -8px 0 24px;
        }

        .settings-lock-screen-stage {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px;
            gap: 28px;
            align-items: start;
            margin-bottom: 22px;
        }

        .settings-lock-screen-frame {
            padding: 14px;
            background: #2f2f2f;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .lock-screen-preview {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .lock-screen-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lock-screen-status-strip {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .lock-screen-status-detailed {
            min-width: 120px;
            padding: 10px 12px;
            background: rgba(6, 6, 6, 0.56);
            color: #fff;
            backdrop-filter: blur(3px);
        }

        .lock-screen-status-detailed-label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.72;
        }

        .lock-screen-status-detailed-name {
            display: block;
            margin-top: 4px;
            font-size: 20px;
            font-weight: 300;
        }

        .lock-screen-status-detailed-text {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.88;
        }

        .lock-screen-status-icons {
            display: grid;
            grid-template-columns: repeat(2, 36px);
            gap: 8px;
        }

        .lock-screen-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(6, 6, 6, 0.56);
            color: #fff;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            backdrop-filter: blur(3px);
        }

        .lock-screen-status-badge.is-empty {
            background: rgba(6, 6, 6, 0.26);
            color: rgba(255, 255, 255, 0.58);
        }

        .lock-screen-overlay {
            position: absolute;
            inset: auto 0 0 0;
            padding: 42px 40px 34px;
            color: white;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.64), transparent 72%);
        }

        .lock-screen-time {
            font-size: 72px;
            font-weight: 300;
            line-height: 0.95;
            margin-bottom: 7px;
        }

        .lock-screen-date {
            font-size: 20px;
            font-weight: 300;
        }

        .lock-screen-overlay-layout {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 28px;
        }

        .lock-screen-overlay-primary {
            min-width: 0;
        }

        .lock-screen-overlay-secondary {
            min-width: 160px;
            margin-bottom: 16px;
            text-align: left;
        }

        .lock-screen-preview-detailed {
            color: rgba(255, 255, 255, 0.92);
        }

        .lock-screen-preview-detailed-title {
            display: block;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.1;
        }

        .lock-screen-preview-detailed-text {
            display: block;
            margin-top: 3px;
            font-size: 13px;
            line-height: 1.25;
            opacity: 0.86;
        }

        .lock-screen-preview-quick {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .lock-screen-preview-quick-slot {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.88);
            font-size: 12px;
        }

        .lock-screen-preview-quick-slot.is-empty {
            color: rgba(255, 255, 255, 0.34);
        }

        .lock-screen-app-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: inherit;
            font-size: 20px;
            line-height: 1;
        }

        .lock-screen-app-icon.is-preview {
            font-size: 14px;
        }

        .lock-screen-app-icon-plus {
            position: absolute;
            font-size: 16px;
            line-height: 1;
            font-family: 'Segoe UI', sans-serif;
        }

        .settings-lock-screen-control-group {
            margin-bottom: 18px;
        }

        .settings-lock-screen-control-label,
        .settings-lock-screen-field-label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #666;
        }

        .settings-lock-screen-mode-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .settings-lock-screen-mode-button {
            min-width: 96px;
            padding: 9px 14px;
            border: 1px solid #cfcfcf;
            background: #f5f5f5;
            color: #222;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.12s ease, border-color 0.12s ease;
        }

        .settings-lock-screen-mode-button:hover,
        .settings-lock-screen-status-app:hover {
            background: #ededed;
        }

        .settings-lock-screen-mode-button.is-active {
            border-color: var(--ui-accent);
            background: rgba(var(--accent-rgb, 0, 120, 215), 0.08);
            color: var(--ui-accent);
        }

        .lock-screen-wallpapers {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .lock-screen-wallpaper-tile {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 2px solid transparent;
            background: #1f1f1f;
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
        }

        .lock-screen-wallpaper-tile:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .lock-screen-wallpaper-tile.is-active {
            border-color: var(--ui-accent);
        }

        .lock-screen-wallpaper-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lock-screen-wallpaper-check {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 13px;
        }

        .browse-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            padding: 10px 18px;
            margin-top: 16px;
            border: 1px solid #c7c7c7;
            background: #f3f3f3;
            color: #222;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.12s ease, border-color 0.12s ease;
        }

        .browse-button:hover {
            background: #e8e8e8;
            border-color: #b8b8b8;
        }

        .settings-lock-screen-section {
            margin-top: 30px;
        }

        .settings-lock-screen-app-preview {
            display: block;
            margin-bottom: 20px;
        }

        .settings-lock-screen-app-preview-label {
            font-size: 13px;
            color: #555;
        }

        .settings-lock-screen-app-row,
        .settings-lock-screen-slot-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .settings-lock-screen-app-preview-note {
            margin-bottom: 12px;
            font-size: 13px;
            color: #555;
            line-height: 1.45;
        }

        .settings-lock-screen-slot {
            position: relative;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            background: #d5d5d5;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.12s ease, transform 0.12s ease;
        }

        .settings-lock-screen-slot:hover {
            transform: translateY(-1px);
            filter: brightness(0.96);
        }

        .settings-lock-screen-slot.is-empty {
            background: #d7d7d7;
            color: #fff;
        }

        .settings-lock-screen-slot.is-selected {
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.82);
        }

        .settings-lock-screen-slot-row {
            margin-top: 10px;
        }

        .settings-lock-screen-slot-group {
            margin-top: 18px;
        }

        .settings-lock-screen-slot-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #222;
        }

        .settings-lock-screen-slot-chooser {
            display: grid;
            grid-template-columns: 110px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
            margin-top: 18px;
        }

        .settings-lock-screen-slot-preview {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 8px;
        }

        .settings-lock-screen-slot-preview .settings-lock-screen-slot {
            width: 42px;
            height: 42px;
        }

        .settings-lock-screen-picker {
            width: 100%;
            max-width: 340px;
            border: 2px solid #2b2b2b;
            background: #fff;
        }

        .settings-lock-screen-picker-header {
            padding: 16px 18px 10px;
            font-size: 20px;
            font-weight: 300;
            color: #222;
        }

        .settings-lock-screen-picker-option {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border: 0;
            background: transparent;
            color: #222;
            text-align: left;
            cursor: pointer;
            transition: background-color 0.12s ease;
        }

        .settings-lock-screen-picker-option:hover {
            background: #efefef;
        }

        .settings-lock-screen-picker-option.is-active {
            background: #d8d8d8;
        }

        .settings-lock-screen-picker-option.is-clear {
            color: #1b7f96;
        }

        .settings-lock-screen-picker-option-text {
            font-size: 13px;
            line-height: 1.3;
        }

        .settings-lock-screen-picker-option-icon {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
        }

        .settings-lock-screen-picker-dismiss {
            display: inline-block;
            margin-top: 12px;
            font-size: 12px;
            color: #1b7f96;
            text-decoration: none;
        }

        .settings-lock-screen-picker-dismiss:hover {
            text-decoration: underline;
        }

        .settings-lock-screen-note {
            margin-top: 10px;
        }

        .settings-lock-screen-dropdown-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 15px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .settings-lock-screen-dropdown-copy {
            flex: 1;
        }

        .settings-lock-screen-dropdown-title {
            font-size: 15px;
            color: #111;
        }

        .settings-lock-screen-dropdown-description {
            margin-top: 4px;
            font-size: 13px;
            color: #666;
        }

        @media (max-width: 820px) {
            .settings-lock-screen-stage {
                grid-template-columns: 1fr;
            }

            .lock-screen-overlay-layout {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .lock-screen-overlay-secondary {
                margin-bottom: 0;
            }

            .settings-lock-screen-dropdown-row {
                align-items: flex-start;
                flex-direction: column;
            }

            .settings-lock-screen-slot-chooser {
                grid-template-columns: 1fr;
            }
        }

        .settings-toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .settings-toggle-label {
            font-size: 15px;
        }

        .settings-toggle-description {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .settings-toggle-copy {
            flex: 1;
            padding-right: 20px;
        }

        .settings-bluetooth-page {
            max-width: 760px;
        }

        .settings-bluetooth-intro {
            font-size: 14px;
            line-height: 1.5;
            color: #666;
            margin: -8px 0 28px;
        }

        .settings-bluetooth-searching {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .settings-bluetooth-searching-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ui-accent);
            animation: bluetoothSearchingPulse 1.2s ease-in-out infinite;
        }

        .settings-bluetooth-searching-dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .settings-bluetooth-searching-dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        .settings-bluetooth-section {
            margin-top: 28px;
        }

        .settings-bluetooth-section-title {
            font-size: 20px;
            font-weight: 300;
            color: #111;
            margin-bottom: 12px;
        }

        .settings-bluetooth-device-list {
            border-top: 1px solid #e6e6e6;
        }

        .settings-bluetooth-device {
            border-bottom: 1px solid #ededed;
            transition: background-color 0.15s ease;
        }

        .settings-bluetooth-device.expanded {
            background: #f7fbff;
        }

        .settings-bluetooth-device-button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border: 0;
            background: transparent;
            text-align: left;
            color: inherit;
            cursor: pointer;
        }

        .settings-bluetooth-device-button:disabled {
            cursor: default;
        }

        .settings-bluetooth-device-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--ui-accent);
            color: #fff;
            font-size: 20px;
        }

        .settings-bluetooth-device-copy {
            min-width: 0;
            flex: 1;
        }

        .settings-bluetooth-device-name {
            display: block;
            font-size: 16px;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .settings-bluetooth-device-status {
            display: block;
            margin-top: 2px;
            font-size: 13px;
            color: #6a6a6a;
        }

        .settings-bluetooth-device-chevron {
            color: #767676;
            font-size: 14px;
            flex-shrink: 0;
        }

        .settings-bluetooth-device-actions {
            display: none;
            gap: 10px;
            padding: 0 0 14px 54px;
        }

        .settings-bluetooth-device.expanded .settings-bluetooth-device-actions {
            display: flex;
        }

        .settings-bluetooth-action {
            min-width: 106px;
            padding: 8px 16px;
            border: 1px solid #c9c9c9;
            background: #f3f3f3;
            color: #222;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.12s ease, border-color 0.12s ease;
        }

        .settings-bluetooth-action:hover:not(:disabled) {
            background: #e8e8e8;
            border-color: #b9b9b9;
        }

        .settings-bluetooth-action.primary {
            background: var(--ui-accent);
            border-color: var(--ui-accent);
            color: #fff;
        }

        .settings-bluetooth-action.primary:hover:not(:disabled) {
            filter: brightness(0.95);
        }

        .settings-bluetooth-action:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .settings-bluetooth-empty {
            padding: 18px 0;
            color: #666;
            font-size: 14px;
            border-bottom: 1px solid #ededed;
        }

        @keyframes bluetoothSearchingPulse {
            0%,
            80%,
            100% {
                opacity: 0.25;
                transform: scale(0.85);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="settings-container">
        <div class="settings-sidebar">

                    <span id="sidebar-title-text">PC settings</span>

            </div>
            <div class="settings-menu-list" id="main-menu">
                <a href="#" class="active-scale-effect settings-category" data-category="pc-and-devices">
                    <span class="settings-category-name">PC and devices</span>

                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="search-and-apps">
                    <span class="settings-category-name">Search and apps</span>
                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="privacy">
                    <span class="settings-category-name">Privacy</span>
                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="network">
                    <span class="settings-category-name">Network</span>
                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="time-and-language">
                    <span class="settings-category-name">Time and language</span>
                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="ease-of-access">
                    <span class="settings-category-name">Ease of Access</span>
                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="update-and-recovery">
                    <span class="settings-category-name">Update and recovery</span>
                </a>
                <a href="#" class="active-scale-effect settings-category" data-category="control-panel"
                    id="control-panel-link" style="margin-top: auto;">
                    <span class="settings-category-name">Control Panel</span>
                </a>
            </div>
        </div>

        <div class="settings-content" id="settings-content">
            <div class="settings-content-wrapper">
                <div class="settings-content-title">Personalize</div>

                <div class="personalize-tiles">
                    <div class="active-scale-effect personalize-tile large" id="tile-lock-screen">
                        <img src="../../../resources/images/wallpapers/img100.jpg" alt="Lock screen">
                        <div class="personalize-tile-label">Lock screen</div>
                    </div>
                    <div class="active-scale-effect personalize-tile user" id="tile-account-picture">
                        <img src="../../../resources/images/user.png" alt="Account picture"
                            style="object-fit: contain; background: #3a3a3a;">
                        <div class="personalize-tile-label">Account picture</div>
                    </div>
                    <div class="active-scale-effect personalize-tile picpass">
                        <img src="../../../resources/images/wallpapers/img101.png" alt="Picture password">
                        <div class="personalize-tile-label">Picture password</div>
                    </div>
                </div>

                <a href="#" class="recently-used-link">View recently used settings</a>
            </div>
        </div>
    </div>

    <script>
        // Listen for theme variables from parent window
        window.addEventListener('message', function (event) {
            if (event.data.action === 'setThemeVariables') {
                const variables = event.data.variables;
                console.log('[Settings] Received theme variables:', variables);

                // Apply CSS variables to the document root
                for (const [key, value] of Object.entries(variables)) {
                    if (value) {
                        document.documentElement.style.setProperty(`--${key}`, value);
                        console.log('[Settings] Set CSS variable --' + key + ':', value);
                    }
                }
            } else if (event.data.action === 'openSettingsCategory') {
                handleSettingsNavigationRequest(event.data.categoryId, event.data.itemId || null);
            }
        });

        // Navigation state
        let currentMenu = 'main'; // 'main' or 'submenu'
        let currentCategory = null;
        let currentItem = null;
        let settingsRenderToken = 0;

        // Settings data will be loaded from JSON file
        let settingsData = {};
        let pendingNavigationRequest = null;
        const DEFAULT_SHELL_USER_IMAGE = new URL('../../../resources/images/user.png', window.location.href).href;

        const registryAPI = (function () {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (ctx && ctx.RegistryAPI) {
                    return ctx.RegistryAPI;
                }
            }
            return null;
        })();

        const shellUserProfileAPI = (function () {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (ctx && ctx.ShellUserProfile) {
                    return ctx.ShellUserProfile;
                }
            }
            return null;
        })();

        const timeBankAPI = (function () {
            const contexts = [window, window.parent, window.top];
            for (const ctx of contexts) {
                if (ctx && ctx.TimeBank) {
                    return ctx.TimeBank;
                }
            }
            return null;
        })();

        const settingsIpcRenderer = (function () {
            try {
                if (typeof require === 'function') {
                    return require('electron').ipcRenderer;
                }
            } catch (error) {
                console.warn('[Settings] Electron IPC is unavailable:', error);
            }

            try {
                if (window.parent && window.parent !== window &&
                    window.parent.Win8ElectronBridge &&
                    typeof window.parent.Win8ElectronBridge.invoke === 'function') {
                    console.log('[Settings] Using parent Win8ElectronBridge for IPC');
                    return window.parent.Win8ElectronBridge;
                }
            } catch (error) {
                console.warn('[Settings] Parent IPC bridge is unavailable:', error);
            }

            return null;
        })();

        let shellUserProfile = {
            username: 'User',
            displayName: 'User',
            imageUrl: DEFAULT_SHELL_USER_IMAGE
        };
        let latestTimeSnapshot = timeBankAPI && typeof timeBankAPI.getSnapshot === 'function'
            ? timeBankAPI.getSnapshot()
            : { now: new Date(), timestamp: Date.now(), reason: 'fallback' };

        let bluetoothPageState = null;
        let bluetoothExpandedDeviceId = null;
        let bluetoothBusyDeviceId = null;
        let bluetoothBusyAction = null;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeShellUserProfile(profile) {
            const username = typeof profile?.username === 'string' && profile.username.trim()
                ? profile.username.trim()
                : 'User';
            const displayName = typeof profile?.displayName === 'string' && profile.displayName.trim()
                ? profile.displayName.trim()
                : username;
            const imageUrl = typeof profile?.imageUrl === 'string' && profile.imageUrl.trim()
                ? profile.imageUrl.trim()
                : DEFAULT_SHELL_USER_IMAGE;

            return {
                username,
                displayName,
                imageUrl
            };
        }

        function getAccountPictureTileMarkup() {
            return `
                <div class="active-scale-effect personalize-tile user" id="tile-account-picture">
                    <img src="${escapeHtml(shellUserProfile.imageUrl)}" alt="${escapeHtml(shellUserProfile.displayName)}"
                        style="object-fit: contain; background: #3a3a3a;">
                    <div class="personalize-tile-label">Account picture</div>
                </div>
            `;
        }

        function renderAccountsProfileSummary() {
            return `
                <div class="settings-account-summary">
                    <img src="${escapeHtml(shellUserProfile.imageUrl)}" alt="${escapeHtml(shellUserProfile.displayName)}" class="settings-account-summary-avatar">
                    <div>
                        <div class="settings-account-summary-name" data-shell-user-profile-name="display">${escapeHtml(shellUserProfile.displayName)}</div>
                        <div class="settings-account-summary-username" data-shell-user-profile-name="username">${escapeHtml(shellUserProfile.username)}</div>
                    </div>
                </div>
            `;
        }

        function renderAccountsPicturePreview() {
            return `
                <div class="settings-account-picture-preview">
                    <img src="${escapeHtml(shellUserProfile.imageUrl)}" alt="${escapeHtml(shellUserProfile.displayName)}">
                </div>
            `;
        }

        function applyShellUserProfile(target = document) {
            if (!target || typeof target.querySelectorAll !== 'function') {
                return;
            }

            target.querySelectorAll('#tile-account-picture img, .settings-account-summary-avatar, .settings-account-picture-preview img')
                .forEach((node) => {
                    node.src = shellUserProfile.imageUrl;
                    node.alt = shellUserProfile.displayName;
                });

            target.querySelectorAll('[data-shell-user-profile-name="display"]').forEach((node) => {
                node.textContent = shellUserProfile.displayName;
            });

            target.querySelectorAll('[data-shell-user-profile-name="username"]').forEach((node) => {
                node.textContent = shellUserProfile.username;
            });
        }

        async function loadShellUserProfile() {
            try {
                const profile = shellUserProfileAPI && typeof shellUserProfileAPI.loadProfile === 'function'
                    ? await shellUserProfileAPI.loadProfile()
                    : shellUserProfileAPI && typeof shellUserProfileAPI.getProfile === 'function'
                        ? shellUserProfileAPI.getProfile()
                        : null;
                shellUserProfile = normalizeShellUserProfile(profile);
            } catch (error) {
                console.warn('[Settings] Failed to load shell user profile:', error);
                shellUserProfile = normalizeShellUserProfile(null);
            }

            applyShellUserProfile(document);
            return shellUserProfile;
        }

        const DEFAULT_LOCK_SCREEN_STATE = registryAPI && typeof registryAPI.getDefaultLockScreenWallpaperState === 'function'
            ? registryAPI.getDefaultLockScreenWallpaperState()
            : {
                currentWallpaper: 'img101.png',
                currentWallpaperType: 'builtin',
                recentWallpapers: ['img101.png', 'img100.jpg', 'img102.jpg', 'img103.png', 'img104.jpg']
            };
        const MAX_RECENT_LOCK_WALLPAPERS = 8;
        const LOCK_SCREEN_PAGE_STATE_PATH = 'HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ImmersiveControlPanel\\LockScreen';
        const LOCK_SCREEN_PAGE_STATE_VALUE = 'SimulatorState';
        const LOCK_SCREEN_PAGE_LEGACY_STORAGE_KEY = 'win8-settings-lock-screen-state-v1';
        const LOCK_SCREEN_STATUS_APPS = Object.freeze([
            { id: 'none', label: 'None', badge: '--', detailTitle: 'No app', detailText: 'No detailed status is currently selected.', iconClass: 'mif-blocked', tileColor: '#d0d0d0', supportsAlarm: false },
            { id: 'alarms', label: 'Alarms', badge: 'AL', detailTitle: 'Alarm', detailText: 'The next alarm is set for 6:30 AM.', iconClass: 'sui-alarm', tileColor: '#c22f5a', supportsAlarm: true },
            { id: 'calendar', label: 'Calendar', badge: 'CA', detailTitle: 'Calendar', detailText: 'Today at 3:00 PM: Project review.', iconClass: 'mif-calendar', tileColor: '#7b55d6', supportsAlarm: false },
            { id: 'mail', label: 'Mail', badge: 'ML', detailTitle: 'Mail', detailText: '2 unread messages are waiting for you.', iconClass: 'mif-mail', tileColor: '#0078d7', supportsAlarm: false },
            { id: 'messaging', label: 'Messaging', badge: 'MS', detailTitle: 'Messaging', detailText: '1 new conversation needs your attention.', iconClass: 'mif-bubbles', tileColor: '#008299', supportsAlarm: false },
            { id: 'weather', label: 'Weather', badge: 'WE', detailTitle: 'Weather', detailText: '58 degrees and partly cloudy right now.', iconClass: 'mif-cloud', tileColor: '#2672ec', supportsAlarm: false },
            { id: 'store', label: 'Store', badge: 'ST', detailTitle: 'Store', detailText: '1 app has an update ready to install.', iconClass: 'sui-shop', tileColor: '#a05000', supportsAlarm: false },
            { id: 'reader', label: 'Reader', badge: 'RD', detailTitle: 'Reader', detailText: 'Continue where you left off in your latest document.', iconClass: 'sui-file-text', tileColor: '#5b2d90', supportsAlarm: false },
            { id: 'skype', label: 'Skype', badge: 'SK', detailTitle: 'Skype', detailText: '1 missed call and 3 unread messages.', iconClass: 'mif-skype', tileColor: '#00aff0', supportsAlarm: false }
        ]);
        const DEFAULT_LOCK_SCREEN_PAGE_STATE = Object.freeze({
            backgroundMode: 'picture',
            slideshowSource: 'onedrive',
            slideshowEnabledOnBattery: false,
            slideshowOptimizePhotos: true,
            slideshowAutoLock: true,
            slideshowDuration: '15 minutes',
            detailedStatusApp: 'calendar',
            quickStatusApps: ['mail', 'weather', 'alarms', 'messaging'],
            alarmsStatusApp: 'alarms',
            cameraEnabled: false
        });

        function dedupeList(values) {
            const seen = new Set();
            const result = [];
            values.forEach(value => {
                if (value && !seen.has(value)) {
                    seen.add(value);
                    result.push(value);
                }
            });
            return result;
        }

        let lockScreenState = DEFAULT_LOCK_SCREEN_STATE;

        if (registryAPI && typeof registryAPI.loadLockScreenWallpaperState === 'function') {
            try {
                lockScreenState = registryAPI.loadLockScreenWallpaperState();
            } catch (error) {
                console.warn('[Settings] Failed to load lock screen wallpaper state from registry:', error);
                lockScreenState = DEFAULT_LOCK_SCREEN_STATE;
            }
        }

        let currentLockScreenWallpaper = lockScreenState.currentWallpaper || DEFAULT_LOCK_SCREEN_STATE.currentWallpaper;
        let currentLockScreenWallpaperType = lockScreenState.currentWallpaperType || DEFAULT_LOCK_SCREEN_STATE.currentWallpaperType || 'builtin';
        let lockScreenWallpapers = Array.isArray(lockScreenState.recentWallpapers) && lockScreenState.recentWallpapers.length > 0
            ? dedupeList(lockScreenState.recentWallpapers.slice())
            : dedupeList(DEFAULT_LOCK_SCREEN_STATE.recentWallpapers.slice());

        if (!lockScreenWallpapers.includes(currentLockScreenWallpaper)) {
            lockScreenWallpapers.unshift(currentLockScreenWallpaper);
        }
        lockScreenWallpapers = dedupeList(lockScreenWallpapers).slice(0, MAX_RECENT_LOCK_WALLPAPERS);

        function normalizeLockScreenPageState(rawState) {
            const base = {
                ...DEFAULT_LOCK_SCREEN_PAGE_STATE,
                ...(rawState && typeof rawState === 'object' ? rawState : {})
            };
            const backgroundMode = base.backgroundMode === 'slideshow' ? 'slideshow' : 'picture';
            const slideshowSource = base.slideshowSource === 'onedrive' ? 'onedrive' : 'local';
            const slideshowDurationOptions = new Set(['15 minutes', '30 minutes', '1 hour', 'Do not turn off']);
            const slideshowDuration = slideshowDurationOptions.has(base.slideshowDuration)
                ? base.slideshowDuration
                : DEFAULT_LOCK_SCREEN_PAGE_STATE.slideshowDuration;
            const validAppIds = new Set(LOCK_SCREEN_STATUS_APPS.map((app) => app.id));
            const detailedStatusApp = validAppIds.has(base.detailedStatusApp)
                ? base.detailedStatusApp
                : DEFAULT_LOCK_SCREEN_PAGE_STATE.detailedStatusApp;
            const alarmCapableAppIds = new Set(LOCK_SCREEN_STATUS_APPS.filter((app) => app.supportsAlarm).map((app) => app.id));
            const alarmsStatusApp = alarmCapableAppIds.has(base.alarmsStatusApp)
                ? base.alarmsStatusApp
                : 'none';
            const quickStatusApps = dedupeList(Array.isArray(base.quickStatusApps) ? base.quickStatusApps : [])
                .filter((appId) => appId !== 'none' && appId !== detailedStatusApp && appId !== alarmsStatusApp && validAppIds.has(appId))
                .slice(0, 7);

            return {
                backgroundMode,
                slideshowSource,
                slideshowEnabledOnBattery: Boolean(base.slideshowEnabledOnBattery),
                slideshowOptimizePhotos: Boolean(base.slideshowOptimizePhotos),
                slideshowAutoLock: Boolean(base.slideshowAutoLock),
                slideshowDuration,
                detailedStatusApp,
                quickStatusApps,
                alarmsStatusApp,
                cameraEnabled: Boolean(base.cameraEnabled)
            };
        }

        function loadLockScreenPageState() {
            let rawValue = null;

            if (registryAPI && typeof registryAPI.getValue === 'function') {
                try {
                    rawValue = registryAPI.getValue(LOCK_SCREEN_PAGE_STATE_PATH, LOCK_SCREEN_PAGE_STATE_VALUE, null);
                } catch (error) {
                    console.warn('[Settings] Failed to load lock screen simulator state from registry:', error);
                }
            }

            if (!rawValue && typeof window.localStorage !== 'undefined') {
                try {
                    rawValue = window.localStorage.getItem(LOCK_SCREEN_PAGE_LEGACY_STORAGE_KEY);
                } catch (error) {
                    console.warn('[Settings] Failed to load lock screen simulator state from localStorage:', error);
                }
            }

            if (!rawValue) {
                return normalizeLockScreenPageState(null);
            }

            try {
                const parsed = typeof rawValue === 'string' ? JSON.parse(rawValue) : rawValue;
                return normalizeLockScreenPageState(parsed);
            } catch (error) {
                console.warn('[Settings] Failed to parse lock screen simulator state:', error);
                return normalizeLockScreenPageState(null);
            }
        }

        function saveLockScreenPageState(nextState) {
            const normalizedState = normalizeLockScreenPageState(nextState);
            const payload = JSON.stringify(normalizedState);

            if (registryAPI && typeof registryAPI.setValue === 'function') {
                try {
                    registryAPI.setValue(LOCK_SCREEN_PAGE_STATE_PATH, LOCK_SCREEN_PAGE_STATE_VALUE, payload);
                } catch (error) {
                    console.warn('[Settings] Failed to save lock screen simulator state to registry:', error);
                }
            }

            if (typeof window.localStorage !== 'undefined') {
                try {
                    window.localStorage.setItem(LOCK_SCREEN_PAGE_LEGACY_STORAGE_KEY, payload);
                } catch (error) {
                    console.warn('[Settings] Failed to save lock screen simulator state to localStorage:', error);
                }
            }

            return normalizedState;
        }

        function toImageUrl(imagePath) {
            const normalizedPath = String(imagePath || '').trim().replace(/\\/g, '/');
            if (!normalizedPath) {
                return '';
            }

            if (/^(?:data:|file:|https?:|blob:)/i.test(normalizedPath)) {
                return normalizedPath;
            }

            if (/^[A-Za-z]:\//.test(normalizedPath)) {
                return 'file:///' + encodeURI(normalizedPath);
            }

            if (normalizedPath.startsWith('//')) {
                return 'file:' + encodeURI(normalizedPath);
            }

            try {
                return new URL(normalizedPath, window.location.href).href;
            } catch (error) {
                console.warn('[Settings] Failed to convert image path to URL:', normalizedPath, error);
                return normalizedPath;
            }
        }

        function buildLockScreenWallpaperState(nextWallpaper, nextType) {
            lockScreenWallpapers = dedupeList([nextWallpaper, ...lockScreenWallpapers.filter((wallpaper) => wallpaper !== nextWallpaper)])
                .slice(0, MAX_RECENT_LOCK_WALLPAPERS);

            lockScreenState = {
                currentWallpaper: nextWallpaper,
                currentWallpaperType: nextType,
                recentWallpapers: lockScreenWallpapers.slice()
            };

            return lockScreenState;
        }

        function persistLockScreenWallpaperState(nextWallpaper, nextType) {
            buildLockScreenWallpaperState(nextWallpaper, nextType);
            currentLockScreenWallpaper = nextWallpaper;
            currentLockScreenWallpaperType = nextType;

            if (window.parent && typeof window.parent.updateLockScreenWallpaper === 'function') {
                window.parent.updateLockScreenWallpaper(currentLockScreenWallpaper, {
                    wallpaperType: currentLockScreenWallpaperType,
                    recentWallpapers: lockScreenWallpapers.slice()
                });
            } else if (registryAPI && typeof registryAPI.saveLockScreenWallpaperState === 'function') {
                try {
                    registryAPI.saveLockScreenWallpaperState(lockScreenState);
                } catch (error) {
                    console.warn('[Settings] Failed to persist lock screen wallpaper via RegistryAPI:', error);
                }
            }

            updatePersonalizeLockScreenTile();
        }

        let lockScreenPageState = loadLockScreenPageState();
        let lockScreenChooserState = null;

        function getLockScreenStatusApp(appId) {
            return LOCK_SCREEN_STATUS_APPS.find((app) => app.id === appId) || LOCK_SCREEN_STATUS_APPS[0];
        }

        function getLockScreenQuickStatusApps() {
            return normalizeLockScreenPageState(lockScreenPageState).quickStatusApps;
        }

        function getLockScreenSlotColor(app) {
            return app && app.tileColor ? app.tileColor : '#d5d5d5';
        }

        function getLockScreenChooserOptions(type) {
            if (type === 'alarms') {
                return [
                    getLockScreenStatusApp('none'),
                    ...LOCK_SCREEN_STATUS_APPS.filter((app) => app.supportsAlarm)
                ];
            }

            return LOCK_SCREEN_STATUS_APPS;
        }

        function getLockScreenAppIconMarkup(app, variant = 'tile') {
            const iconClass = app && app.iconClass ? app.iconClass : 'sui-apps';
            const isEmpty = app && app.id === 'none';
            const ariaLabel = app ? app.label : 'App';
            return `
                <span class="lock-screen-app-icon ${variant === 'preview' ? 'is-preview' : ''}" aria-label="${escapeHtml(ariaLabel)}">
                    ${isEmpty
                        ? `<span class="lock-screen-app-icon-plus">+</span>`
                        : `<span class="${escapeHtml(iconClass)}"></span>`}
                </span>
            `;
        }

        function updateLockScreenPageState(partialState) {
            lockScreenPageState = saveLockScreenPageState({
                ...lockScreenPageState,
                ...partialState
            });
            return lockScreenPageState;
        }

        function renderLockScreenSlot(appId, options = {}) {
            const app = getLockScreenStatusApp(appId || 'none');
            const {
                attributes = '',
                isSelected = false,
                isPreview = false
            } = options;
            const classNames = ['settings-lock-screen-slot'];
            if (app.id === 'none') {
                classNames.push('is-empty');
            }
            if (isSelected) {
                classNames.push('is-selected');
            }

            return `
                <button class="${classNames.join(' ')}"
                    type="button"
                    style="background:${escapeHtml(getLockScreenSlotColor(app))};"
                    ${attributes}>
                    ${getLockScreenAppIconMarkup(app, isPreview ? 'preview' : 'tile')}
                </button>
            `;
        }

        function openLockScreenChooser(type, slotIndex = null) {
            lockScreenChooserState = { type, slotIndex };
            renderLockScreenState(false);
        }

        function closeLockScreenChooser() {
            if (!lockScreenChooserState) {
                return;
            }
            lockScreenChooserState = null;
            renderLockScreenState(false);
        }

        function applyLockScreenChooserSelection(appId) {
            if (!lockScreenChooserState) {
                return;
            }

            const chooser = lockScreenChooserState;
            const nextAppId = getLockScreenStatusApp(appId).id;

            if (chooser.type === 'detailed') {
                const nextQuickApps = getLockScreenQuickStatusApps().filter((value) => value !== nextAppId);
                const nextAlarmApp = lockScreenPageState.alarmsStatusApp === nextAppId ? 'none' : lockScreenPageState.alarmsStatusApp;
                updateLockScreenPageState({
                    detailedStatusApp: nextAppId,
                    quickStatusApps: nextQuickApps,
                    alarmsStatusApp: nextAlarmApp
                });
            } else if (chooser.type === 'alarms') {
                const nextQuickApps = getLockScreenQuickStatusApps().filter((value) => value !== nextAppId);
                const nextDetailedApp = lockScreenPageState.detailedStatusApp === nextAppId ? 'none' : lockScreenPageState.detailedStatusApp;
                updateLockScreenPageState({
                    alarmsStatusApp: nextAppId,
                    quickStatusApps: nextQuickApps,
                    detailedStatusApp: nextDetailedApp
                });
            } else if (chooser.type === 'quick') {
                const slotIndex = typeof chooser.slotIndex === 'number' ? chooser.slotIndex : getLockScreenQuickStatusApps().length;
                let nextQuickApps = getLockScreenQuickStatusApps().slice();
                if (nextAppId === 'none') {
                    if (slotIndex >= 0 && slotIndex < nextQuickApps.length) {
                        nextQuickApps.splice(slotIndex, 1);
                    }
                } else {
                    nextQuickApps = nextQuickApps.filter((value) => value !== nextAppId);
                    if (lockScreenPageState.detailedStatusApp === nextAppId) {
                        updateLockScreenPageState({ detailedStatusApp: 'none' });
                    }
                    if (lockScreenPageState.alarmsStatusApp === nextAppId) {
                        updateLockScreenPageState({ alarmsStatusApp: 'none' });
                    }
                    const insertAt = Math.max(0, Math.min(slotIndex, 6));
                    while (nextQuickApps.length < insertAt) {
                        nextQuickApps.push('none');
                    }
                    nextQuickApps.splice(insertAt, 0, nextAppId);
                    nextQuickApps = nextQuickApps.filter((value) => value !== 'none').slice(0, 7);
                }
                updateLockScreenPageState({ quickStatusApps: nextQuickApps });
            }

            lockScreenChooserState = null;
            renderLockScreenState(false);
        }

        function resolveLockScreenImageSrc(wallpaper, type = 'builtin') {
            const identifier = wallpaper || DEFAULT_LOCK_SCREEN_STATE.currentWallpaper;
            if (registryAPI && typeof registryAPI.resolveLockScreenWallpaperPath === 'function') {
                try {
                    const resolved = registryAPI.resolveLockScreenWallpaperPath(identifier, type);
                    if (typeof resolved === 'string' && resolved.length > 0) {
                        const normalized = resolved.replace(/\\/g, '/');
                        if (normalized.startsWith('resources/')) {
                            return new URL('../../../' + normalized, window.location.href).href;
                        }
                        return toImageUrl(normalized);
                    }
                } catch (error) {
                    console.warn('[Settings] Failed to resolve lock screen wallpaper path:', error);
                }
            }

            if (identifier.startsWith('resources/')) {
                return new URL('../../../' + identifier.replace(/\\/g, '/'), window.location.href).href;
            }

            return toImageUrl(/^(?:https?:|file:|blob:|data:|[A-Za-z]:)/i.test(identifier)
                ? identifier
                : '../../../resources/images/wallpapers/Lock/' + identifier);
        }

        function setupLockScreenPageHandlers(root = document) {
            const scopedRoot = root && typeof root.querySelector === 'function' ? root : document;

            scopedRoot.querySelectorAll('[data-lock-screen-wallpaper]').forEach((button) => {
                button.addEventListener('click', function () {
                    const wallpaper = this.getAttribute('data-lock-screen-wallpaper');
                    const wallpaperType = this.getAttribute('data-lock-screen-wallpaper-type') || 'builtin';
                    if (!wallpaper || (wallpaper === currentLockScreenWallpaper && wallpaperType === currentLockScreenWallpaperType)) {
                        return;
                    }

                    persistLockScreenWallpaperState(wallpaper, wallpaperType);
                    renderLockScreenState(false);
                });
            });

            scopedRoot.querySelectorAll('[data-lock-screen-background-mode]').forEach((button) => {
                button.addEventListener('click', function () {
                    const nextMode = this.getAttribute('data-lock-screen-background-mode') === 'slideshow' ? 'slideshow' : 'picture';
                    if (lockScreenPageState.backgroundMode === nextMode) {
                        return;
                    }

                    updateLockScreenPageState({ backgroundMode: nextMode });
                    renderLockScreenState(false);
                });
            });

            scopedRoot.querySelectorAll('[data-lock-screen-toggle]').forEach((button) => {
                button.addEventListener('click', function () {
                    const key = this.getAttribute('data-lock-screen-toggle');
                    if (!key) {
                        return;
                    }

                    updateLockScreenPageState({ [key]: !Boolean(lockScreenPageState[key]) });
                    renderLockScreenState(false);
                });
            });

            const sourceToggle = scopedRoot.querySelector('[data-lock-screen-source-toggle]');
            if (sourceToggle) {
                sourceToggle.addEventListener('click', function () {
                    updateLockScreenPageState({
                        slideshowSource: lockScreenPageState.slideshowSource === 'onedrive' ? 'local' : 'onedrive'
                    });
                    renderLockScreenState(false);
                });
            }

            const durationSelect = scopedRoot.querySelector('[data-lock-screen-duration]');
            if (durationSelect) {
                durationSelect.addEventListener('change', function () {
                    updateLockScreenPageState({ slideshowDuration: this.value });
                });
            }

            scopedRoot.querySelectorAll('[data-lock-screen-slot]').forEach((button) => {
                button.addEventListener('click', function () {
                    const slotType = this.getAttribute('data-lock-screen-slot');
                    if (!slotType) {
                        return;
                    }

                    const slotIndexValue = this.getAttribute('data-lock-screen-slot-index');
                    const slotIndex = slotIndexValue == null ? null : Number(slotIndexValue);
                    openLockScreenChooser(slotType, Number.isFinite(slotIndex) ? slotIndex : null);
                });
            });

            scopedRoot.querySelectorAll('[data-lock-screen-choose-app]').forEach((button) => {
                button.addEventListener('click', function () {
                    const appId = this.getAttribute('data-lock-screen-choose-app');
                    if (!appId) {
                        return;
                    }

                    applyLockScreenChooserSelection(appId);
                });
            });

            const chooserDismiss = scopedRoot.querySelector('[data-lock-screen-chooser-dismiss]');
            if (chooserDismiss) {
                chooserDismiss.addEventListener('click', function (event) {
                    event.preventDefault();
                    closeLockScreenChooser();
                });
            }

            const browseButton = scopedRoot.querySelector('[data-lock-screen-browse]');
            const fileInput = scopedRoot.querySelector('[data-lock-screen-file]');
            if (browseButton && fileInput) {
                browseButton.addEventListener('click', () => {
                    fileInput.click();
                });

                fileInput.addEventListener('change', function () {
                    const file = this.files && this.files[0];
                    if (!file) {
                        return;
                    }

                    const candidatePath = typeof file.path === 'string' && file.path.length > 0
                        ? file.path
                        : URL.createObjectURL(file);
                    persistLockScreenWallpaperState(candidatePath, 'custom');
                    renderLockScreenState(false);
                    this.value = '';
                });
            }
        }

        async function invokeBluetoothAction(channel, ...args) {
            if (!settingsIpcRenderer || typeof settingsIpcRenderer.invoke !== 'function') {
                console.warn('[Settings] Bluetooth IPC unavailable, using fallback state for channel:', channel);
                return getBluetoothFallbackState();
            }

            console.log('[Settings] Invoking Bluetooth IPC:', channel, args);
            const result = await Promise.race([
                settingsIpcRenderer.invoke(channel, ...args),
                new Promise((_, reject) => {
                    setTimeout(() => reject(new Error(`Bluetooth request timed out for ${channel}.`)), 6000);
                })
            ]);

            console.log('[Settings] Bluetooth IPC result:', channel, result);
            if (!result || !result.success) {
                throw new Error(result && result.error ? result.error : 'Bluetooth action failed.');
            }

            return result;
        }
