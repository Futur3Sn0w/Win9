<!DOCTYPE html>
<html lang="en">
<head>

    <title>Windows Setup</title>
    <link rel="stylesheet" href="css/css.css">

        <div class="progress-ring">

            </div>

            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
        </div>
    </div>

    <div id="setup-root"></div>
    <script src="install.js"></script>
</body>
</html>
