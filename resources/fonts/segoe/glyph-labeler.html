<meta charset="UTF-8">
<title>Segoe UI Symbol — Glyph Labeler</title>
<style>
  @font-face {
    font-family: 'Segoe UI Symbol';
    src: url('./seguisym.ttf') format('truetype');
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #eee;
    padding: 16px;
  }

  h1 { font-size: 18px; font-weight: 400; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }

  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid #333;
  }

  .toolbar label { font-size: 12px; color: #aaa; }

  .filter-group { display: flex; gap: 4px; }

  button {
    padding: 5px 12px;
    border: 1px solid #555;
    background: #2a2a2a;
    color: #ccc;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #383838; border-color: #777; }
  button.active { background: #0078d4; border-color: #0078d4; color: #fff; }

  .btn-export { background: #107c10; border-color: #107c10; color: #fff; }
  .btn-export:hover { background: #1a8a1a; }
  .btn-copy   { background: #005a9e; border-color: #005a9e; color: #fff; }
  .btn-copy:hover { background: #006bbf; }

  .stats { font-size: 12px; color: #888; margin-left: auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px;
  }

  .cell {
    background: #242424;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px 6px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .cell.has-label  { border-color: #2a5a2a; background: #1e2e1e; }
  .cell.hidden     { display: none; }

  .glyph {
    font-family: 'Segoe UI Symbol';
    font-size: 36px;
    line-height: 1;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    user-select: none;
  }

  .code {
    font-family: monospace;
    font-size: 10px;
    color: #666;
    letter-spacing: 0.5px;
  }

  .label-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 2px;
    color: #ddd;
    font-size: 10px;
    padding: 3px 5px;
    text-align: center;
  }
  .label-input:focus { outline: none; border-color: #0078d4; background: #111; }
  .label-input.filled { color: #6dbf6d; border-color: #2a5a2a; }

  #export-output {
    margin-top: 16px;
    padding: 12px;
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
    font-family: monospace;
    font-size: 11px;
    color: #aaa;
    white-space: pre;
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
    display: none;
  }
</style>
</head>
<body>

<h1>Segoe UI Symbol — Glyph Labeler</h1>
<p class="subtitle">649 PUA glyphs · E000–F013 · Type a label, then Export when done.</p>

<div class="toolbar">
  <label>Filter:</label>
  <div class="filter-group">
    <button class="active" onclick="setFilter('all', this)">All</button>
    <button onclick="setFilter('unknown', this)">Unknown</button>
    <button onclick="setFilter('named', this)">Named</button>
  </div>
  <button class="btn-export" onclick="exportJSON()">Export JSON</button>
  <button class="btn-copy"   onclick="copyExport()">Copy to clipboard</button>
  <span class="stats" id="stats"></span>
</div>

<div class="grid" id="grid"></div>
<pre id="export-output"></pre>

// ── State ─────────────────────────────────────────────────────────────────────
const labels = {};   // hex → string
let currentFilter = 'all';

function hexKey(cp) {
  return cp.toString(16).toUpperCase().padStart(4, '0');
}

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (const cp of CODEPOINTS) {
    const key   = hexKey(cp);
    const known = KNOWN[key] || '';
    if (!(key in labels)) labels[key] = known;

    const cell  = document.createElement('div');
    cell.className = 'cell' + (labels[key] ? ' has-label' : '');
    cell.dataset.key = key;

    const glyph = document.createElement('div');
    glyph.className = 'glyph';
    glyph.textContent = String.fromCodePoint(cp);

    const code = document.createElement('div');
    code.className = 'code';
    code.textContent = 'E' + key.slice(1);   // show as E000 not full 4-char

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'label-input' + (labels[key] ? ' filled' : '');
    input.placeholder = '—';
    input.value = labels[key];
    input.addEventListener('input', () => {
      labels[key] = input.value.trim();
      input.classList.toggle('filled', !!labels[key]);
      cell.classList.toggle('has-label', !!labels[key]);
      updateStats();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === 'Tab') {
        // move focus to next input
        const inputs = [...document.querySelectorAll('.label-input:not([disabled])')];
        const idx = inputs.indexOf(input);
        if (idx < inputs.length - 1) {
          e.preventDefault();
          inputs[idx + 1].focus();
          inputs[idx + 1].select();
        }
      }
    });

    cell.appendChild(glyph);
    cell.appendChild(code);
    cell.appendChild(input);
    grid.appendChild(cell);
  }

  applyFilter();
  updateStats();
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-group button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.cell').forEach(cell => {
    const key = cell.dataset.key;
    const hasLabel = !!labels[key];
    let show = true;
    if (currentFilter === 'unknown') show = !hasLabel;
    if (currentFilter === 'named')   show = hasLabel;
    cell.classList.toggle('hidden', !show);
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total   = CODEPOINTS.length;
  const named   = Object.values(labels).filter(v => v).length;
  const unknown = total - named;
  document.getElementById('stats').textContent =
    `${named} named · ${unknown} unknown · ${total} total`;
}

// ── Export ────────────────────────────────────────────────────────────────────
function buildExportData() {
  const out = {};
  for (const cp of CODEPOINTS) {
    const key = hexKey(cp);
    if (labels[key]) out['U+' + key] = labels[key];
  }
  return JSON.stringify(out, null, 2);
}

function exportJSON() {
  const el = document.getElementById('export-output');
  el.textContent = buildExportData();
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyExport() {
  navigator.clipboard.writeText(buildExportData()).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildGrid();
</script>
